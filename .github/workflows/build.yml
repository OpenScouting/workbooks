name: Build & deploy

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deploy at a time; don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Validate + build every workbook + run tests on every push and PR.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise run check

  # Build ONE Pages artifact holding both sites:
  #   /         clean release workbooks, built from the `release` branch
  #   /draft/   DRAFT-watermarked workbooks, built from `main`
  # GitHub serves one site per repo, so every deploy rebuilds both (each
  # incrementally) and combines them — pushing to main refreshes /draft/,
  # merging main -> release refreshes the clean root.
  build:
    if: github.event_name != 'pull_request'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # all branches + history (per-file dates; branch switching)
      - uses: jdx/mise-action@v4

      # Reuse each site's unchanged PDFs across runs (unique key per run +
      # prefix restore-keys => always save fresh, restore latest).
      - uses: actions/cache@v5
        with:
          path: site-draft
          key: pages-draft-${{ github.run_id }}
          restore-keys: pages-draft-
      - uses: actions/cache@v5
        with:
          path: site-release
          key: pages-release-${{ github.run_id }}
          restore-keys: pages-release-

      - name: Build draft site (from main)
        run: |
          git switch main
          mise run install
          mise exec -- worksheets publish -o site-draft --draft

      - name: Build release site (from release)
        run: |
          git switch release
          mise run install
          mise exec -- worksheets publish -o site-release --release

      - name: Assemble combined site
        run: |
          rm -rf dist
          mkdir -p dist/draft
          cp -a site-release/. dist/
          cp -a site-draft/. dist/draft/
          rm -f dist/build-manifest.json dist/draft/build-manifest.json

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
