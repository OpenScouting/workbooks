badge:
  name: Stamp Collecting
  slug: stamp-collecting
  requirements_revision: "2024-01-01"
  description: >
    Stamp collecting opens a window onto history, geography, art, and the people
    and events celebrated on postage around the world. Scouts learn how to
    identify, handle, mount, and display stamps while building a collection of
    their own.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Discuss how you can better understand people, places, institutions,
          history, and geography as a result of collecting stamps.
        field: { type: text_box, lines: 7 }
      - id: "1b"
        prompt: >
          Briefly describe some aspects of the history, growth, and development
          of the United States postal system. Tell how it is different from
          postal systems in other countries.
        field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      Define topical stamp collecting. Name and describe three other types of
      stamp collections.
    field: { type: text_box, lines: 8 }

  - id: "3"
    prompt: "Show at least ONE example of each of the following:"
    field:
      type: checklist
      items:
        - "(a) Perforated and imperforate stamps"
        - "(b) Mint and used stamps"
        - "(c) Sheet, booklet, and coil stamps"
        - "(d) Numbers on plate block, booklet, coil, or marginal markings"
        - "(e) Overprint and surcharge"
        - "(f) Metered mail"
        - "(g) Definitive, commemorative, semipostal, and airmail stamps"
        - "(h) Cancellation and postmark"
        - "(i) First day cover"
        - "(j) Postal stationery (aerogramme, stamped envelope, and postal card)"

  - id: "4"
    intro: "Do the following:"
    children:
      - id: "4a"
        prompt: >
          Demonstrate the use of ONE standard catalog for several different
          stamp issues. Explain why catalog value can vary from the
          corresponding purchase price.
        field: { type: text_box, lines: 7 }
      - id: "4b"
        prompt: >
          Explain the meaning of the term condition as used to describe a stamp.
          Show examples that illustrate the different factors that affect a
          stamp's value.
        field: { type: text_box, lines: 7 }

  - id: "5"
    prompt: >
      Demonstrate the use of at least THREE of the following stamp collector's
      tools:
    field:
      type: checklist
      items:
        - "(a) Stamp tongs"
        - "(b) Water and tray"
        - "(c) Magnifiers"
        - "(d) Hinges and stamp mounts"
        - "(e) Perforation gauge"
        - "(f) Glassine envelopes and cover sleeves"
        - "(g) Watermark fluid"

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: >
          Show a stamp album and how to mount stamps with or without hinges.
          Show at least ONE page that displays several stamps.
        field: { type: checkbox, label: "Showed an album and a page displaying several stamps." }
      - id: "6b"
        prompt: >
          Discuss at least THREE ways you can help to preserve stamps, covers,
          and albums in first-class condition.
        field: { type: text_box, lines: 7 }

  - id: "7"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Design a stamp, cancellation, or cachet."
        - "(b) Visit a post office, stamp club, or stamp show with an experienced collector. Explain what you saw and learned."
        - "(c) Write a review of an interesting article from a stamp newspaper, magazine, book, or website (with your parent or guardian's permission)."
        - "(d) Research and report on a famous stamp-related personality or the history behind a particular stamp."
        - "(e) Describe the steps taken to produce a stamp. Include the methods of printing, types of paper, perforation styles, and how they are gummed."
        - "(f) Prepare a two- to three-page display involving stamps. Using ingenuity, as well as clippings, drawings, etc., tell a story about the stamps, and how they relate to history, geography, or a favorite topic of yours."
    children:
      - id: "7-notes"
        prompt: "Notes from your two chosen options"
        field: { type: text_box, lines: 12 }

  - id: "8"
    prompt: "Mount and show, in a purchased or homemade album, ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) A collection of 250 or more different stamps from at least 15 countries"
        - "(b) A collection of a stamp from each of 50 different countries, mounted on maps to show the location of each"
        - "(c) A collection of 100 or more different stamps from either one country or a group of closely related countries"
        - "(d) A collection of 75 or more different stamps on a single topic. (Some interesting topics are Scouting, birds, insects, the Olympics, sports, flowers, animals, ships, holidays, trains, famous people, space, and medicine). Stamps may be from different countries."
        - "(e) A collection of postal items discovered in your mail by monitoring it over a period of 30 days. Include at least five different types listed in requirement 3."
    children:
      - id: "8-notes"
        prompt: "Notes on the collection you mounted and showed"
        field: { type: text_box, lines: 8 }
