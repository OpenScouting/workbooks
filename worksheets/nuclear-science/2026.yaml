badge:
  name: Nuclear Science
  slug: nuclear-science
  requirements_revision: "2026-01-01"
  description: >
    Nuclear science explores the atom and the energy locked within it. Earning
    this badge, you learn about radiation, build models of atoms, perform classic
    experiments, and discover how nuclear science benefits medicine, energy, and
    industry.

requirements:
  - id: "1"
    intro: "Radiation. Do the following:"
    children:
      - id: "1a"
        prompt: "Explain radiation and the difference between ionizing and nonionizing radiation."
        field: { type: text_box, lines: 5 }
      - id: "1b"
        prompt: >
          Explain the ALARA principle. Explain what process you would go through to
          ensure your dose is kept ALARA when performing the requirements in this
          merit badge.
        field: { type: text_box, lines: 6 }
      - id: "1c"
        prompt: "Describe the radiation hazard symbol and explain where it should be used."
        field: { type: text_box, lines: 5 }
      - id: "1d"
        prompt: >
          Explain how we are exposed to ionizing radiation from outside the earth
          as well as on earth every day. List four examples of Naturally Occurring
          Radioactive Materials (NORM) that are in your house or grocery store and
          explain why they are radioactive.
        field: { type: text_box, lines: 7 }
      - id: "1e"
        prompt: >
          Explain the difference between radiation exposure and contamination.
          Describe the hazards of radiation to humans, the environment, and
          wildlife. Calculate your approximate annual radiation dose and compare it
          to a typical expected dose of someone who works in a nuclear power plant.
        field: { type: text_box, lines: 8 }

  - id: "2"
    intro: "Basic Nuclear Science. Do the following:"
    children:
      - id: "2a"
        prompt: >
          Explain the following terms: atom, nucleus, proton, neutron, electron,
          quark, isotope; alpha particle, beta particle, gamma ray, X-ray;
          ionization, radioactivity, radioisotope, and stability.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Atom
            - Nucleus
            - Proton
            - Neutron
            - Electron
            - Quark
            - Isotope
            - Alpha particle
            - Beta particle
            - Gamma ray
            - X-ray
            - Ionization
            - Radioactivity
            - Radioisotope
            - Stability
      - id: "2b"
        prompt: >
          Choose an element from the periodic table. Construct 3-D models for the
          atoms of three isotopes of this element, showing neutrons, protons, and
          electrons. Write down the isotope notation for each model including the
          atomic and mass numbers. In a separate model or diagram, explain or show
          how quarks make up protons and neutrons.
        field: { type: text_box, lines: 8 }

  - id: "3"
    intro: "Modern Particle Physics."
    children:
      - id: "3a"
        prompt: "Explain how a particle accelerator works."
        field: { type: text_box, lines: 6 }
      - id: "3b"
        prompt: "Do ONE of the following:"
        field:
          type: checklist
          items:
            - "(1) Visit an accelerator, research lab, or university and discuss with a scientist how they study the properties of the nucleus or nucleons."
            - "(2) List three particle accelerators and describe several experiments conducted and their associated basic science and practical applications."
        children:
          - id: "3b-notes"
            prompt: "Notes from your chosen option"
            field: { type: text_box, lines: 7 }

  - id: "4"
    prompt: "Classic Experiments. Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Build an electroscope. Show how it works. Place a radiation source near the electroscope ball and explain the effect it causes."
        - "(b) Make a cloud chamber. Show how it can be used to see the tracks caused by radiation. Explain what is happening."
        - "(c) Perform an experiment demonstrating half-life. Discuss decay chains."
    children:
      - id: "4-notes"
        prompt: "Notes from your two chosen options"
        field: { type: text_box, lines: 8 }

  - id: "5"
    prompt: "Radiation Safety. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Using a radiation survey meter and a radioactive source, show how the counts per minute change as the source gets closer to or farther from the radiation detector. Place three different materials between the source and the detector, then explain any differences in the measurements per minute. Explain how time, distance, and shielding can reduce an individual's radiation dose."
        - "(b) Describe how radon is detected in homes. Discuss the steps taken for the long-term and short-term test methods, tell how to interpret the results, and explain when each type of test should be used. Explain the health concerns related to radon gas and tell what steps can be taken to reduce radon in buildings."
        - "(c) Visit a place where X-rays are used. Draw a floor plan of this room. Show where the unit, the unit operator, and the patient would be when the X-ray unit is operated. Explain the precautions taken and the importance of those precautions for the safety of the operator."
    children:
      - id: "5-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }

  - id: "6"
    prompt: >
      Nuclear Energy. Do ONE of the following; then discuss with your counselor how
      nuclear energy is used to produce electricity:
    field:
      type: checklist
      items:
        - '(a) Make a drawing showing how nuclear fission happens. Observe a mousetrap reactor (setup by an adult) and use it to explain how a chain reaction could be started. Explain how a chain reaction could be stopped or controlled in a nuclear reactor. Explain what is meant by a "critical mass."'
        - "(b) Visit a local nuclear power plant or nuclear reactor either in person or online (with your parent or guardian's permission). Learn how a reactor works and how the plant generates electricity. Find out what percentage of electricity in the United States and in your state is generated by nuclear power plants, and by other methods. Make a graph of the information you find."
    children:
      - id: "6-notes"
        prompt: "Notes from your chosen option, and how nuclear energy is used to produce electricity"
        field: { type: text_box, lines: 8 }

  - id: "7"
    prompt: >
      Beneficial Applications of Nuclear Science. Give an example of each of the
      following and explain how nuclear science is used in these applications:
      nuclear medicine, environmental applications, industrial applications, space
      exploration, and radiation therapy. For each example, explain the application
      and its significance to nuclear science.
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - Nuclear medicine
        - Environmental applications
        - Industrial applications
        - Space exploration
        - Radiation therapy

  - id: "8"
    prompt: >
      Careers. Explore careers related to nuclear science. Research one career to
      learn about the training and education needed, costs, job prospects, salary,
      job duties, and career advancement. Your research methods may include, with
      your parent or guardian's permission, an internet or library search, an
      interview with a professional in the field, or a visit to a location where
      people in this career work. Discuss with your counselor both your findings
      and what about this profession might make it an interesting career.
    field: { type: text_box, lines: 8 }
