badge:
  name: Rifle Shooting
  slug: rifle-shooting
  requirements_revision: "2025-01-01"
  description: >
    The Rifle Shooting merit badge develops safe, responsible firearm handling
    and marksmanship under qualified supervision. Scouts learn the rules of safe
    gun handling, the fundamentals of shooting, and demonstrate accuracy on the
    range.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain what a projectile is, and why any device that shoots a
          projectile at high speed must be handled with care and respect, and
          used only in approved locations.
        field: { type: text_box, lines: 6 }
      - id: "1b"
        prompt: "Explain the basic rules of safe gun handling that apply to all firearms."
        field: { type: text_box, lines: 6 }
      - id: "1c"
        prompt: >
          Describe how you would react if a friend visiting your home asked to
          see your or your family's firearm.
        field: { type: text_box, lines: 5 }
      - id: "1d"
        prompt: "Explain the need for, types, and use of eye protection and hearing protection."
        field: { type: text_box, lines: 6 }
      - id: "1e"
        prompt: >
          Explain the main points of the laws for owning and using guns in your
          community and state.
        field: { type: text_box, lines: 6 }
      - id: "1f"
        prompt: "Explain how hunting is related to the wise use of renewable wildlife resources."
        field: { type: text_box, lines: 6 }
      - id: "1g"
        prompt: >
          Successfully complete a state hunter education course, or obtain a copy
          of the hunting laws for your state, then do the following:
        children:
          - id: "1g1"
            prompt: >
              Explain the main points of hunting laws in your state, and any
              special laws on the use of guns and ammunition, AND
            field: { type: text_box, lines: 6 }
          - id: "1g2"
            prompt: "List the kinds of wildlife that can be legally hunted in your state."
            field: { type: text_box, lines: 5 }
      - id: "1h"
        prompt: "Explain to your counselor the proper hygienic guidelines followed while shooting."
        field: { type: text_box, lines: 5 }
      - id: "1i"
        prompt: >
          Identify places in your community where you can join or be a part of
          range and target activities.
        field: { type: text_box, lines: 4 }
      - id: "1j"
        prompt: >
          Discuss with your counselor a list of sources you could contact for
          information on firearms and their use.
        field: { type: text_box, lines: 5 }

  - id: "2"
    prompt: >
      Working under the supervision of a certified National Rifle Association
      (NRA) rifle instructor and a certified range safety officer, at a
      nationally authorized camp property or at a commercial firearm range (as
      defined in the Scouting America National Range and Target Activities
      Manual), do ONE of the following options:
    field:
      type: checklist
      items:
        - "Option A: Rifle Shooting (Modern Cartridge Type). Do ALL of the option A steps."
        - "Option B: Air Rifle Shooting (BB or Pellet). Do ALL of the option B steps."
        - "Option C: Muzzleloading Rifle Shooting. Do ALL of the option C steps."
    children:
      - id: "2a"
        prompt: "Option A: Rifle Shooting (Modern Cartridge Type). Do ALL of the following:"
        children:
          - id: "2a1"
            prompt: "Identify the three main parts of a rifle, and tell how they function."
            field: { type: text_box, lines: 5 }
          - id: "2a2"
            prompt: "Identify and demonstrate the rules for safely storing and handling a rifle."
            field: { type: text_box, lines: 5 }
          - id: "2a3"
            prompt: "Identify the two types of cartridges, their parts, and how they function."
            field: { type: text_box, lines: 5 }
          - id: "2a4"
            prompt: >
              Explain to your counselor what a misfire, hangfire, and squib fire
              are, and explain the procedures to follow in response to each.
            field: { type: text_box, lines: 6 }
          - id: "2a5"
            prompt: >
              Explain and demonstrate the five fundamentals of shooting a rifle:
              aiming, breath control, hold control, trigger control, and
              follow-through.
            field: { type: text_box, lines: 6 }
          - id: "2a6"
            prompt: >
              Demonstrate the knowledge, skills, and attitude necessary to safely
              shoot a rifle on a range, including understanding and following
              range procedures and commands.
            field: { type: checkbox, label: "Demonstrated safe shooting and range procedures." }
          - id: "2a7"
            prompt: >
              Explain the basic safety rules for cleaning a rifle, and identify
              the materials needed.
            field: { type: text_box, lines: 5 }
          - id: "2a8"
            prompt: "Demonstrate how to clean a rifle properly and safely."
            field: { type: checkbox, label: "Demonstrated cleaning a rifle properly and safely." }
          - id: "2a9"
            prompt: "Discuss what points you would consider in selecting a rifle."
            field: { type: text_box, lines: 5 }
          - id: "2a10"
            prompt: >
              Using a bolt-action .22 caliber rimfire rifle, and shooting from a
              benchrest or supported prone position at 50 feet, fire five groups
              (three shots per group) that can be touched by a quarter. Using
              these targets, explain how to adjust sights to zero a rifle.
            field: { type: text_box, lines: 6 }
          - id: "2a11"
            prompt: >
              Adjust sights to center the group on the target and fire five
              groups (five shots per group). In the event that your instructor
              determines it is not practical to adjust the sights, for instance,
              on a borrowed rifle, you may explain (rather than doing) how to
              adjust the sights, and then fire five groups (five shots per group)
              in which all shots can be touched by a quarter. According to the
              target used, each shot in the group must meet the following minimum
              score: A-32 targets: 9; A-17 or TQ-1 targets: 7; A-36 targets: 5.
              Note: Other suitable NRA targets may be used based on availability.
            field: { type: text_box, lines: 6 }
      - id: "2b"
        prompt: "Option B: Air Rifle Shooting (BB or Pellet). Do ALL of the following:"
        children:
          - id: "2b1"
            prompt: "Identify the three main parts of an air rifle, and explain how they function."
            field: { type: text_box, lines: 5 }
          - id: "2b2"
            prompt: "Identify and demonstrate the rules for safely storing and handling an air rifle."
            field: { type: text_box, lines: 5 }
          - id: "2b3"
            prompt: "Identify the two most common types of air rifle ammunition."
            field: { type: text_box, lines: 4 }
          - id: "2b4"
            prompt: >
              Explain and demonstrate the five fundamentals of shooting an air
              rifle: aiming, breath control, hold control, trigger control, and
              follow-through.
            field: { type: text_box, lines: 6 }
          - id: "2b5"
            prompt: >
              Demonstrate the knowledge, skills, and attitude necessary to safely
              shoot on a range, including understanding and following range
              procedures and commands.
            field: { type: checkbox, label: "Demonstrated safe shooting and range procedures." }
          - id: "2b6"
            prompt: >
              Explain the basic safety rules for cleaning an air rifle, and
              identify the materials needed.
            field: { type: text_box, lines: 5 }
          - id: "2b7"
            prompt: "Demonstrate how to clean an air rifle properly and safely."
            field: { type: checkbox, label: "Demonstrated cleaning an air rifle properly and safely." }
          - id: "2b8"
            prompt: "Discuss what points you would consider in selecting an air rifle."
            field: { type: text_box, lines: 5 }
          - id: "2b9"
            prompt: >
              Using a BB gun or pellet rifle and shooting from a benchrest or
              supported prone position at 15 feet for BB guns or 33 feet for
              pellet rifles, fire five groups (three shots per group) that can be
              touched by a quarter.
            field: { type: text_box, lines: 5 }
          - id: "2b10"
            prompt: >
              Adjust sights to center the group on the target and fire five
              groups (five shots per group). In the event that your instructor
              determines it is not practical to adjust the sights, for instance,
              on a borrowed air rifle, you may explain (rather than doing) how to
              adjust the sights, and then fire five groups (five shots per group)
              in which all shots can be touched by a quarter. According to the
              target used, each shot in the group must meet the following minimum
              score: BB rifle at 15 feet (or 5 meters) using TQ-5 targets: 8;
              Pellet rifle at 25 feet using TQ-5 targets: 8; Pellet rifle at 33
              feet (or 10 meters) using AR-1 targets: 6. Note: Other suitable NRA
              targets may be used based on availability.
            field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: "Option C: Muzzleloading Rifle Shooting. Do ALL of the following:"
        children:
          - id: "2c1"
            prompt: "Discuss with your counselor a brief history of the development of muzzleloading rifles."
            field: { type: text_box, lines: 5 }
          - id: "2c2"
            prompt: "Identify principal parts of muzzleloading rifles and discuss how they function."
            field: { type: text_box, lines: 5 }
          - id: "2c3"
            prompt: >
              Identify and demonstrate the rules for safely storing and handling
              a muzzleloading rifle.
            field: { type: text_box, lines: 5 }
          - id: "2c4"
            prompt: "Identify the various grades of black powder and explain their proper and safe use."
            field: { type: text_box, lines: 5 }
          - id: "2c5"
            prompt: "Discuss proper safety procedures pertaining to black powder storage."
            field: { type: text_box, lines: 5 }
          - id: "2c6"
            prompt: "Discuss proper components of a load."
            field: { type: text_box, lines: 5 }
          - id: "2c7"
            prompt: >
              Identify proper procedures and accessories used for safely loading a
              muzzleloading rifle.
            field: { type: text_box, lines: 5 }
          - id: "2c8"
            prompt: >
              Identify the causes of a muzzleloading rifle's failure to fire, and
              explain what a misfire, hangfire, and squib fire are. Explain and
              demonstrate proper preventive measures, and the procedures to follow
              in response to each.
            field: { type: text_box, lines: 6 }
          - id: "2c9"
            prompt: >
              Demonstrate the knowledge, skills, and attitude necessary to safely
              shoot a muzzleloading rifle on a range, including understanding and
              following range procedures and commands.
            field: { type: checkbox, label: "Demonstrated safe shooting and range procedures." }
          - id: "2c10"
            prompt: >
              Explain the basic safety rules for cleaning a muzzleloading rifle,
              and identify the materials needed.
            field: { type: text_box, lines: 5 }
          - id: "2c11"
            prompt: "Demonstrate how to clean a muzzleloading rifle properly and safely."
            field: { type: checkbox, label: "Demonstrated cleaning a muzzleloading rifle properly and safely." }
          - id: "2c12"
            prompt: "Discuss what points you would consider in selecting a muzzleloading rifle."
            field: { type: text_box, lines: 5 }
          - id: "2c13"
            prompt: >
              Using a muzzleloading rifle of .45 or .50 caliber and shooting from
              a benchrest or supported prone position, fire three groups (three
              shots per group) at 50 feet that can be covered by the base of a
              standard-size soft drink can.
            field: { type: text_box, lines: 5 }
          - id: "2c14"
            prompt: >
              Adjust the sights to center the group on the target and fire three
              groups (five shots per group). In the event that your instructor
              determines it is not practical to adjust the sights, for instance,
              on a borrowed muzzleloading rifle, you may explain (rather than
              doing) how to adjust the sights, and then fire three groups (five
              shots per group) in which all shots can be covered by the base of a
              standard-size soft drink can. According to the target used, each
              shot in the group must meet the following minimum score: at 25 yards
              using NRA A-23 or NMLRA 50-yard targets: 7; at 50 yards using NRA
              A-25 or NMLRA 100-yard targets: 7. Note: Other suitable NRA targets
              may be used based on availability.
            field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: >
      Identify how you could apply the skills and knowledge of safe and
      responsible use of firearms you learned in this merit badge to pursue a
      career or personal hobby. Research the additional training and experience
      you would need, expenses you may incur, and the affiliation with
      organizations that could help you maximize the positive impact and
      enjoyment you gain from it. Discuss what you learned with your counselor,
      and share what short-term and long-term goals you might have if you pursued
      this.
    field: { type: text_box, lines: 10 }
