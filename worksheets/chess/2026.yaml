badge:
  name: Chess
  slug: chess
  requirements_revision: "2026-01-01"
  description: >
    Chess is a game of planning, strategy, and sportsmanship. Earning this
    badge, you learn the rules and history of the game, practice notation,
    openings, tactics, and endgames, and teach or compete with others.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: "Discuss with your counselor the history of the game of chess."
        field: { type: text_box, lines: 6 }
      - id: "1b"
        prompt: >
          Research a famous chess player and what accomplishments made him or
          her famous. Discuss with your counselor.
        field: { type: text_box, lines: 6 }

  - id: "2"
    intro: "Discuss with your counselor the following:"
    children:
      - id: "2a"
        prompt: "Why chess is considered a game of planning and strategy."
        field: { type: text_box, lines: 5 }
      - id: "2b"
        prompt: >
          The benefits of playing chess, including developing critical thinking
          skills, concentration skills, and decision-making skills, and how these
          skills can help you in other areas of your life.
        field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: "Sportsmanship and chess etiquette"
        field: { type: text_box, lines: 5 }

  - id: "3"
    intro: >
      Demonstrate to your counselor that you know each of the following. Then,
      using Scouting EDGE to teach someone who does not know how to play chess:
    children:
      - id: "3a"
        prompt: "The name of each chess piece"
        field: { type: text_box, lines: 3 }
      - id: "3b"
        prompt: "How to set up a chessboard"
        field: { type: text_box, lines: 3 }
      - id: "3c"
        prompt: >
          How each chess piece moves and captures, including: four rules of
          castling, en passant captures, pawn promotion, check, ways to get out
          of check, and checkmate.
        field: { type: text_box, lines: 8 }
      - id: "3d"
        prompt: "The five ways a game can end in a draw"
        field: { type: text_box, lines: 5 }

  - id: "4"
    intro: "Do the following:"
    children:
      - id: "4a"
        prompt: "Demonstrate scorekeeping using the algebraic system of chess notation."
        field: { type: text_box, lines: 4 }
      - id: "4b"
        prompt: "Discuss the differences between the opening, the middle game, and the endgame."
        field: { type: text_box, lines: 6 }
      - id: "4c"
        prompt: >
          Explain four opening principles. Demonstrate for your counselor the
          first five moves of the following openings: Ruy Lopez, French Defense,
          Queen's Gambit Declined, Sicilian Defense.
        field: { type: text_box, lines: 7 }
      - id: "4d"
        prompt: >
          On a chessboard, demonstrate Scholar's Mate, Fool's Mate, Legal Mate,
          Fried Liver Attack, and Noah's Ark Trap.
        field:
          type: checklist
          items:
            - "Scholar's Mate"
            - "Fool's Mate"
            - "Legal Mate"
            - "Fried Liver Attack"
            - "Noah's Ark Trap"

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Explain four of the following elements of chess strategy: exploiting
          weaknesses, force, king safety, pawn structure, space, tempo, and clock
          management.
        field: { type: text_box, lines: 7 }
      - id: "5b"
        prompt: >
          Explain any five of these chess tactics: clearance sacrifice, decoy,
          discovered attack, double check, double attack, fork, interposing,
          overloading, overprotecting, pin, skewer, remove the defender,
          zwischenzug, and zugzwang.
        field: { type: text_box, lines: 8 }
      - id: "5c"
        prompt: >
          Set up a chessboard as follows and with White to move first,
          demonstrate how to force checkmate on the Black king:
        children:
          - id: "5c1"
            prompt: "White on e1, the White rooks on a1 and h1, and the Black king on e5."
            field: { type: checkbox }
          - id: "5c2"
            prompt: "White King on e1, White queen on d1, Black king on e5."
            field: { type: checkbox }
          - id: "5c3"
            prompt: "White king on e1, White rook on a1, Black king on e5."
            field: { type: checkbox }
      - id: "5d"
        prompt: "With White king on d4, White pawn on e3, and Black king on e6:"
        children:
          - id: "5d1"
            prompt: >
              With White to move, demonstrate how White can force Black to allow
              his pawn to reach the last rank and be promoted to a queen.
            field: { type: checkbox }
          - id: "5d2"
            prompt: "With Black to move, demonstrate how Black can force a draw."
            field: { type: checkbox }
      - id: "5e"
        prompt: "Set up and solve five direct-mate problems provided by your counselor."
        field: { type: checkbox }

  - id: "6"
    prompt: >
      Explain to your counselor how chess tournaments are run, including the
      Swiss system tournament format, the round robin tournament format,
      pairings for each round, time controls, touch move, scoring, and chess
      ratings.
    field: { type: text_box, lines: 8 }

  - id: "7"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Play at least three games of chess with other Scouts and/or your counselor. Replay the games from your score sheets and discuss with your counselor how you might have played each game differently."
        - "(b) Play in a scholastic (youth) chess tournament and use your score sheets from that tournament to replay your games with your counselor. Discuss with your counselor how you might have played each game differently."
        - "(c) Organize and run a chess tournament with at least four players, plus you. Have each competitor play at least two games."
    children:
      - id: "7notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }
