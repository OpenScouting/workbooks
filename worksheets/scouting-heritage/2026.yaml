badge:
  name: Scouting Heritage
  slug: scouting-heritage
  requirements_revision: "2026-01-01"
  description: >
    The Scouting Heritage merit badge traces the movement from Baden-Powell's
    first camp on Brownsea Island to the program you know today. You will study
    the people, places, and traditions that shaped Scouting and reflect on the
    history of your own unit and community.

requirements:
  - id: "1"
    prompt: >
      Discuss with your counselor the life and times of Lord Baden-Powell of
      Gilwell. Explain why he felt a program like Scouting would be good for the
      young men of his day. Include in your discussion how Scouting was
      introduced in the United States, and the origins of Boy Scouting and Cub
      Scouting under Baden-Powell.
    field: { type: text_box, lines: 10 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Give a short biographical summary of any TWO of the following, and
          tell of their roles in how Scouting developed and grew in the United
          States.
        field:
          type: checklist
          items:
            - "(1) Daniel Carter Beard"
            - "(2) William D. Boyce"
            - "(3) Waite Phillips"
            - "(4) Ernest Thompson Seton"
            - "(5) James E. West"
            - '(6) "Green Bar Bill" Hillcourt'
            - "(7) Frederick Russell Burnham"
            - "(8) Dr. Charles Eastman"
            - "(9) Edgar Robinson"
      - id: "2a-notes"
        prompt: "Biographical summaries for your two chosen people"
        field: { type: text_box, lines: 10 }
      - id: "2b"
        prompt: "Discuss the significance to Scouting of any TWO of the following:"
        field:
          type: checklist
          items:
            - "(1) Brownsea Island"
            - "(2) The First World Scout Jamboree"
            - "(3) Scouts BSA Handbook"
            - "(4) Scout Life magazine (formerly Boys' Life)"
      - id: "2b-notes"
        prompt: "Notes on the significance of your two chosen items"
        field: { type: text_box, lines: 8 }

  - id: "3"
    prompt: >
      Discuss with your counselor how Scouting's programs have developed over
      time and been adapted to fit different age groups and interests (Cub
      Scouting, Scouts BSA, Exploring, Venturing).
    field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: "Do ONE of the following:"
    children:
      - id: "4-choice"
        prompt: "Check the option you chose:"
        field:
          type: checklist
          items:
            - "(a) Attend either a Scouting America National Jamboree, OR World Scout Jamboree, OR a national Scouting America high-adventure base. While there, keep a journal documenting your day-to-day experiences. Upon your return, report to your counselor what you did, saw, and learned. You may include photos, brochures, and other documents in your report."
            - "(b) Write or visit the National Scouting Museum. Obtain information about this facility. Give a short report on what you think the role of this museum is in the Scouting program."
            - "(c) Visit an exhibit of Scouting memorabilia or a local museum with a Scouting history gallery, or (with your parent or guardian's permission and counselor's approval) visit with someone in your council who is recognized as a dedicated Scouting historian or memorabilia collector. Learn what you can about the history of Scouting America. Give a short report to your counselor on what you saw and learned."
      - id: "4-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "5"
    prompt: >
      Research the history of your unit, council, summer camp, or Order of the
      Arrow lodge. With the permission of a parent or guardian, your research
      methods may include an internet or library search, interviews with Scout
      leaders, or visits to locations where you learn about your topic. Prepare
      an oral or written report, a presentation, or a video of your research and
      review it with your counselor.
    field: { type: text_box, lines: 10 }

  - id: "6"
    prompt: >
      Make a collection of some of your personal patches and other Scouting
      memorabilia. With their permission, you may include items borrowed from
      family members or friends who have been in Scouting in the past, or you may
      include photographs of these items. Show this collection to your
      counselor, and share what you have learned about items in the collection.
      Note: There is no requirement regarding how large or small this collection
      must be.
    field: { type: text_box, lines: 8 }

  - id: "7"
    prompt: >
      Reproduce the equipment for an old-time Scouting game such as those played
      at Brownsea Island. You may find one on your own (with your counselor's
      approval) or pick one from the Scouting Heritage merit badge pamphlet.
      Teach and play the game with other Scouts.
    field: { type: text_box, lines: 6 }

  - id: "8"
    prompt: >
      Interview at least three people (different from those you interviewed for
      requirement 5) over the age of 40 who were Scouts. Find out about their
      Scouting experiences. Ask about the impact that Scouting has had on their
      lives. Share what you learned with your counselor.
    field: { type: text_box, lines: 10 }

  - id: "9"
    intro: "Careers. Do ONE of the following:"
    children:
      - id: "9-choice"
        prompt: "Check the option you chose:"
        field:
          type: checklist
          items:
            - "(a) Explore careers related to Scouting. Research one career to learn about the training and education needed, costs, job prospects, salary, job duties, and career advancement. With permission of your parent or guardian, your research methods may include an internet or library search, an interview with a professional in the field, or a visit to a location where people in this career work. Discuss with your counselor both your findings and what about this profession might make it an interesting career."
            - "(b) Explore how you could use knowledge and skills from this merit badge to serve as a Scouting volunteer. Research any training needed, expenses, and how you could serve as a unit, district, council, regional, or national volunteer. Discuss with your counselor what short-term and long-term goals you might have if you pursued this."
      - id: "9-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
