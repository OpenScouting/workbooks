badge:
  name: Engineering
  slug: engineering
  requirements_revision: "2026-01-01"
  description: >
    Engineering shows you how people use science and creativity to solve real
    problems. You will investigate how things work, meet a working engineer,
    design something of your own, and explore the many branches of the
    profession.

requirements:
  - id: "1"
    prompt: >
      Select a manufactured item in your home (such as a toy or an appliance)
      and, under adult supervision and with the approval of your counselor,
      investigate how and why it works as it does. Find out what sort of
      engineering activities were needed to create it. Discuss with your
      counselor what you learned and how you got the information.
    field: { type: text_box, lines: 10 }

  - id: "2"
    prompt: >
      Select an engineering achievement that has had a major impact on society.
      Using resources such as the internet (with your parent or guardian's
      permission), books, and magazines, find out about the engineers who made
      this engineering feat possible, the special obstacles they had to
      overcome, and how this achievement has influenced the world today. Tell
      your counselor what you learned.
    field: { type: text_box, lines: 10 }

  - id: "3"
    prompt: "Explain the work of six types of engineers. Pick two of the six types and explain how their work is related to engineering."
    children:
      - id: "3-types"
        prompt: "Explain the work of six types of engineers."
        field:
          type: repeated_block
          count: 6
          template:
            - { label: "Type of engineer", type: text_field }
            - { label: "Description of their work", type: text_box, lines: 3 }
      - id: "3-related"
        prompt: "Pick two of the six types and explain how their work is related to engineering."
        field: { type: text_box, lines: 7 }

  - id: "4"
    prompt: "Visit with an engineer (who may be your counselor, parent or guardian) and do the following:"
    children:
      - id: "4a"
        prompt: "Discuss the work this engineer does and the tools the engineer uses."
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: "Discuss with the engineer a current project and the engineer's particular role in it."
        field: { type: text_box, lines: 6 }
      - id: "4c"
        prompt: "Find out how the engineer's work is done and how results are achieved."
        field: { type: text_box, lines: 5 }
      - id: "4d"
        prompt: "Ask to see the reports that the engineer writes concerning the project."
        field: { type: checkbox, label: "Asked to see the reports that the engineer writes concerning the project." }
      - id: "4e"
        prompt: "Discuss with your counselor what you learned about engineering from this visit."
        field: { type: text_box, lines: 6 }

  - id: "5"
    prompt: "Use the systems engineering approach to design an original piece of patrol equipment, a toy or a useful device for the home, office or garage."
    field: { type: text_box, lines: 10 }

  - id: "6"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "Transforming Motion. Using common materials or a construction set, make a simple model that will demonstrate motion. Explain how the model uses basic mechanical elements like levers and inclined planes to demonstrate motion. Describe an example where this mechanism is used in a real product."
        - "Using Electricity. Make a list of 10 electrical appliances in your home. Find out approximately how much electricity each uses in one month. Learn how to find out the amount and cost of electricity used in your home during periods of light and heavy use. List five ways to conserve electricity."
        - "Understanding Electronics. Using an electronic device such as a smartphone or tablet computer, find out how sound, video, text or images travel from one location to another. Explain how the device was designed for ease of use, function, and durability."
        - "Using Materials. Do experiments to show the differences in strength and heat conductivity in wood, metal, and plastic. Discuss with your counselor what you have learned."
        - "Converting Energy. Do an experiment to show how mechanical, heat, chemical, solar, and/or electrical energy may be converted from one or more types of energy to another. Explain your results. Describe to your counselor what energy is and how energy is converted and used in your surroundings."
        - "Moving People. Find out the different ways people in your community get to work. Make a study of traffic flow (number of vehicles and relative speed) in both heavy and light traffic periods. Discuss with your counselor what might be improved to make it easier for people in your community to get where they need to go."
        - "Building an Engineering Project. Enter a project in a science or engineering fair or similar competition. (This requirement may be met by participation on an engineering competition project team.) Discuss with your counselor what your project demonstrates, the kinds of questions visitors to the fair asked you, and how well you were able to answer their questions."
    children:
      - id: "6-notes"
        prompt: "Notes from your chosen options"
        field: { type: text_box, lines: 10 }

  - id: "7"
    prompt: "Explain what it means to be a registered Professional Engineer (P.E.). Name the types of engineering work for which registration is most important."
    field: { type: text_box, lines: 7 }

  - id: "8"
    prompt: "Study the Engineer's Code of Ethics. Explain how it is like the Scout Oath and Law."
    field: { type: text_box, lines: 7 }

  - id: "9"
    prompt: >
      Explore careers related to this merit badge. Research one career to learn
      about the training and education needed, costs, job prospects, salary, job
      duties, and career advancement. Your research methods may include, with
      your parent or guardian's permission, an internet or library search, an
      interview with a professional in the field, or a visit to a location where
      people in this career work. Discuss with your counselor both your findings
      and what about this profession might make it an interesting career.
    field: { type: text_box, lines: 10 }
