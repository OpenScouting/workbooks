badge:
  name: Pets
  slug: pets
  requirements_revision: "2026-01-01"
  description: >
    Caring for a pet teaches responsibility, patience, and compassion.
    Earning this badge means giving an animal proper care over time, learning
    about its needs, and discovering what it takes to keep a pet healthy and
    happy.

requirements:
  - id: "1"
    prompt: >
      Present evidence that you have cared for a pet for four months. Get
      approval before you start. Note: Work done for other merit badges cannot
      be used for this requirement.
    field: { type: text_box, lines: 6 }

  - id: "2"
    prompt: >
      Write in 200 words or more about the care, feeding, and housing of your
      pet. Tell some interesting facts about it. Tell why you have this kind of
      pet. Give local laws, if any, relating to the pet you keep.
    field: { type: text_box, lines: 12 }

  - id: "3"
    prompt: >
      Show that you have read a book or pamphlet, approved by your counselor,
      about your kind of pet. Discuss with your counselor what you have learned
      from what you read.
    field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Show your pet in a pet show."
        - "(b) Train a pet in three or more tricks or special abilities."
    children:
      - id: "4notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 6 }

  - id: "5"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - >
          (a) Explore careers related to this merit badge. Research one career
          to learn about the training and education needed, costs, job
          prospects, salary, job duties, and career advancement. Your research
          methods may include, with your parent or guardian's permission, an
          internet or library search, an interview with a professional in the
          field, or a visit to a location where people in this career work.
          Discuss with your counselor both your findings and what about this
          profession might make it an interesting career.
        - >
          (b) Explore how you could use knowledge and skills from this merit
          badge to pursue a hobby or healthy lifestyle. Research any training
          needed, expenses, and organizations that promote or support it.
          Discuss with your counselor what short-term and long-term goals you
          might have if you pursued this.
    children:
      - id: "5notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }
