badge:
  name: First Aid
  slug: first-aid
  requirements_revision: "2025-01-01"
  description: >
    First aid is the immediate care given to someone who is injured or suddenly
    ill. This Eagle-required badge builds the knowledge and hands-on skills to
    assess an emergency, treat a wide range of wounds and conditions, and decide
    when and how to get a victim more help.

requirements:
  - id: "1"
    intro: "Handling a First Aid Emergency. Do the following:"
    children:
      - id: "1a"
        prompt: "Explain the steps necessary to assess and handle a first aid emergency, including a safety evaluation of the scene."
        field: { type: text_box, lines: 7 }
      - id: "1b"
        prompt: "Tell how you would obtain emergency medical assistance from your home and from a remote location on a wilderness camping trip."
        field: { type: text_box, lines: 6 }
      - id: "1c"
        prompt: "Demonstrate the precautions you must take to reduce the risk of transmitting an infection between you and the victim while administering first aid, including the safe disposal of used first aid supplies."
        field: { type: text_box, lines: 6 }
      - id: "1d"
        prompt: "Demonstrate evaluation of and management of a patient's airway and breathing."
        field: { type: checkbox, label: "Demonstrated evaluation and management of a patient's airway and breathing." }
      - id: "1e"
        prompt: "Demonstrate a thorough examination of an accident victim."
        field: { type: checkbox, label: "Demonstrated a thorough examination of an accident victim." }
      - id: "1f"
        prompt: "Discuss why shock is an emergency."
        field: { type: text_box, lines: 5 }
      - id: "1g"
        prompt: "Define the term triage and describe examples of triage situations that you may encounter."
        field: { type: text_box, lines: 6 }

  - id: "2"
    intro: "Preparing for First Aid Emergencies. Do the following:"
    children:
      - id: "2a"
        prompt: "Obtain a copy of the Scout Annual Health and Medical Record and discuss the importance of the form including information on immunizations, allergies, medications, health history, and medical examinations to providing first aid at Scouting events."
        field: { type: text_box, lines: 7 }
      - id: "2b"
        prompt: "Using checklists provided in the First Aid merit badge pamphlet or ones approved by your counselor, do the following:"
        children:
          - id: "2b1"
            prompt: "Assemble a personal first-aid kit for hiking and backpacking. Demonstrate the proper use of each item in your first-aid kit to your counselor."
            field: { type: text_box, lines: 8 }
          - id: "2b2"
            prompt: "With your counselor, inspect a unit, home, vehicle, or camp first-aid kit and discuss your findings."
            field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: "Wounds with No External Bleeding. Describe the symptoms and signs of, show first aid for, and explain prevention of these wounds:"
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "(a) Closed wounds, such as a bruise (contusion) or a hematoma"
        - "(b) Superficial, partial thickness, and full thickness thermal (heat) burns or scalds"
        - "(c) Chemical burns"
        - "(d) Electrical burns"
        - "(e) Sunburn"
        - "(f) Snow blindness"
        - "(g) Immersion foot, frostnip, frostbite, and ice burns"
        - "(h) Abrasions, such as chafing and rope burns"
        - "(i) Blisters on the hands, feet, buttocks, and shoulders"
        - "(j) Puncture wounds from splinters, rope splinters, nails, and fish hooks"
        - "(k) Rash from poisonous plants"
        - "(l) Bug bites of chiggers, ticks, mosquitoes, and biting gnats"
        - "(m) Bee stings"
        - "(n) Bites of spiders"
        - "(o) Sting of a scorpion"
        - "(p) Bite of a pet or wild mammal or human"
        - "(q) Bite of a venomous snake"

  - id: "4"
    prompt: "Bleeding Wounds. Describe the symptoms and signs of, show first aid for, and explain prevention of these wounds:"
    children:
      - id: "4a"
        prompt: "A nosebleed."
        field: { type: text_box, lines: 4 }
      - id: "4b"
        prompt: "An open wound with mild or moderate bleeding, such as a scratch or a scrape (abrasions), or a shallow cut (laceration)."
        field: { type: text_box, lines: 5 }
      - id: "4c"
        prompt: "An open wound with severe bleeding such as a deep cut on an arm or leg."
        field: { type: text_box, lines: 5 }
      - id: "4d"
        prompt: "Explain when it is appropriate and is not appropriate to use one or more tourniquets. List some of the benefits and dangers of using a tourniquet. Demonstrate the application of a tourniquet without tightening it."
        field: { type: text_box, lines: 8 }

  - id: "5"
    prompt: "Breathing Emergencies. Describe the symptoms and signs of, show first aid for, and explain prevention of these conditions affecting breathing:"
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "(a) Choking"
        - "(b) Asthmatic attack"
        - "(c) Anaphylaxis from an insect bite or sting or from food or product allergy"
        - "(d) Inhalation injuries"
        - "(e) Altitude sickness"

  - id: "6"
    prompt: "Loss of Consciousness. Describe the symptoms and signs of, show first aid for, and explain prevention of these conditions causing loss of consciousness:"
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "(a) Fainting"
        - "(b) Hypoglycemia"
        - "(c) Seizure"
        - "(d) Drug overdose and alcohol poisoning"
        - "(e) Underwater hypoxic blackout"
        - "(f) Cold water shock and drowning"
        - "(g) Lightning strike and electric shock"

  - id: "7"
    intro: "Heart Attack. Do the following:"
    children:
      - id: "7a"
        prompt: "Explain what a heart attack is."
        field: { type: text_box, lines: 5 }
      - id: "7b"
        prompt: "Describe the symptoms and signs of a heart attack and first aid for this condition."
        field: { type: text_box, lines: 6 }
      - id: "7c"
        prompt: "Describe the conditions that must exist before performing CPR on a person."
        field: { type: text_box, lines: 5 }
      - id: "7d"
        prompt: "Demonstrate proper CPR technique using a training device approved by your counselor."
        field: { type: checkbox, label: "Demonstrated proper CPR technique using an approved training device." }
      - id: "7e"
        prompt: "Explain the use of an automated external defibrillator (AED)."
        field: { type: text_box, lines: 5 }
      - id: "7f"
        prompt: "Demonstrate or simulate the proper use of an AED, using an AED training device if available."
        field: { type: checkbox, label: "Demonstrated or simulated the proper use of an AED." }
      - id: "7g"
        prompt: "Identify the typical location(s) of one or more AED(s) at public facilities in your community, such as, your school, place of worship, unit meeting place, sports facilities, and/or camp or by using a smart phone app. Discuss the reasons for choosing locations like these."
        field: { type: text_box, lines: 6 }

  - id: "8"
    intro: "Muscle and Bone Injuries. Do the following:"
    children:
      - id: "8a"
        prompt: "Explain the similarities and differences in a strain, a muscle tear, a tendon rupture, a sprain, a dislocation, a simple fracture, and a compound fracture."
        field: { type: text_box, lines: 8 }
      - id: "8b"
        prompt: "Describe the symptoms and signs of and first aid for a muscle strain, a muscle tear, and a tendon rupture."
        field: { type: text_box, lines: 6 }
      - id: "8c"
        prompt: "Describe the symptoms and signs of, and potential complications of, a sprain, a fracture, and a dislocation."
        field: { type: text_box, lines: 6 }
      - id: "8d"
        prompt: "Demonstrate bandages for these injuries:"
        field:
          type: checklist
          items:
            - "(1) Arm slings for forearm or upper arm or collarbone fractures"
            - "(2) Elastic wrap and cravat bandages for ankle sprain"
            - "(3) Elastic wrap and cravat bandages for wrist sprain or hand injury."
      - id: "8e"
        prompt: "Demonstrate the proper procedures for handling and splinting of suspected closed or open fractures or dislocations of the:"
        field:
          type: checklist
          items:
            - "(1) Finger and toe"
            - "(2) Forearm or wrist"
            - "(3) Upper leg"
            - "(4) Lower leg or ankle"

  - id: "9"
    intro: "Head and Spine Injuries. Do the following:"
    children:
      - id: "9a"
        prompt: "Describe the symptoms and signs of, relationships between, possible complications of, and prevention of head, neck, and back injuries."
        field: { type: text_box, lines: 7 }
      - id: "9b"
        prompt: "Describe the symptoms and signs of and first aid for a concussion."
        field: { type: text_box, lines: 6 }
      - id: "9c"
        prompt: "Demonstrate first aid for an open head wound with a triangular or other bandage."
        field: { type: checkbox, label: "Demonstrated first aid for an open head wound with a bandage." }
      - id: "9d"
        prompt: "Demonstrate first aid for someone with a suspected neck or back injury."
        field: { type: checkbox, label: "Demonstrated first aid for a suspected neck or back injury." }

  - id: "10"
    intro: "Moving a Patient. Do the following:"
    children:
      - id: "10a"
        prompt: "Describe the conditions under which an injured person should and should not be moved."
        field: { type: text_box, lines: 6 }
      - id: "10b"
        prompt: "If a sick or an injured person must be moved, tell how you would decide the best method. Demonstrate these methods."
        field: { type: text_box, lines: 6 }
      - id: "10c"
        prompt: "By yourself and with a partner, demonstrate how to transport a person from a smoke-filled room."
        field: { type: checkbox, label: "Demonstrated transporting a person from a smoke-filled room, alone and with a partner." }
      - id: "10d"
        prompt: "By yourself and with a partner, demonstrate how to transport a person with a sprained ankle for at least 25 yards."
        field: { type: checkbox, label: "Demonstrated transporting a person with a sprained ankle at least 25 yards, alone and with a partner." }
      - id: "10e"
        prompt: "With helpers under your supervision, improvise a stretcher and move a presumably unconscious person for at least 25 yards."
        field: { type: checkbox, label: "Improvised a stretcher and moved a presumably unconscious person at least 25 yards." }

  - id: "11"
    prompt: "Heat- and Cold-Related Conditions. Describe the symptoms and signs of, show first aid for, and explain prevention of these conditions associated with exertion and/or heat or cold exposure:"
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "(a) Dehydration and over-hydration"
        - "(b) Heat cramps and muscle pain after exertion"
        - "(c) Heat exhaustion"
        - "(d) Heat stroke"
        - "(e) Chest pains associated with cold exposure"
        - "(f) Hypothermia"

  - id: "12"
    prompt: "Mental Health Conditions. Describe the following:"
    children:
      - id: "12a"
        prompt: "Reactions associated with at least three stressful situations, such as mountain backpacking, rappelling, a ropes course, speaking before an audience, making a phone call to an adult, taking a swim test, missing home, lighting a match, trying out for a sports team, meeting someone for the first time, or other stressful circumstances."
        field: { type: text_box, lines: 8 }
      - id: "12b"
        prompt: "The actions that you and others should take to prepare for and manage these situations."
        field: { type: text_box, lines: 6 }
      - id: "12c"
        prompt: "The indications that someone might be a danger to themselves or others."
        field: { type: text_box, lines: 6 }
      - id: "12d"
        prompt: "The actions that you should take if you suspect that someone might be a danger to themselves or others."
        field: { type: text_box, lines: 6 }

  - id: "13"
    prompt: "Miscellaneous Conditions. Describe the symptoms and signs of, show first aid for, and explain prevention of the following conditions:"
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "(a) Object in the eye"
        - "(b) Broken, chipped, loosened, or knocked out tooth"
        - "(c) Vomiting and diarrhea associated with food poisoning"
        - "(d) Abdominal pain"
        - "(e) Stroke"

  - id: "14"
    prompt: "With guidance from your counselor, develop a plan to teach a first-aid skill or topic using the EDGE method. Discuss your skill, topic, and plan with your counselor, and then teach your skill or topic to your family or to one or more Scouts."
    field: { type: text_box, lines: 10 }

  - id: "15"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Visit an emergency medical station house or training center in person. From the medical first responders that you meet during your visit, learn about how they serve their community and about their careers. Discuss with your counselor what you learned during your tour and interviews."
        - "(b) Interview an emergency medical services professional about their work. Learn about how they chose this career and about their duties. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "(c) Identify three career opportunities that would use skills and knowledge in emergency medical services. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities, and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "(d) Identify how you might use the skills and knowledge in the field of emergency medical services to pursue a personal hobby and/or healthy lifestyle. Research the additional training required, expenses, and affiliation with organizations that would help you maximize the enjoyment and benefit you might gain from it. Discuss what you learned with your counselor and share what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "15-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
