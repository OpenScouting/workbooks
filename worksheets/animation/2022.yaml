badge:
  name: Animation
  slug: animation
  requirements_revision: "2022-01-01"
  description: >
    The Animation merit badge introduces the art and craft of bringing drawings
    and objects to life. You will learn the principles that make animation
    believable, create your own animated projects, and explore how animation is
    used in the world around you.

requirements:
  - id: "1"
    intro: "General Knowledge. Do the following:"
    children:
      - id: "1a"
        prompt: "In your own words, describe to your counselor what animation is."
        field: { type: text_box, lines: 6 }
      - id: "1b"
        prompt: "Discuss with your counselor a brief history of animation."
        field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      Principles of Animation. Choose five of the following 12 principles of
      animation, and discuss how each one makes an animation appear more
      believable: squash and stretch, anticipation, staging, straight ahead
      action and pose to pose, follow through and overlapping action, slow in and
      slow out, arcs, secondary action, timing, exaggeration, solid drawing, and
      appeal.
    field:
      type: repeated_block
      count: 5
      template:
        - { label: "Principle", type: text_field }
        - { label: "How it makes animation more believable", type: text_box, lines: 3 }

  - id: "3"
    prompt: >
      Projects. With your counselor's approval, choose two animation techniques
      and do the following for each:
    children:
      - id: "3a"
        intro: "Technique 1"
        children:
          - id: "3a1"
            prompt: >
              Plan your animation using thumbnail sketches and/or layout drawings
              either on paper or using an animation software program.
            field: { type: text_box, lines: 6 }
          - id: "3a2"
            prompt: "Create the animation."
            field: { type: checkbox, label: "Created the animation." }
          - id: "3a3"
            prompt: >
              Share your animations with your counselor. Explain how you created
              each one, and discuss any improvements that could be made.
            field: { type: text_box, lines: 6 }
      - id: "3b"
        intro: "Technique 2"
        children:
          - id: "3b1"
            prompt: "Plan your animation using thumbnail sketches and/or layout drawings."
            field: { type: text_box, lines: 6 }
          - id: "3b2"
            prompt: "Create the animation."
            field: { type: checkbox, label: "Created the animation." }
          - id: "3b3"
            prompt: >
              Share your animations with your counselor. Explain how you created
              each one, and discuss any improvements that could be made.
            field: { type: text_box, lines: 6 }

  - id: "4"
    intro: "Animation in our World. Do the following:"
    children:
      - id: "4a"
        prompt: >
          Tour an animation studio or a business where animation is used, either
          in person, via video, or via the internet. Share what you have learned
          with your counselor.
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: >
          Discuss with your counselor how animation might be used in the future
          to make your life more enjoyable and productive.
        field: { type: text_box, lines: 6 }

  - id: "5"
    prompt: >
      Careers. Learn about three career opportunities in animation. Pick one and
      find out about the education, training, and experience required for this
      profession. Discuss your findings with your counselor. Explain why this
      profession might interest you.
    field: { type: text_box, lines: 8 }
