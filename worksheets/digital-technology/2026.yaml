badge:
  name: Digital Technology
  slug: digital-technology
  requirements_revision: "2026-01-01"
  description: >
    Digital technology shapes how we work, learn, and play. This badge explores
    how computers and devices store and process information, how networks and the
    internet work, intellectual property, responsible disposal, and the careers
    behind it all.

requirements:
  - id: "1"
    prompt: >
      View the Personal Safety Awareness "Digital Safety" video (with your parent
      or guardian's permission).
    field: { type: checkbox, label: "Viewed the Personal Safety Awareness \"Digital Safety\" video." }

  - id: "2"
    prompt: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Give a brief history of the changes in digital technology over time.
          Discuss with your counselor how digital technology in your lifetime
          compares with that of your parent's, grandparent's, or other adult's
          lifetime.
        field: { type: text_box, lines: 8 }
      - id: "2b"
        prompt: >
          Describe what kinds of computers or devices you imagine might be
          available when you are an adult.
        field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: "Do the following:"
    children:
      - id: "3a"
        prompt: "Explain to your counselor how text, sound, and pictures are digitized for storage."
        field: { type: text_box, lines: 6 }
      - id: "3b"
        prompt: >
          Describe the difference between lossy and lossless data compression, and
          give an example where each might be used.
        field: { type: text_box, lines: 6 }
      - id: "3c"
        prompt: "Describe two digital devices and how they are made more useful by their programming."
        field:
          type: repeated_block
          count: 2
          template:
            - { label: "Digital device", type: text_field }
            - { label: "How programming makes it more useful", type: text_box, lines: 3 }
      - id: "3d"
        prompt: "Discuss the similarities and differences between computers, mobile devices, and gaming consoles."
        field: { type: text_box, lines: 6 }
      - id: "3e"
        prompt: >
          Explain what a computer network is and the difference between a local
          area network (LAN) versus a wide area network (WAN).
        field: { type: text_box, lines: 6 }

  - id: "4"
    prompt: "Do the following:"
    children:
      - id: "4a"
        prompt: >
          Explain what a program or software application or "app" is and how a
          computer uses a CPU and memory to execute it.
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: >
          Name four software programs or mobile apps you or your family use, and
          explain how each one helps you.
        field:
          type: repeated_block
          count: 4
          template:
            - { label: "Program or app", type: text_field }
            - { label: "How it helps you", type: text_box, lines: 2 }
      - id: "4c"
        prompt: >
          Describe what malware is, and explain how to protect your digital
          devices and the information stored on them.
        field: { type: text_box, lines: 6 }
      - id: "4d"
        prompt: >
          Explain what a barcode, a QR code, and an RFID tag are along with the
          data they contain and two or more examples where each are used.
        field:
          type: labeled_rows
          lines_each: 3
          labels:
            - "Barcode"
            - "QR code"
            - "RFID tag"

  - id: "5"
    prompt: "Do the following:"
    children:
      - id: "5a"
        prompt: "Describe at least two different ways data can be transferred through the internet."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: >
          Using an internet search engine (with a parent or guardian's
          permission), find ideas from at least three different websites about how
          to conduct a troop court of honor or campfire program. Present the ideas
          to your counselor and explain how you used a search engine to find this
          information.
        field: { type: text_box, lines: 8 }
      - id: "5c"
        prompt: >
          Use a web browser to connect to an HTTPS (secure) website (with your
          parent or guardian's permission). Explain to your counselor how to tell
          whether the site's security certificate can be trusted, and what it
          means to use this kind of connection.
        field: { type: text_box, lines: 7 }

  - id: "6"
    prompt: >
      Do THREE of the following. For each project you complete, copy the files to
      a backup device and share the finished projects with your counselor.
    field:
      type: checklist
      items:
        - "(a) Using a spreadsheet or database program, develop a food budget for a patrol weekend campout OR create a troop roster that includes the name, rank, patrol, and telephone number of each Scout. Show your counselor that you can sort the roster by each of the following categories: rank, patrol, and alphabetically by name."
        - "(b) Using a word processor, write a draft letter to the parents of your troop's Scouts, inviting them to a troop event."
        - "(c) Using a graphics program, design and draw a campsite plan for your troop OR create a flyer for an upcoming troop event, incorporating text and some type of visual such as a photograph or an illustration."
        - "(d) Using a presentation software program, develop a report about a topic approved by your counselor. For your presentation, create at least five slides, with each one incorporating text and some type of visual such as a photograph or an illustration."
        - "(e) Using a digital device, take a picture of a troop activity. Send or transfer this image to a device where it can be shared with your counselor."
        - "(f) Make a digital recording of your voice, transfer the file to a different device, and have your counselor play back the recording."
        - "(g) Create a blog and use it as an online journal of your Scouting activities, including group discussions and meetings, campouts, and other events. Include at least five entries and two photographs or illustrations. Share your blog with your counselor. You need not post the blog to the internet; however, if you choose to go live with your blog, you must first share it with your parent or guardian AND counselor AND get their approval."
        - "(h) Create a webpage for your troop, patrol, school, or place of worship. Include at least three articles and two photographs or illustrations. Include at least one link to a website of interest to your audience. You need not post the page to the internet; however, if you decide to do so, you must first share the webpage with your parent or guardian AND counselor AND get their approval."
    children:
      - id: "6-notes"
        prompt: "Notes from your three chosen projects"
        field: { type: text_box, lines: 10 }

  - id: "7"
    prompt: "Do the following:"
    children:
      - id: "7a"
        prompt: >
          Explain to your counselor each of these protections and why they exist:
          copyright, patents, trademarks, trade secrets.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Copyright"
            - "Patents"
            - "Trademarks"
            - "Trade secrets"
      - id: "7b"
        prompt: "Explain when it is permissible to accept a free copy of a program from a friend."
        field: { type: text_box, lines: 5 }
      - id: "7c"
        prompt: >
          Discuss with your counselor an article or (with your parent or
          guardian's permission) a report on the internet about a recent legal
          case involving an intellectual property dispute.
        field: { type: text_box, lines: 6 }

  - id: "8"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Describe why it is important to properly dispose of digital technology. List at least three hazardous chemicals that could be used to create digital devices or used inside a digital device."
        - "(b) Explain to your counselor why it is important to use a certified recycler of digital technology hardware or devices."
        - "(c) Do an internet search for an organization that collects discarded digital technology hardware or devices for repurposing or recycling. Find out what happens to that waste. Share with your counselor what you found."
        - "(d) Visit a recycling center that disposes of digital technology hardware or devices. Find out what happens to that waste. Share what you learned with your counselor."
        - "(e) Find a battery recycling center near you and find out what it does to recycle batteries. Share what you have learned with your counselor about the proper methods for recycling batteries."
    children:
      - id: "8-notes"
        prompt: "Notes from your two chosen options"
        field: { type: text_box, lines: 10 }

  - id: "9"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Explore careers related to the Digital Technology merit badge. Research one career to learn about the training and education needed, costs, job prospects, salary, job duties, and career advancement. Your research methods may include, with your parent or guardian's permission, an internet or library search, an interview with a professional in the field, or a visit to a location where people in this career work. Discuss with your counselor both your findings and what about this profession might make it an interesting career."
        - "(b) Explore how you could use knowledge and skills from the Digital Technology merit badge to pursue a hobby or interest. Research any training needed, expenses, and organizations that promote or support it. Discuss with your counselor what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "9-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
