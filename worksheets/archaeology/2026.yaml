badge:
  name: Archaeology
  slug: archaeology
  requirements_revision: "2026-01-01"
  description: >
    The Archaeology merit badge explores how scientists study the human past
    through the things people left behind. You will learn how archaeological
    sites are found, excavated, and interpreted, why protecting them matters, and
    how the past connects to your own community.

requirements:
  - id: "1"
    prompt: >
      Tell what archaeology is and explain to your counselor how it differs or
      relates to other fields of study such as anthropology, geology,
      paleontology, and history. Explain how archaeology is different than
      artifact collecting or treasure hunting.
    field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      Describe the following steps of the archaeological process: site location,
      development of background research and a research design, site survey and
      fieldwork, artifact identification and examination, interpretation,
      preservation, and information sharing.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - Site location
        - Background research and research design
        - Site survey and fieldwork
        - Artifact identification and examination
        - Interpretation
        - Preservation
        - Information sharing

  - id: "3"
    prompt: >
      Describe at least two ways in which archaeologists determine the age of
      sites, structures, or artifacts. Explain what absolute dating and relative
      dating are.
    field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: >
      Learn about a combined total of five archaeological sites located both
      within and outside the United States.
    children:
      - id: "4a"
        prompt: >
          For EACH site you research, point it out on a map and explain how it
          became known to archaeologists. Describe some of the information about
          the past that has been found at each site. Explain how the information
          gained from the study of these sites answers questions that
          archaeologists are asking and how the information may be important to
          modern people. Compare the relative ages of the sites you research.
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Site and location", type: text_field }
            - { label: "How it became known to archaeologists", type: text_box, lines: 2 }
            - { label: "Information found and its importance", type: text_box, lines: 3 }
      - id: "4a-compare"
        prompt: "Compare the relative ages of the sites you research."
        field: { type: text_box, lines: 5 }
      - id: "4b"
        prompt: >
          Choose ONE of the sites you picked and give a short presentation about
          your findings to a Cub Scout pack, your Scout troop, your school class,
          or another group.
        field: { type: checkbox, label: "Gave a short presentation about one of the sites." }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Learn about the federal laws and international conventions that protect
          archaeological sites. Find out if your state, county, or local
          government has regulations that apply to archaeological or historic
          sites.
        field: { type: text_box, lines: 8 }
      - id: "5b"
        prompt: >
          Identify a national, international, or local organization that helps to
          protect archaeological sites.
        field: { type: text_box, lines: 4 }

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: "Explain why it is important to protect archaeological sites."
        field: { type: text_box, lines: 5 }
      - id: "6b"
        prompt: "Explain what people should do if they think they have found an artifact."
        field: { type: text_box, lines: 5 }
      - id: "6c"
        prompt: "Describe the ways in which you can be a protector of the past."
        field: { type: text_box, lines: 5 }

  - id: "7"
    prompt: "Do ONE of the following and discuss your findings with your counselor:"
    field:
      type: checklist
      items:
        - "Visit a museum to observe how artifacts aid in conveying history."
        - "Present to your counselor a significant family artifact/heirloom and discuss its history."
        - "Make a list of the trash your family throws out during one week. Discuss with your counselor what archaeologists might learn about you and your family if they found your trash a thousand years from now."
    children:
      - id: "7-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }

  - id: "8"
    prompt: >
      Research a group of people who lived in your area more than 100 years ago.
      Find out about their ways of life, including housing, clothing, arts and
      crafts, tools, trade and markets, rituals and religions, and diets, and
      their relationships with other groups of people in the area. Describe what
      you would expect to find at an archaeological site where these people
      lived. Explain how these people influenced your current community.
    field: { type: text_box, lines: 12 }

  - id: "9"
    prompt: >
      Explore careers related to this merit badge. Research one career to learn
      about the training and education needed, costs, job prospects, salary, job
      duties, and career advancement. Your research methods may include, with
      your parent or guardian's permission, an internet or library search, an
      interview with a professional in the field, or a visit to a location where
      people in this career work. Discuss with your counselor both your findings
      and what about this profession might make it an interesting career.
    field: { type: text_box, lines: 10 }

  - id: "10"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "With your parent or guardian's and counselor's permission, assist a qualified archaeologist for at least eight hours with a project being worked on. Projects may include surveying, site monitoring, site stabilization, excavation, laboratory analysis, use of digital archaeological technology, or public outreach. Describe your involvement in the project, what you learned about archaeology, and the steps of archaeological inquiry."
        - "With your counselor's approval, take part in a simulated archaeological project designed by a qualified archaeologist. The project must include the use of a simulated archaeological site including artifacts and features for the site. Using the steps of archaeological inquiry, analyze the artifacts and features and document the spatial relationships of the artifacts and features at the simulated site. Explain how the environment and time can affect the interpretation of an artifact and the overall archaeological site. Tell how you would share the results of your analysis with other researchers and the public."
    children:
      - id: "10-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "11"
    prompt: >
      Under the supervision of a qualified archaeologist or instructor, do ONE of
      the following:
    field:
      type: checklist
      items:
        - "Help prepare an archaeological exhibit for display in a museum, visitor center, school, or other public area."
        - "Use the methods of experimental archaeology to re-create an item or to practice a skill from the past. Write a brief report explaining the experiment and its results."
    children:
      - id: "11-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }
