badge:
  name: Chemistry
  slug: chemistry
  requirements_revision: "2025-01-01"
  description: >
    Chemistry explores the matter that makes up everything around you. Earning
    this badge, you run hands-on experiments, learn to work safely with
    chemicals, and discover how chemistry shapes cooking, camping, the
    environment, and many careers.

requirements:
  - id: "1"
    intro: "Chemistry and Safety. Do the following and discuss with your counselor:"
    children:
      - id: "1a"
        prompt: >
          Obtain safety data sheets (SDS) for sucrose (sugar), isopropyl alcohol
          (rubbing alcohol), and a waterproofing spray. Compare their properties
          and potential hazard(s), including handling and disposal guidelines and
          toxicity information.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          What types of personal protective equipment (PPE) are recommended for
          each, and why? How does the recommended PPE change with toxicity and
          route of exposure?
        field: { type: text_box, lines: 7 }
      - id: "1c"
        prompt: >
          Review the pictograms in Section 2 of each SDS. What do they mean, and
          how do you see them used in your community?
        field: { type: text_box, lines: 6 }
      - id: "1d"
        prompt: >
          Discuss the safe storage of chemicals. How does the safe storage of
          chemicals apply to your home, school, community, and the environment?
        field: { type: text_box, lines: 7 }

  - id: "2"
    intro: "Chemistry and First Aid. After successfully completing requirement 1, do the following:"
    children:
      - id: "2a"
        prompt: >
          Discuss with your counselor why you think soap and alcohol are used to
          clean cuts and scrapes. Discuss how you could test your hypotheses with
          your counselor.
        field: { type: text_box, lines: 6 }
      - id: "2b"
        prompt: >
          Coat your hands with a mixture of cooking oil and a nontoxic powder,
          such as sand or cocoa. Wash your hands with water and observe what
          happens. Coat your hands again, then wash with soap and water. Discuss
          the differences with your counselor.
        field: { type: text_box, lines: 7 }
      - id: "2c"
        prompt: >
          Perform an experiment to demonstrate how rubbing alcohol affects
          microbial growth using baker's yeast. Discuss the results with your
          counselor.
        field: { type: text_box, lines: 7 }

  - id: "3"
    intro: "Chemistry and Cooking. After successfully completing requirement 1, do EACH of the following:"
    children:
      - id: "3a"
        prompt: >
          Perform a Maillard, or browning, reaction. Discuss with your counselor
          whether a physical or chemical change has occurred, and what happened
          to molecules in the food during the cooking process.
        field: { type: text_box, lines: 7 }
      - id: "3b"
        prompt: >
          Prepare and use red cabbage indicator to measure the pH of five common
          household liquids, including water. Discuss your observations with your
          counselor.
        field:
          type: table
          headers: ["Household liquid", "Color with indicator", "Estimated pH"]
          rows: 5
          cols: 3

  - id: "4"
    intro: "Chemistry and Camping. After successfully completing requirement 1, do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Design and conduct an experiment to compare at least two different types of waterproofing. Discuss with your counselor which one you would prefer to use on your tent and which one you would prefer to use on your boots, and why."
        - "(b) Describe the four classes of fires, and the four classes of fire extinguishers. Discuss with your counselor how sand, baking soda, and the four classes of extinguishers work to put out fires."
        - "(c) Under your counselor's supervision and/or the supervision of a knowledgeable adult approved in advance by your counselor, conduct flame tests of at least five elements using a kitchen or propane torch."
        - "(d) Under your counselor's supervision and/or the supervision of a knowledgeable adult approved in advance by your counselor, synthesize nylon (may be from a kit)."
    children:
      - id: "4notes"
        prompt: "Notes from your two chosen options"
        field: { type: text_box, lines: 10 }

  - id: "5"
    prompt: >
      Describe how chemistry can be used to reduce the environmental impacts of
      single-use items, such as water bottles, bags, straws, or batteries.
    field: { type: text_box, lines: 7 }

  - id: "6"
    prompt: >
      Identify five fields of chemistry. Briefly describe each, tell how each
      applies to your life and how they interact.
    field:
      type: repeated_block
      count: 5
      template:
        - { label: "Field of chemistry", type: text_field }
        - { label: "Description & how it applies to your life", type: text_box, lines: 3 }

  - id: "7"
    prompt: >
      Identify three government agencies that oversee or provide guidance on the
      use of chemicals for personal, pharmaceutical, commercial, or industrial
      use, and discuss the agencies' history and responsibilities with your
      counselor.
    field:
      type: repeated_block
      count: 3
      template:
        - { label: "Agency", type: text_field }
        - { label: "History & responsibilities", type: text_box, lines: 3 }

  - id: "8"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Visit a research laboratory, and discuss the research performed there with a chemist or chemical technician. Learn what education and training they received."
        - "(b) Visit a company or plant that makes chemical products or uses chemical processes. Learn about their products or processes, and talk with someone who works there. Learn what they do, and what education and training they received."
        - "(c) Identify three career opportunities that would use skills and knowledge in chemistry. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
    children:
      - id: "8notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
