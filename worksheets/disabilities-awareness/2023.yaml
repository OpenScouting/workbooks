badge:
  name: Disabilities Awareness
  slug: disabilities-awareness
  requirements_revision: "2023-01-01"
  description: >
    Disabilities Awareness helps you understand the experiences of people with
    disabilities and how communities can be more accessible and welcoming. This
    badge has you learn the language of disability, examine accessibility
    firsthand, and become an advocate.

requirements:
  - id: "1"
    prompt: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain and discuss with your counselor the following disabilities
          awareness terms: disability, accessibility, adaptation, accommodation,
          invisible disability, and person-first language.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Disability"
            - "Accessibility"
            - "Adaptation"
            - "Accommodation"
            - "Invisible disability"
            - "Person-first language"
      - id: "1b"
        prompt: >
          Explain why proper disability etiquette is important, and how it may
          differ depending on the specific disability. Give three examples.
        field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      Visit an agency that works with people with physical, mental, emotional, or
      educational disabilities. Collect and read information about the agency's
      activities. Learn about opportunities its members have for training,
      employment, and education. Discuss what you have learned with your
      counselor.
    field: { type: text_box, lines: 10 }

  - id: "3"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Talk with a Scout who has a disability and learn about the Scout's experiences taking part in Scouting activities and earning different merit badges. Discuss what you have learned with your counselor."
        - "(b) Talk with an individual who has a disability and learn about this person's experiences and the activities in which this person likes to participate. Discuss what you have learned with your counselor."
        - "(c) Learn how people with disabilities take part in a particular adaptive sport or recreational activity. Discuss what you have learned with your counselor."
        - "(d) Learn about independent living aids such as service animals, canes, and augmentative communication devices such as captioned telephones and videophones. Discuss with your counselor how people use such aids."
        - "(e) Plan or participate in an activity that helps others understand what a person with a visible or invisible disability experiences. Discuss what you have learned with your counselor."
    children:
      - id: "3-notes"
        prompt: "Notes from your two chosen options"
        field: { type: text_box, lines: 10 }

  - id: "4"
    intro: "Do ONE of the following options:"
    children:
      - id: "4A"
        prompt: >
          Option A. Access. Visit TWO of the following locations and take notes
          about the accessibility to people with disabilities. In your notes, give
          examples of five things that could be done to improve upon the site and
          five things about the site that make it friendly to people with
          disabilities. Discuss your observations with your counselor.
        field:
          type: checklist
          items:
            - "(1) Your school"
            - "(2) Your place of worship"
            - "(3) A Scouting event or campsite"
            - "(4) A public exhibit or attraction (such as a theater, museum, or park)"
        children:
          - id: "4A-notes"
            prompt: "Notes on your two chosen locations: five improvements and five accessible features for each"
            field: { type: text_box, lines: 10 }
      - id: "4B"
        prompt: >
          Option B. Accommodation. Visit TWO of the following locations and take
          notes while observing features and methods that are used to accommodate
          people with invisible disabilities. While there, ask staff members to
          explain any accommodation features that may not be obvious. Note
          anything you think could be done to better accommodate people who have
          invisible disabilities. Discuss your observations with your counselor.
        field:
          type: checklist
          items:
            - "(1) Your school"
            - "(2) Your place of worship"
            - "(3) A Scouting event or campsite"
            - "(4) A public exhibit or attraction (such as a theater, museum, or park)"
        children:
          - id: "4B-notes"
            prompt: "Notes on your two chosen locations and the accommodation features you observed"
            field: { type: text_box, lines: 10 }

  - id: "5"
    prompt: "Explain what advocacy is. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Present a counselor-approved disabilities awareness program to a Cub Scout pack or other group. During your presentation, explain and use person-first language."
        - "(b) Find out about disabilities awareness education programs in your school or school system, or contact a disability advocacy agency. Volunteer with a program or agency for eight hours."
        - "(c) Using resources such as disability advocacy agencies, government agencies, the internet (with your parent or guardian's permission), and news magazines, learn about myths and misconceptions that influence the general public's understanding of people with disabilities. List 10 myths and misconceptions about people with disabilities and learn the facts about each myth. Share your list with your counselor, then use it to make a presentation to a Cub Scout pack or other group."
    children:
      - id: "5-advocacy"
        prompt: "Explain what advocacy is."
        field: { type: text_box, lines: 5 }
      - id: "5-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "6"
    prompt: >
      Make a commitment to your counselor describing what you will do to show a
      positive attitude about and toward people with disabilities and to
      encourage positive attitudes among others. Discuss how your awareness has
      changed as a result of what you have learned.
    field: { type: text_box, lines: 8 }

  - id: "7"
    prompt: >
      Name five professions that provide services to people with disabilities.
      Pick one that interests you and find out the education, training, and
      experience required for this profession. Discuss what you learn with your
      counselor, and tell why this profession interests you.
    field: { type: text_box, lines: 10 }
