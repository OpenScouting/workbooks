badge:
  name: Insect Study
  slug: insect-study
  requirements_revision: "2025-01-01"
  description: >
    Insects are the most abundant animals on Earth, and they shape nearly every
    ecosystem we depend on. Earning this badge teaches you to identify insects,
    understand their life cycles and roles in nature, and observe them
    responsibly in the field.

requirements:
  - id: "1"
    intro: "Safety. Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely hazards associated with
          exposure to ants and bees and what you should do to anticipate, help
          prevent, mitigate, and respond to these hazards.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Discuss the prevention of and treatment for health concerns that could
          occur while working with ants and bees, including insect bites and
          anaphylactic shock.
        field: { type: text_box, lines: 6 }

  - id: "2"
    intro: "Anatomy. Do the following:"
    children:
      - id: "2a"
        prompt: "Tell how insects are different from other animals."
        field: { type: text_box, lines: 5 }
      - id: "2b"
        prompt: "Show how insects are different from millipedes and spiders."
        field: { type: text_box, lines: 5 }
      - id: "2c"
        prompt: "Point out and name the main parts of an insect."
        field: { type: text_box, lines: 5 }
      - id: "2d"
        prompt: "Describe the characteristics that distinguish the major orders of insects."
        field: { type: text_box, lines: 8 }

  - id: "3"
    intro: "Life Cycles. Do the following:"
    children:
      - id: "3a"
        prompt: >
          Compare the life histories of a butterfly and a grasshopper. Tell how
          they are different.
        field: { type: text_box, lines: 6 }
      - id: "3b"
        prompt: >
          Raise an insect through complete metamorphosis from its larval stage
          to its adult stage (e.g., raise a butterfly or moth from a
          caterpillar). (Some insects are endangered species and are protected
          by federal or state law. Every species is found only in its own
          special type of habitat. Be sure to check natural resources
          authorities in advance to be sure that you will not be collecting any
          species that is known to be protected or endangered, or in any habitat
          where collecting is prohibited. In most cases, all specimens should be
          returned at the location of capture after the requirement has been met.
          Check with your counselor for those instances where the return of
          these specimens would not be appropriate.)
        field: { type: text_box, lines: 6 }

  - id: "4"
    intro: "Observation and Analysis. Do the following:"
    children:
      - id: "4a"
        prompt: >
          Discuss the importance of the Leave No Trace Seven Principles and the
          Outdoor Code as they relate to insect study. Explain how you have
          followed the Leave No Trace Seven Principles and the Outdoor Code
          during field observation, specimen collection, and identification.
        field: { type: text_box, lines: 8 }
      - id: "4b"
        prompt: >
          Observe 20 different live species of insects in their habitat. In your
          observations, include at least four orders of insects.
        field:
          type: table
          headers: ["Species", "Order", "Habitat / where observed"]
          rows: 20
          cols: 3
      - id: "4c"
        prompt: >
          Make a scrapbook of the 20 insects you observe in 4(b). Include
          photographs, sketches, illustrations, and articles. Label each insect
          with its common and scientific names, where possible. Share your
          scrapbook with your counselor.
        field: { type: checkbox, label: "Scrapbook completed and shared with your counselor." }
      - id: "4d"
        prompt: >
          From your scrapbook collection, select eight species of insects and
          identify what role they play in the ecosystem.
        field:
          type: repeated_block
          count: 8
          template:
            - { label: "Species", type: text_field }
            - { label: "Role in the ecosystem", type: text_box, lines: 2 }

  - id: "5"
    intro: "Social Insects. Do the following:"
    children:
      - id: "5a"
        prompt: "Tell things that make social insects different from solitary insects."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Do ONE of the following:"
        field:
          type: checklist
          items:
            - "Observe an ant colony in a formicarium (ant farm). Find the queen and worker ants. Explain to your counselor the different chambers found within an ant colony."
            - "Study a hive of bees. Remove the combs and find the queen. Estimate the amount of brood and count the number of queen cells. Explain how to determine the amount of honey in the hive. (If you are allergic to bee stings, pick option 1 above.)"
        children:
          - id: "5b-notes"
            prompt: "Notes from your chosen option"
            field: { type: text_box, lines: 6 }

  - id: "6"
    intro: "Ecology. Do the following:"
    children:
      - id: "6a"
        prompt: "Tell how insects fit in the food web of other insects, fish, birds, and mammals."
        field: { type: text_box, lines: 6 }
      - id: "6b"
        prompt: "Explain the role insects serve as pollinators for plants."
        field: { type: text_box, lines: 6 }

  - id: "7"
    intro: "Insects and People. Do the following:"
    children:
      - id: "7a"
        prompt: >
          Explain the symbiotic relationship between bees and humankind. Explain
          what colony collapse disorder (CCD) is and some of the possible causes.
          Discuss how CCD affects our food supply.
        field: { type: text_box, lines: 8 }
      - id: "7b"
        prompt: >
          Describe three alternatives to insecticides as a way of preventing
          crop injury and subsequent yield loss. Explain the advantages and
          disadvantages of these alternatives.
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Alternative", type: text_field }
            - { label: "Advantages", type: text_box, lines: 2 }
            - { label: "Disadvantages", type: text_box, lines: 2 }

  - id: "8"
    intro: "Conservation. Do the following:"
    children:
      - id: "8a"
        prompt: >
          Tell the migration route of an insect (e.g., monarch butterfly).
          Discuss the challenges they face and how Scouts can contribute to
          their success.
        field: { type: text_box, lines: 7 }
      - id: "8b"
        prompt: >
          Find out about an insect that is a threatened or endangered species.
          Discuss the challenges they face and how Scouts can contribute to
          their success.
        field: { type: text_box, lines: 7 }

  - id: "9"
    prompt: "Careers and Hobbies. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "Identify three career opportunities that would use skills and knowledge in Insect Study. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "Identify three career opportunities that would use skills and knowledge in Insect Study. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
    children:
      - id: "9-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }

reference_pages:
  - title: "Outdoor Ethics"
    columns:
      - title: "The Principles of Leave No Trace"
        body: shared/leave-no-trace.md
      - title: "The Outdoor Code"
        body: shared/outdoor-code.md
