badge:
  name: Backpacking
  slug: backpacking
  requirements_revision: "2024-01-01"
  description: >
    Backpacking takes you deep into the backcountry carrying everything you
    need on your back. Earning this badge builds the planning, fitness, and
    Leave No Trace skills to travel and camp safely on multi-day treks far from
    the trailhead.

requirements:
  - id: "1"
    prompt: >
      Discuss the prevention of and treatment for the health concerns that
      could occur while backpacking, including hypothermia, heat reactions,
      frostbite, dehydration, insect stings, tick bites, snakebite, and
      blisters.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - Hypothermia
        - Heat reactions
        - Frostbite
        - Dehydration
        - Insect stings
        - Tick bites
        - Snakebite
        - Blisters

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          List the 10 Scout Basic Essentials to be carried on any backpacking
          trek and explain why each item is necessary.
        field:
          type: table
          headers: ["Item", "Why it is necessary"]
          rows: 10
          cols: 2
      - id: "2b"
        prompt: >
          Describe 10 ways you can limit the weight and bulk to be carried in
          your pack without jeopardizing your health or safety.
        field: { type: text_box, lines: 10 }

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: "Define limits on the number of backpackers appropriate for a trek crew."
        field: { type: text_box, lines: 4 }
      - id: "3b"
        prompt: "Describe how a trek crew should be organized."
        field: { type: text_box, lines: 5 }
      - id: "3c"
        prompt: "Tell how you would minimize risk on a backpacking trek."
        field: { type: text_box, lines: 5 }
      - id: "3d"
        prompt: "Explain the purpose of an emergency response plan."
        field: { type: text_box, lines: 5 }

  - id: "4"
    intro: "Do the following:"
    children:
      - id: "4a"
        prompt: >
          Describe the importance of following the Leave No Trace Seven
          Principles and the Outdoor Code while backpacking, and at least five
          ways you can lessen the crew's impact on the environment.
        field: { type: text_box, lines: 8 }
      - id: "4b"
        prompt: >
          Describe proper methods of handling human and other wastes while on a
          backpacking trek. Describe the importance of and means to assure
          personal cleanliness while on a backpacking trek.
        field: { type: text_box, lines: 8 }
      - id: "4c"
        prompt: "Tell what factors are important in choosing a campsite."
        field: { type: text_box, lines: 6 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: "Demonstrate two ways to treat water and tell why water treatment is essential."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Explain to your counselor the importance of staying well-hydrated during a trek."
        field: { type: text_box, lines: 5 }

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        field: { type: checkbox, label: "Demonstrate that you can read topographic maps." }
      - id: "6b"
        field:
          type: checkbox
          label: >
            While on a trek, use a map and compass to establish your position on
            the ground at three different locations, OR use a GPS receiver to
            establish your position on a topographic map and on the ground at
            three different locations.
      - id: "6c"
        prompt: "Explain how to stay found, and what to do if you get lost."
        field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: "Tell how to properly prepare for and deal with inclement weather."
    field: { type: text_box, lines: 7 }

  - id: "8"
    intro: "Do the following:"
    children:
      - id: "8a"
        prompt: >
          Explain the advantages and disadvantages of the different types of
          backpacking stoves using at least three different types of fuel.
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Stove / fuel type", type: text_field }
            - { label: "Advantages", type: text_box, lines: 3 }
            - { label: "Disadvantages", type: text_box, lines: 3 }
      - id: "8b"
        field:
          type: checkbox
          label: >
            Demonstrate that you know how to operate a backpacking stove safely
            and to handle liquid fuel safely.
      - id: "8c"
        field: { type: checkbox, label: "Prepare three meals using a stove and fuel you can carry in a backpack." }
      - id: "8d"
        field:
          type: checkbox
          label: >
            Demonstrate that you know how to keep cooking and eating gear clean
            and sanitary, and that you practice proper methods for food storage
            while on a backpacking trek.

  - id: "9"
    intro: "Do the following:"
    children:
      - id: "9a"
        prompt: >
          Write a plan that includes a schedule for a patrol/crew backpacking
          hike of at least 2 miles.
        field: { type: text_box, lines: 10 }
      - id: "9b"
        field: { type: checkbox, label: "Conduct a prehike inspection of the patrol and its equipment." }
      - id: "9c"
        field:
          type: checkbox
          label: >
            Show that you know how to properly pack your personal gear and your
            share of the crew's gear and food.
      - id: "9d"
        field: { type: checkbox, label: "Show you can properly shoulder your pack and adjust it for proper wear." }
      - id: "9e"
        field:
          type: checkbox
          label: >
            While using the plan you developed for requirement 9(a), carry your
            fully loaded pack to complete a hike of at least 2 miles.

  - id: "10"
    prompt: >
      Following the Leave No Trace Seven Principles and the Outdoor Code,
      participate in at least three backpacking treks of at least three days
      each and at least 15 miles each, and using at least two different
      campsites on each trek. Carry everything you will need throughout the
      trek.
    field:
      type: table
      headers: ["Trek dates", "Location", "Days", "Miles", "Campsites used"]
      rows: 3
      cols: 5

  - id: "11"
    intro: "Do the following:"
    children:
      - id: "11a"
        prompt: >
          Write a plan for a backpacking trek of at least five days using at
          least three different campsites and covering at least 30 miles. Your
          plan must include a description of and route to the trek area, a
          schedule (including a daily schedule), a list of food and equipment
          needs, a safety and emergency plan, and a budget.
        field: { type: text_box, lines: 14 }
      - id: "11b"
        field:
          type: checkbox
          label: >
            Following the Leave No Trace Seven Principles and the Outdoor Code,
            take the trek as planned in requirement 11(a) that is at least five
            full days, covering at least 30 miles and utilizing at least three
            different campsites. While on trek, complete at least one service
            project approved by your counselor.
      - id: "11c"
        prompt: >
          Keep a daily journal during the trek that includes a day-by-day
          description of your activities, including notes about what worked well
          and thoughts about improvements that could be made for the next trek.
        field: { type: text_box, lines: 14 }

reference_pages:
  - title: "Outdoor Ethics"
    columns:
      - title: "The Principles of Leave No Trace"
        body: shared/leave-no-trace.md
      - title: "The Outdoor Code"
        body: shared/outdoor-code.md
