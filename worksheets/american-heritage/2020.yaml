badge:
  name: American Heritage
  slug: american-heritage
  requirements_revision: "2020-01-01"
  description: >
    The American Heritage merit badge connects Scouts to the people, events,
    documents, and symbols that have shaped the United States. Scouts read
    the Declaration of Independence, research a local historical topic, and
    reflect on how the past continues to influence Americans today.

requirements:
  - id: "1"
    prompt: >
      Read the Declaration of Independence. Pay close attention to the
      section that begins with "We hold these truths to be self-evident"
      and ends with "to provide new Guards for their future security."
      Rewrite that section in your own words, making it as easy to
      understand as possible. Then, share your writing with your counselor
      and discuss the importance of the Declaration to all Americans.
    field: { type: text_box, lines: 14 }

  - id: "2"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Select two individuals from American history, one a political leader and the other a private citizen. Compare the contributions each has made to America's heritage."
        - "(b) With your counselor's approval, choose an organization that has promoted positive change in American society. Find out why the change was needed and how it was accomplished."
        - "(c) With your counselor's approval, interview two veterans of the U.S. military about their experiences and what they believe they accomplished."
        - "(d) With your counselor's approval, interview three people in your community of different ages and occupations about what America means to them."
    children:
      - id: "2-notes"
        prompt: "Notes from your two chosen activities"
        field: { type: text_box, lines: 14 }

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: >
          Select a topic related to the United States that is currently in
          the news. Describe to your counselor what is happening. Explain
          how today's events are related to or affected by the events and
          values of America's past.
        field: { type: text_box, lines: 10 }
      - id: "3b"
        prompt: >
          For each of the following, describe its adoption, tell about any
          changes since its adoption, and explain how it continues to
          influence Americans today.
        field:
          type: labeled_rows
          lines_each: 3
          labels:
            - "The flag"
            - "The Pledge of Allegiance"
            - "The Great Seal of the United States"
            - "The motto"
            - "The national anthem"
      - id: "3c"
        prompt: >
          Research your family's history. Find out how various events and
          situations in American history affected your family. If your
          family immigrated to America, tell the reasons why. Share what
          you find with your counselor.
        field: { type: text_box, lines: 10 }

  - id: "4"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Explain the National Register of Historic Places and how a property becomes eligible for listing. Map points of historical interest in your local area and any National Register properties."
        - "(b) Research an event of historical importance that took place in or near your area. If possible, visit the place. Describe how the area looked then and now."
        - "(c) Find out when, why, and how your town or neighborhood started, and what ethnic, national, or racial groups played a part. Explain how it has changed over the past 50 years."
        - "(d) Take an active part in a program about an event or person in American history. Report on the program, the part you took, and the subject."
        - "(e) Visit a historic trail or walk in your area. Discuss its importance and explain why you think it might qualify for National Register listing."
    children:
      - id: "4-notes"
        prompt: "Notes from your two chosen activities"
        field: { type: text_box, lines: 14 }

  - id: "5"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Watch two motion pictures set in some period of American history (with approval). Describe how accurate each film is regarding the historical events and how characters are portrayed."
        - "(b) Read a biography (with approval) of someone who has contributed to America's heritage. Tell what you admire and what you do not, and whether their contribution was positive or negative."
        - "(c) Listen to recordings of popular songs from various periods of American history. Share five with your counselor and describe how each reflects how people felt about its period."
    children:
      - id: "5-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 12 }

  - id: "6"
    prompt: >
      Discuss with your counselor the career opportunities in American
      heritage. Pick one that interests you and explain how to prepare for
      this career. Discuss what education and training are required.
    field: { type: text_box, lines: 10 }
