badge:
  name: Truck Transportation
  slug: truck-transportation
  requirements_revision: "2026-01-01"
  description: >
    Trucks move the goods that keep communities supplied. Scouts learn how
    trucking fits into commerce and the supply chain, visit a terminal, study
    the engines and equipment involved, and explore how a shipment is planned
    and a trucking company is organized.

requirements:
  - id: "1"
    prompt: "List the major truck lines serving your town."
    field: { type: text_box, lines: 5 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Describe the role of truck transportation within commerce (the
          movement of goods, funds, and information).
        field: { type: text_box, lines: 6 }
      - id: "2b"
        prompt: >
          Describe how trucks fit into a company's supply chain. This could be a
          manufacturer, importer, wholesaler, or retailer.
        field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: >
          On paper, map out how goods that are manufactured overseas are
          transported to a retailer in this country.
        field: { type: draw_area, height: 4 }

  - id: "3"
    prompt: >
      Describe the difference between the gasoline engine and the diesel engine
      that power trucks. List the advantages of each.
    field:
      type: pair_grid
      left_title: "Gasoline engine"
      right_title: "Diesel engine"
      col_headers: ["Description and advantages"]
      rows: 6

  - id: "4"
    prompt: >
      Visit a truck terminal and complete items 4(a) through 4(e). After your
      visit, share what you have learned with your counselor.
    children:
      - id: "4a"
        prompt: >
          Find out what kind of maintenance program the company follows to help
          keep its fleet, drivers, and the roadway safe.
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: >
          Find out how dispatchers maintain communication with drivers on the
          road.
        field: { type: text_box, lines: 5 }
      - id: "4c"
        prompt: >
          Talk with a professional truck driver about safety. Learn about the
          truck driver's rules of the road for safe driving. List five
          safe-driving rules every professional truck driver must follow.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Rule 1"
            - "Rule 2"
            - "Rule 3"
            - "Rule 4"
            - "Rule 5"
      - id: "4d"
        prompt: >
          Review the driver's log and find out what kind of information the log
          contains.
        field: { type: text_box, lines: 6 }
      - id: "4e"
        prompt: >
          Learn about important federal regulations that help ensure public
          safety.
        field: { type: text_box, lines: 6 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Outline the general organization of a trucking company. Describe what
          each department does.
        field: { type: text_box, lines: 8 }
      - id: "5b"
        prompt: "List five positions with trucking companies and describe each one."
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Position", type: text_field }
            - { label: "Description", type: text_box, lines: 2 }

  - id: "6"
    prompt: >
      Name five government agencies that work closely with the trucking
      industry. Describe their role.
    field:
      type: repeated_block
      count: 5
      template:
        - { label: "Agency", type: text_field }
        - { label: "Role", type: text_box, lines: 2 }

  - id: "7"
    prompt: "List five different kinds of trucks. Tell the service each provides."
    field:
      type: repeated_block
      count: 5
      template:
        - { label: "Kind of truck", type: text_field }
        - { label: "Service it provides", type: text_box, lines: 2 }

  - id: "8"
    prompt: >
      Assume that you are going to ship by truck 500 pounds of goods (freight
      class 65) from your town to another town 500 miles away. Your shipment must
      arrive within three days. Explain in writing:
    children:
      - id: "8a"
        prompt: "How to prepare the shipment"
        field: { type: text_box, lines: 5 }
      - id: "8b"
        prompt: "How to compare at least three carriers for time in transit and rates"
        field: { type: text_box, lines: 5 }
      - id: "8c"
        prompt: "How to choose which carrier to use"
        field: { type: text_box, lines: 5 }
      - id: "8d"
        prompt: "How to insure the shipment for damages"
        field: { type: text_box, lines: 5 }

  - id: "9"
    prompt: >
      Explain the following terms: bill of lading, ETA, logbook, intermodal,
      containers, tariff, shippers, carrier, consignee, drayage, and cartage.
    field:
      type: labeled_rows
      lines_each: 1
      labels:
        - "Bill of lading"
        - ETA
        - Logbook
        - Intermodal
        - Containers
        - Tariff
        - Shippers
        - Carrier
        - Consignee
        - Drayage
        - Cartage

  - id: "10"
    prompt: >
      Explore careers related to this merit badge. Research one career to learn
      about the training and education needed, costs, job prospects, salary, job
      duties, and career advancement. Your research methods may include, with
      your parent or guardian's permission, an internet or library search, an
      interview with a professional in the field, or a visit to a location where
      people in this career work. Discuss with your counselor both your findings
      and what about this profession might make it an interesting career.
    field: { type: text_box, lines: 10 }
