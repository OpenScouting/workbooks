badge:
  name: Mining in Society
  slug: mining-in-society
  requirements_revision: "2026-01-01"
  description: >
    Mining provides the minerals and metals that make modern life possible.
    Earning this badge, you explore how resources are found and extracted, the
    safety and environmental challenges of mining, and its role in your community.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Select 10 different minerals. For each one, name a product for which the
          mineral is used.
        field:
          type: table
          headers: ["Mineral", "Product"]
          rows: 10
          cols: 2
      - id: "1b"
        prompt: "Explain the role mining has in producing and processing things that are grown."
        field: { type: text_box, lines: 6 }
      - id: "1c"
        prompt: >
          From the list of minerals you chose for requirement 1(a), determine the
          countries where those minerals can be found, and discuss what you learned
          with your counselor.
        field:
          type: table
          headers: ["Mineral", "Countries where found"]
          rows: 10
          cols: 2

  - id: "2"
    prompt: >
      Obtain a map of your state or region showing major cities, highways, rivers,
      and railroads. Mark the locations of five mining enterprises. Find out what
      resource is processed at each location, and identify the mine as a surface or
      underground operation. Discuss with your counselor how the resources mined at
      these locations are used.
    field:
      type: table
      headers: ["Location", "Resource processed", "Surface or underground", "How the resource is used"]
      rows: 5
      cols: 4

  - id: "3"
    prompt: >
      Discuss with your counselor the potential hazards a miner may encounter at an
      active mine and the protective measures used by miners. In your discussion,
      explain how:
    children:
      - id: "3a"
        prompt: >
          The miner's personal protective equipment is worn and used, including a
          hard hat, safety glasses, earplugs, dust mask or respirator, self-rescue
          device, and high-visibility vest.
        field: { type: text_box, lines: 6 }
      - id: "3b"
        prompt: >
          Miners protect their hands and feet from impact, pinch, vibration,
          slipping, and tripping/falling hazards.
        field: { type: text_box, lines: 5 }
      - id: "3c"
        prompt: >
          Monitoring equipment warns miners of imminent danger, and how robots,
          drones, and other technology may be used in mine rescues.
        field: { type: text_box, lines: 5 }

  - id: "4"
    prompt: >
      Discuss with your counselor the dangers someone might encounter at an
      abandoned mine or quarry.
    field: { type: text_box, lines: 6 }

  - id: "5"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) With your parent or guardian's approval and your counselor's assistance, use the internet to find and take a virtual tour of two types of mines. Determine the similarities and differences between them regarding resource exploration, mine planning and permitting, types of equipment used, and the minerals produced. Discuss with your counselor what you learned from your internet-based mine tours."
        - "(b) With your parent or guardian's permission and counselor's approval, visit a mining or minerals exhibit at a museum. Find out about the history of the museum's exhibit and the type of mining it represents. Give three examples of how mineral resources have influenced history."
        - "(c) With your parent or guardian's permission and counselor's approval, visit an active mine. Find out about the tasks required to explore, plan, permit, mine, and process the resource mined at that site. Take photographs, if allowed, and request brochures from your visit. Share photos, brochures, and what you have learned with your counselor."
        - "(d) With your parent or guardian's permission and counselor's approval, visit a mining equipment manufacturer or supplier. Discuss the types of equipment produced or supplied there, and in what part of the mining process this equipment is used. Take photographs if allowed, and request brochures from your visit. Share photos, brochures, and what you have learned with your counselor."
        - "(e) Discuss with your counselor two methods used to reduce rock in size, one of which uses a chemical process to extract a mineral. Explain the difference between smelting and refining."
        - "(f) Learn about the history of a local mine, including what is or was mined there, how the deposit was found, the mining techniques and processes used, and how the mined resource is or was used. Find out from a historian, community leader, or business person how mining has affected your community. Note any social, cultural, or economic consequences of mining in your area. Share what you have learned with your counselor."
    children:
      - id: "5-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: >
          Choose a modern mining site. Find out what is being done to help control
          environmental impacts. Share what you have learned about mining and
          sustainability.
        field: { type: text_box, lines: 6 }
      - id: "6b"
        prompt: >
          Explain reclamation as it is used in mining and how mine reclamation
          pertains to the Leave No Trace Seven Principles and the Outdoor Code.
        field: { type: text_box, lines: 6 }
      - id: "6c"
        prompt: >
          Discuss with your counselor what values society has about returning the
          land to the benefit of wildlife and people after mining has ended.
          Discuss the transformation of the Scouting America's Summit Bechtel
          Family National Scout Reserve from a mine site to its current role.
        field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Explore the anticipated benefits of interplanetary mining. Learn how NASA and private investors may search for, extract, and process minerals in outer space, and the primary reasons for mining the moon, other planets, or near-Earth asteroids. Find out how exploration and mineral processing in space differ from exploration on Earth. Share what you have learned with your counselor, and discuss the difficulties encountered in exploring, collecting, and analyzing surface or near-surface samples in space."
        - "(b) Identify three minerals found dissolved in seawater or found on the ocean floor, and list three places where the ocean is mined today. Share this information with your counselor, and discuss the chief incentives for mining the oceans for minerals, the reclamation necessary after mining is over, and any special concerns when mining minerals from the ocean. Find out what sustainability problems arise from mining the oceans. Discuss what you learned with your counselor."
        - "(c) Learn what metals and minerals are recycled after their original use has ended. List four metals and two nonmetals, and find out how each can be recycled. Find out how recycling affects the sustainability of natural resources and how this idea is related to mining. Discuss what you learn with your counselor."
        - "(d) With your parent or guardian's permission, use the internet and other resources to determine the current price of gold, copper, aluminum, or other commodities like cement or coal, and find out the five-year price trend for two of these. Report your findings to your counselor."
    children:
      - id: "7-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "8"
    prompt: >
      Explore careers related to this merit badge. Research one career to learn
      about the training and education needed, costs, job prospects, salary, job
      duties, and career advancement. Your research methods may include, with your
      parent or guardian's permission, an internet or library search, an interview
      with a professional in the field, or a visit to a location where people in
      this career work. Discuss with your counselor both your findings and what
      about this profession might make it an interesting career.
    field: { type: text_box, lines: 8 }

reference_pages:
  - title: "Outdoor Ethics"
    columns:
      - title: "The Principles of Leave No Trace"
        body: shared/leave-no-trace.md
      - title: "The Outdoor Code"
        body: shared/outdoor-code.md
