badge:
  name: Canoeing
  slug: canoeing
  requirements_revision: "2026-01-01"
  description: >
    Canoeing is a classic way to explore lakes and rivers under your own power.
    Earning this badge, you learn water safety, equipment, and the tandem
    paddling strokes and rescue techniques needed to handle a canoe with
    confidence.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Review with your counselor the most likely hazards you may encounter
          while participating in canoeing activities and what you should do to
          anticipate, help prevent, mitigate, and respond to these hazards.
        field: { type: text_box, lines: 7 }
      - id: "1b"
        prompt: >
          Review prevention, symptoms, and first-aid treatment for the following
          injuries or illnesses that could occur while canoeing: blisters,
          cold-water shock and hypothermia, dehydration, heat-related illnesses,
          sunburn, sprains, and strains.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Blisters
            - Cold-water shock and hypothermia
            - Dehydration
            - Heat-related illnesses
            - Sunburn
            - Sprains and strains
      - id: "1c"
        prompt: >
          Discuss the Scouting America Safety Afloat policy. Tell how it applies
          to canoeing activities.
        field: { type: text_box, lines: 7 }

  - id: "2"
    field:
      type: checkbox
      label: >
        Before doing the following requirements, successfully complete the
        Scouting America swimmer test, found in the Swimming merit badge
        pamphlet.

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: "Name and point out the major parts of a canoe."
        field: { type: text_box, lines: 4 }
      - id: "3b"
        prompt: "Describe how the length and shape of a canoe affect its performance."
        field: { type: text_box, lines: 5 }

  - id: "4"
    intro: "Do the following:"
    children:
      - id: "4a"
        prompt: "Name and point out the parts of a paddle."
        field: { type: text_box, lines: 4 }
      - id: "4b"
        prompt: >
          Demonstrate how to correctly size a paddle for a paddler in a sitting
          position and a kneeling position.
        field: { type: text_box, lines: 4 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Review with your counselor the characteristics of life jackets most
          appropriate for canoeing and tell why a life jacket must always be
          worn while paddling.
        field: { type: text_box, lines: 6 }
      - id: "5b"
        field: { type: checkbox, label: "Demonstrate how to select and properly fit the correct size life jacket." }
      - id: "5c"
        prompt: >
          Review the importance of safety and rescue equipment such as a sound
          signal device, extra paddle, sponge, bailer, bilge pump, rescue sling,
          ropes, and throw bag.
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: >
      Review with your counselor the general care and maintenance of canoes,
      paddles, and other canoeing equipment.
    field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: "With a companion, use a properly equipped canoe to demonstrate the following:"
    field:
      type: checklist
      items:
        - "(a) Safely carry and launch the canoe from a dock or shore (both, if possible)."
        - "(b) Safely land the canoe on a dock or shore (both, if possible) and return it to its proper storage location."
        - "(c) Demonstrate kneeling and sitting positions in a canoe and explain the proper use for each position."
        - "(d) Change places while afloat in the canoe."

  - id: "8"
    prompt: "With a companion, use a properly equipped canoe to demonstrate the following:"
    field:
      type: checklist
      items:
        - "(a) Safely exit the canoe in deep water without losing contact with the canoe. Reenter the canoe with the assistance of the other paddler without capsizing the boat."
        - "(b) Safely perform a controlled capsize of the canoe and demonstrate how staying with a capsized canoe will support both paddlers."
        - "(c) Swim, tow, or push a swamped canoe 50 feet to shallow water. In the shallow water, empty the swamped canoe and reenter it."
        - "(d) In deep water, rescue a swamped canoe and its paddlers. After checking that those in the water do not need immediate assistance, empty the swamped canoe and help the paddlers safely reenter their boat without capsizing."
        - "(e) Perform a canoe rescue of a conscious swimmer."
        - "(f) Using a rescue (throw) bag from shore, lay the line within 3 feet of a conscious swimmer 30 feet away. Show how to repack the bag when done."

  - id: "9"
    prompt: >
      With a companion, using a properly equipped canoe to demonstrate the
      following tandem maneuvers while paddling in unison on opposite sides and
      without changing sides. Each paddler must demonstrate these maneuvers in
      both the bow and stern and on both sides of the canoe while maintaining
      trim and balance of the canoe:
    field:
      type: checklist
      items:
        - "(a) Pivot (spin) the canoe 180 degrees (half circle) to the right from a stationary position, stop, and return to the starting position by pivoting to the left using draw and pushaway strokes or using forward and reverse sweeps staying within 2 boat lengths of the starting position."
        - "(b) Move a canoe sideways (abeam) in one direction for 10 feet and then return to the starting position using the draw and pushaway strokes."
        - "(c) While in forward motion, stop the canoe within two boat lengths using the backstroke."
        - "(d) While in the stern position and without assistance from the bow paddler, paddle in a straight line 15-20 boat lengths using an appropriate steering stroke, e.g., the J-stroke or thumb-down rudder stroke with or without a stern pry."
        - "(e) Move the canoe in a straight line 15-20 boat lengths with the bow paddler using as necessary the forward stroke, draw stroke or forward sweep and the stern paddler using an appropriate steering stroke, e.g., the J-stroke or thumbdown rudder stroke with or without a stern pry."
        - "(f) While maintaining forward motion, turn the canoe 90 degrees in an arc to the right in 5-10 boat lengths with the bow paddler using as necessary either the draw stroke or forward sweep and the stern paddler using only the forward stroke. Repeat the maneuver turning the canoe 90 degrees to the left."
        - "(g) Move the canoe backwards in a straight line 3-4 boat lengths using as necessary the back stroke, reverse sweep or draw stroke in the bow or the stern."
        - "(h) Complete a figure of 8 course around markers 3-4 boat lengths apart using appropriate strokes including the draw stroke, and the forward and reverse sweeps."
