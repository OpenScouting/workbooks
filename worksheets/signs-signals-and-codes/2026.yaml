badge:
  name: Signs, Signals and Codes
  slug: signs-signals-and-codes
  requirements_revision: "2026-01-01"
  description: >
    The Signs, Signals, and Codes merit badge explores the many ways people
    communicate beyond ordinary speech, from Morse code and semaphore to braille,
    trail signs, and secret ciphers. You will learn to send and read messages and
    discover the symbols that surround you every day.

requirements:
  - id: "1"
    prompt: >
      Discuss with your counselor the importance of signs, signals, and codes,
      and why people need these different methods of communication. Briefly
      discuss the history and development of signs, signals, and codes.
    field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      Explain the importance of signaling in emergency communications. Discuss
      with your counselor the types of emergency or distress signals one might
      use to attract airborne search-and-rescue personnel if lost in the outdoors
      or trying to summon assistance during a disaster. Illustrate these
      signaling examples by the use of photos or drawings.
    field: { type: draw_area, height: 4 }

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: >
          Describe what Morse code is and the various means by which it can be
          sent. Spell your first name using Morse code. Send or receive a message
          of six to 10 words using Morse code.
        field: { type: text_box, lines: 8 }
      - id: "3b"
        prompt: >
          Describe what American Sign Language (ASL) is and how it is used today.
          Spell your first name using American Sign Language. Send or receive a
          message of six to 10 words using ASL.
        field: { type: text_box, lines: 8 }

  - id: "4"
    intro: "Do the following:"
    children:
      - id: "4a"
        prompt: >
          Give your counselor a brief explanation about semaphore, why it is
          used, how it is used, and where it is used.
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: "Explain to your counselor the difference between semaphore flags and nautical flags."
        field: { type: text_box, lines: 5 }
      - id: "4c"
        prompt: "After 4(a) and 4(b) have been completed, do the following:"
        children:
          - id: "4c1"
            prompt: >
              Spell your first name using semaphore. Send or receive a message of
              six to 10 words using semaphore.
            field:
              type: checkbox
              label: "I spelled my name and sent or received a message using semaphore."
          - id: "4c2"
            prompt: >
              Using illustrations or photographs, identify 10 examples of
              nautical flags and discuss their importance.
            field: { type: text_box, lines: 8 }

  - id: "5"
    prompt: >
      Explain the braille reading technique and how it helps individuals with
      sight impairment to communicate. Then do the following:
    children:
      - id: "5-intro"
        prompt: "Explain the braille reading technique and how it helps individuals with sight impairment to communicate."
        field: { type: text_box, lines: 6 }
      - id: "5a"
        prompt: >
          Either by sight or by touch, identify the letters of the braille
          alphabet that spell your name. By sight or touch, decode a braille
          message at least six words long.
        field:
          type: checkbox
          label: "I identified the braille letters of my name and decoded a braille message."
      - id: "5b"
        prompt: "Create a message in braille at least six words long, and share this with your counselor."
        field:
          type: checkbox
          label: "I created a braille message at least six words long and shared it."

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: >
          Describe to your counselor six sound-only signals that are in use
          today. Discuss the pros and cons of using sound signals versus other
          types of signals.
        field: { type: text_box, lines: 8 }
      - id: "6b"
        prompt: >
          Demonstrate to your counselor six different silent Scout signals. Use
          these Scout signals to direct the movements and actions of your patrol
          or troop.
        field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: >
      On a Scout outing, lay out a trail for your patrol or troop to follow.
      Cover at least one mile in distance and use at least six different trail
      signs and markers. After the Scouts have completed the trail, follow the
      Leave No Trace Seven Principles and the Outdoor Code by replacing or
      returning trail markers to their original locations.
    field: { type: text_box, lines: 8 }

  - id: "8"
    prompt: >
      For THREE of the following activities, demonstrate five signals each. Tell
      what the signals mean and why they are used:
    children:
      - id: "8-choice"
        prompt: "Check the three activities you chose:"
        field:
          type: checklist
          items:
            - "(a) Sports official's hand signs/signals"
            - "(b) Heavy-equipment operator's hand signals"
            - "(c) Aircraft carrier catapult crew signals"
            - "(d) Cyclist's hand signals"
            - "(e) An activity selected by you and your counselor"
      - id: "8-notes"
        prompt: "For each chosen activity, record five signals, what they mean, and why they are used."
        field: { type: text_box, lines: 10 }

  - id: "9"
    prompt: >
      Share with your counselor 10 examples of symbols used in everyday life.
      Design your own symbol. Share it with your counselor and explain what it
      means. Then do the following:
    children:
      - id: "9-intro"
        prompt: >
          Share with your counselor 10 examples of symbols used in everyday life.
          Design your own symbol and explain what it means.
        field: { type: text_box, lines: 8 }
      - id: "9a"
        prompt: "Show examples of 10 traffic signs and explain their meaning."
        field: { type: text_box, lines: 8 }
      - id: "9b"
        prompt: >
          Using a topographical map, explain what a map legend is and discuss its
          importance. Point out 10 map symbols and explain the meaning of each.
        field: { type: text_box, lines: 8 }
      - id: "9c"
        prompt: >
          Discuss text-message symbols and why they are commonly used. Give
          examples of your favorite 10 text symbols or emoticons. Then see if
          your parent, guardian, or counselor can identify the meaning or usage
          of each symbol.
        field: { type: text_box, lines: 8 }

  - id: "10"
    prompt: >
      Briefly discuss the history of secret code writing (cryptography). Make up
      your own secret code and write a message of up to 25 words using this code.
      Share the message with a friend or fellow Scout. Then share the message and
      code key with your counselor and discuss the effectiveness of your code.
    field: { type: text_box, lines: 10 }
