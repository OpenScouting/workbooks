badge:
  name: Plumbing
  slug: plumbing
  requirements_revision: "2025-01-01"
  description: >
    Plumbing keeps clean water flowing in and waste flowing out, protecting
    health and safety in every home. Earning this badge teaches you how
    water-supply and drainage systems work, how to use plumber's tools, and how
    to make basic repairs.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: "Describe how a properly working plumbing system protects your family's health and safety."
        field: { type: text_box, lines: 6 }
      - id: "1b"
        prompt: "List five important local health regulations related to plumbing and tell how they protect health and safety."
        field:
          type: table
          headers: ["Local health regulation", "How it protects health and safety"]
          rows: 5
          cols: 2
      - id: "1c"
        prompt: "Describe the safety precautions you must take when making home plumbing repairs."
        field: { type: text_box, lines: 6 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Make a drawing and explain how a home hot- and cold-water supply
          system works. Tell how you would make it safe from freezing.
        field: { type: text_box, lines: 8 }
      - id: "2b"
        prompt: >
          Make a drawing and explain the drainage system of the plumbing in a
          house. Show and explain the use of drains and vents.
        field: { type: text_box, lines: 8 }

  - id: "3"
    prompt: "Show how to use five important plumber's tools."
    field:
      type: table
      headers: ["Plumber's tool", "How it is used"]
      rows: 5
      cols: 2

  - id: "4"
    prompt: >
      Identify and explain the following terms: washer, retaining nut, plunger
      (rubber force cup), solder, flux, elbow, tee, nipple, coupling, plug,
      union, trap, drainpipe, and water meter.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - Washer
        - Retaining nut
        - Plunger (rubber force cup)
        - Solder
        - Flux
        - Elbow
        - Tee
        - Nipple
        - Coupling
        - Plug
        - Union
        - Trap
        - Drainpipe
        - Water meter

  - id: "5"
    prompt: "Name the kinds of pipe that are used most often in a plumbing system. Explain why these pipes are used."
    field: { type: text_box, lines: 7 }

  - id: "6"
    prompt: "Do FOUR of the following, each under the supervision of a knowledgeable adult:"
    field:
      type: checklist
      items:
        - >
          (a) Visit the plumbing section of a hardware store or home center and
          identify: (1) PVC pipe and fittings; (2) CPVC pipe and fittings;
          (3) PEX pipe and fittings; (4) Copper pipe and fittings; (5) Steel
          pipe and fittings; (6) Specialty plumbing tools.
        - >
          (b) Cut, clean (debur), PVC or CPVC pipe; solvent weld at least three
          connections to include a coupling, tee, and elbow.
        - >
          (c) Cut PEX pipe; make at least one connection using either a
          quick-connect fitting or a crimp fitting (using specialized tools).
        - "(d) Solder a copper connection using a gas torch."
        - "(e) Replace a kitchen or lavatory faucet."
        - "(f) Remove, clean or replace, and reinstall a sink or lavatory drain trap."
        - "(g) Properly apply pipe thread tape to a pipe or a plumbing connector."
    children:
      - id: "6notes"
        prompt: "Notes from your chosen options"
        field: { type: text_box, lines: 8 }

  - id: "7"
    prompt: >
      Identify three career opportunities that would use skills and knowledge
      in plumbing. Pick one and research the training, education, certification
      requirements, experience, and expenses associated with entering the
      field. Research the prospects for employment, starting salary, advancement
      opportunities and career goals associated with this career. Discuss what
      you learned with your counselor and whether you might be interested in
      this career.
    field: { type: text_box, lines: 10 }
