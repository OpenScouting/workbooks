badge:
  name: Skating
  slug: skating
  requirements_revision: "2026-01-01"
  description: >
    The Skating merit badge lets you build real skill on ice, roller, or in-line
    skates, or on a skateboard. You will learn the safety rules, equipment care,
    and maneuvers that make skating both fun and safe.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely hazards associated with
          skating and what you should do to anticipate, help prevent, mitigate,
          and respond to these hazards.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Show that you know first aid for injuries or illnesses that could occur
          while skating, including hypothermia, frostbite, lacerations,
          abrasions, fractures, sprains and strains, concussions, blisters,
          heat-related reactions, and shock.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Hypothermia
            - Frostbite
            - Lacerations
            - Abrasions
            - Fractures
            - Sprains and strains
            - Concussions
            - Blisters
            - Heat-related reactions
            - Shock

  - id: "2"
    prompt: "Working under the supervision of an experienced adult, do ONE of the following options."
    children:
      - id: "2-choice"
        prompt: "Check the option you completed:"
        field:
          type: checklist
          items:
            - "Option A: Ice Skating. Do ALL of the following."
            - "Option B: Roller Skating. Do ALL of the following."
            - "Option C: In-Line Skating. Do ALL of the following."
            - "Option D: Skateboarding. Do ALL of the following."

      - id: "2A"
        intro: "Option A: Ice Skating. Do ALL of the following:"
        children:
          - id: "2A1"
            prompt: "Explain the general safety and courtesy guidelines for ice skating."
            field: { type: text_box, lines: 5 }
          - id: "2A2"
            prompt: >
              Discuss preparations that must be taken when skating outdoors on
              natural ice. Explain how to make an ice rescue.
            field: { type: text_box, lines: 6 }
          - id: "2A3"
            prompt: "Discuss the parts and functions of the different types of ice skates."
            field: { type: text_box, lines: 5 }
          - id: "2A4"
            prompt: "Describe the proper way to carry ice skates at the rink and for travel."
            field: { type: text_box, lines: 4 }
          - id: "2A5"
            prompt: "Describe how to store ice skates for long periods of time, such as seasonal storage."
            field: { type: text_box, lines: 4 }
          - id: "2A6"
            prompt: >
              Skate forward at least 40 feet and come to a complete stop. Use
              either a two-foot snowplow stop or a one-foot snowplow stop.
            field:
              type: checkbox
              label: "I skated forward at least 40 feet and stopped with a snowplow stop."
          - id: "2A7"
            prompt: >
              After skating forward, glide forward on two feet, then on one foot,
              first right and then left.
            field:
              type: checkbox
              label: "I glided forward on two feet, then one foot, right and left."
          - id: "2A8"
            prompt: >
              Starting from a T position, stroke forward around the test area,
              avoiding the use of toe picks if wearing figure skates.
            field:
              type: checkbox
              label: "I stroked forward from a T position around the test area."
          - id: "2A9"
            prompt: "Glide backward on two feet for at least two times the skater's height."
            field:
              type: checkbox
              label: "I glided backward on two feet at least two times my height."
          - id: "2A10"
            prompt: "Skate backward for at least 20 feet on two skates."
            field:
              type: checkbox
              label: "I skated backward at least 20 feet on two skates."
          - id: "2A11"
            prompt: >
              After gaining forward speed, glide forward on two feet, making a
              turn of 180 degrees around a cone, first to the right and then to
              the left.
            field:
              type: checkbox
              label: "I made 180-degree gliding turns around a cone, right and left."
          - id: "2A12"
            prompt: "Perform forward crossovers in a figure-eight pattern."
            field:
              type: checkbox
              label: "I performed forward crossovers in a figure-eight pattern."
          - id: "2A13"
            prompt: "Explain to your counselor the safety considerations for participating in an ice-skating race."
            field: { type: text_box, lines: 5 }
          - id: "2A14"
            prompt: "Perform a hockey stop."
            field:
              type: checkbox
              label: "I performed a hockey stop."

      - id: "2B"
        intro: "Option B: Roller Skating. Do ALL of the following:"
        children:
          - id: "2B1"
            prompt: "Explain the general safety rules and etiquette guidelines for roller skating."
            field: { type: text_box, lines: 5 }
          - id: "2B2"
            prompt: "Discuss the parts and functions of a roller skate and their functions."
            field: { type: text_box, lines: 5 }
          - id: "2B3"
            prompt: "Describe five essential steps to good roller skate care."
            field: { type: text_box, lines: 5 }
          - id: "2B4"
            prompt: >
              Skate forward with smooth, linked strokes on two feet for at least
              100 feet in both directions around the rink and demonstrate proper
              techniques for stopping.
            field:
              type: checkbox
              label: "I skated forward at least 100 feet in both directions and stopped properly."
          - id: "2B5"
            prompt: "Skate forward and glide at least 15 feet on one skate, then on the other skate."
            field:
              type: checkbox
              label: "I glided at least 15 feet on each skate."
          - id: "2B6"
            prompt: "Perform a forward crossover."
            field:
              type: checkbox
              label: "I performed a forward crossover."
          - id: "2B7"
            prompt: "Skate backward for at least 40 feet on two skates, then for at least 15 feet on one skate."
            field:
              type: checkbox
              label: "I skated backward at least 40 feet on two skates and 15 feet on one."
          - id: "2B8"
            prompt: >
              Skate forward in a slalom pattern for at least 40 feet on two
              skates, then for at least 20 feet on one skate.
            field:
              type: checkbox
              label: "I skated a forward slalom 40 feet on two skates and 20 feet on one."
          - id: "2B9"
            prompt: "Skate backward in a slalom pattern for at least 15 feet on two skates."
            field:
              type: checkbox
              label: "I skated a backward slalom at least 15 feet on two skates."
          - id: "2B10"
            prompt: "Shuttle skate once around the rink, bending twice along the way, without stopping."
            field:
              type: checkbox
              label: "I shuttle skated once around the rink, bending twice, without stopping."
          - id: "2B11"
            prompt: >
              Perform a series of two consecutive spins on skates, OR hop, skip,
              and jump on skates for at least 10 feet.
            field:
              type: checkbox
              label: "I performed two consecutive spins, or hopped, skipped, and jumped at least 10 feet."
          - id: "2B12"
            prompt: "Perform a stepover."
            field:
              type: checkbox
              label: "I performed a stepover."
          - id: "2B13"
            prompt: >
              While skating, dribble a basketball at least 40 feet, then back to
              your starting position, OR push a hockey ball with a stick at least
              40 feet, then back to your starting position.
            field:
              type: checkbox
              label: "I dribbled a basketball or pushed a hockey ball at least 40 feet and back."

      - id: "2C"
        intro: "Option C: In-Line Skating. Do ALL of the following:"
        children:
          - id: "2C1"
            prompt: "Explain the general safety rules and courtesy guidelines for in-line skating."
            field: { type: text_box, lines: 5 }
          - id: "2C2"
            prompt: "Describe the parts of an in-line skate and their functions."
            field: { type: text_box, lines: 5 }
          - id: "2C3"
            prompt: "Describe the required and recommended safety equipment for in-line skating."
            field: { type: text_box, lines: 5 }
          - id: "2C4"
            prompt: "Explain four essential steps to good in-line skate care."
            field: { type: text_box, lines: 5 }
          - id: "2C5"
            prompt: "Skate forward with smooth, linked strokes on two feet for at least 100 feet."
            field:
              type: checkbox
              label: "I skated forward at least 100 feet with smooth, linked strokes."
          - id: "2C6"
            prompt: "Skate forward and glide at least 15 feet on one skate, then on the other skate."
            field:
              type: checkbox
              label: "I glided at least 15 feet on each skate."
          - id: "2C7"
            prompt: "Stop on command on flat pavement using the heel brake."
            field:
              type: checkbox
              label: "I stopped on command using the heel brake."
          - id: "2C8"
            prompt: "Perform a forward crossover."
            field:
              type: checkbox
              label: "I performed a forward crossover."
          - id: "2C9"
            prompt: "Perform a series of forward, linked swizzles for at least 40 feet."
            field:
              type: checkbox
              label: "I performed forward, linked swizzles for at least 40 feet."
          - id: "2C10"
            prompt: "Skate backward for at least 40 feet in a series of linked, backward swizzles."
            field:
              type: checkbox
              label: "I skated backward at least 40 feet in linked backward swizzles."
          - id: "2C11"
            prompt: "From a strong pace, perform a lunge turn around an object predetermined by your counselor."
            field:
              type: checkbox
              label: "I performed a lunge turn around the object."
          - id: "2C12"
            prompt: "Perform a mohawk."
            field:
              type: checkbox
              label: "I performed a mohawk."
          - id: "2C13"
            prompt: "Perform a series of at least four one-footed downhill slaloms on pavement with a gentle slope."
            field:
              type: checkbox
              label: "I performed at least four one-footed downhill slaloms."
          - id: "2C14"
            prompt: "Describe how to pass a pedestrian or another skater from behind."
            field: { type: text_box, lines: 4 }
          - id: "2C15"
            prompt: "Describe at least three ways to avoid an unforeseen obstacle while skating."
            field: { type: text_box, lines: 5 }
          - id: "2C16"
            prompt: "Describe two ways to get on and off a curb, and demonstrate at least one of these methods."
            field: { type: text_box, lines: 5 }

      - id: "2D"
        intro: "Option D: Skateboarding. Do ALL of the following:"
        children:
          - id: "2D1"
            prompt: "Explain the history and evolution of skateboarding."
            field: { type: text_box, lines: 6 }
          - id: "2D2"
            prompt: "Describe the benefits of skateboarding (physical fitness, balance, coordination, perseverance, and creativity)."
            field: { type: text_box, lines: 5 }
          - id: "2D3"
            prompt: >
              Explain the safety rules and courtesy guidelines for skateboarding,
              including right-of-way and communication signals and warnings.
            field: { type: text_box, lines: 6 }
          - id: "2D4"
            prompt: >
              Explain the protective gear needed to skate safely, including
              helmet, knee pads, elbow pads, and wrist guards, and show how to
              wear them correctly.
            field: { type: text_box, lines: 5 }
          - id: "2D5"
            prompt: >
              Describe the two main styles of skateboarding (street and vert),
              and describe common skatepark features (ramps, manual pad, rails,
              spine, etc.).
            field: { type: text_box, lines: 6 }
          - id: "2D6"
            prompt: "Explain skateboard anatomy (deck, trucks, wheels, hardware, etc.)."
            field: { type: text_box, lines: 5 }
          - id: "2D7"
            prompt: "Build a board by assembling all pieces (deck, wheels, trucks, hardware, and grip tape) in the proper order."
            field:
              type: checkbox
              label: "I built a board by assembling all pieces in the proper order."
          - id: "2D8"
            prompt: "Explain skateboard maintenance (cleaning, adjusting bolts, and replacing parts)."
            field: { type: text_box, lines: 5 }
          - id: "2D9"
            prompt: "Explain the difference between regular and goofy stance, and demonstrate your preferred stance."
            field: { type: text_box, lines: 4 }
          - id: "2D10"
            prompt: "Demonstrate how to push, cruise, and carve on flat ground."
            field:
              type: checkbox
              label: "I demonstrated how to push, cruise, and carve on flat ground."
          - id: "2D11"
            prompt: "Show at least two braking and stopping techniques."
            field:
              type: checkbox
              label: "I showed at least two braking and stopping techniques."
          - id: "2D12"
            prompt: "Do a basic ollie and at least one variation."
            field:
              type: checkbox
              label: "I did a basic ollie and at least one variation."
          - id: "2D13"
            prompt: "Show how to drop-in from coping."
            field:
              type: checkbox
              label: "I showed how to drop-in from coping."
          - id: "2D14"
            prompt: "Demonstrate THREE skateboarding tricks from the following types:"
            field:
              type: checklist
              items:
                - "(a) Flat ground tricks"
                - "(b) Flip and shove-it tricks"
                - "(c) Grind and slide tricks"
                - "(d) Air and grab tricks"
                - "(e) Footplant tricks"
