badge:
  name: Fishing
  slug: fishing
  requirements_revision: "2026-01-01"
  description: >
    The Fishing merit badge introduces you to the skills, knots, gear, and
    conservation ethics of angling. You will learn to identify equipment and
    bait, fish responsibly, and catch, clean, and cook a fish of your own.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: "Explain to your counselor the most likely hazards you may encounter while participating in fishing activities, and what you should do to anticipate, help prevent, mitigate, and respond to these hazards."
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: "Discuss the prevention of and treatment for the following health concerns that could occur while fishing: cuts and scratches, puncture wounds, insect bites, hypothermia, dehydration, heat exhaustion, heatstroke, and sunburn."
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Cuts and scratches"
            - "Puncture wounds"
            - "Insect bites"
            - "Hypothermia"
            - "Dehydration"
            - "Heat exhaustion"
            - "Heatstroke"
            - "Sunburn"
      - id: "1c"
        prompt: "Explain how to remove a barbed hook that is lodged in someone's arm."
        field: { type: text_box, lines: 5 }
      - id: "1d"
        prompt: "Name and explain five safety practices you should always follow while fishing."
        field: { type: text_box, lines: 7 }

  - id: "2"
    prompt: "Discuss the differences between two types of fishing outfits. Point out and identify the parts of several types of rods and reels. Explain how and when each would be used. Review with your counselor how to care for this equipment."
    field: { type: text_box, lines: 9 }

  - id: "3"
    prompt: "Demonstrate the proper use of two different types of fishing equipment."
    field: { type: checkbox, label: "Demonstrated the proper use of two different types of fishing equipment." }

  - id: "4"
    prompt: "Demonstrate how to tie the following knots: improved clinch knot, Palomar knot, uni knot, uni to uni knot, and arbor knot. Explain how and when each knot is used."
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - "Improved clinch knot"
        - "Palomar knot"
        - "Uni knot"
        - "Uni to uni knot"
        - "Arbor knot"

  - id: "5"
    prompt: "Name and identify five basic artificial lures and five natural baits and explain how to fish with them. Explain why baitfish are not to be released."
    children:
      - id: "5-lures"
        prompt: "Five basic artificial lures and how to fish with them"
        field: { type: table, headers: ["Lure", "How to fish with it"], rows: 5, cols: 2 }
      - id: "5-baits"
        prompt: "Five natural baits and how to fish with them"
        field: { type: table, headers: ["Bait", "How to fish with it"], rows: 5, cols: 2 }
      - id: "5-baitfish"
        prompt: "Explain why baitfish are not to be released."
        field: { type: text_box, lines: 4 }

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: "Explain the importance of practicing Leave No Trace Seven Principles and the Outdoor Code. Discuss the positive effects of Leave No Trace Seven Principle and the Outdoor Code on fishing resources."
        field: { type: text_box, lines: 7 }
      - id: "6b"
        prompt: "Discuss the meaning and importance of catch and release. Describe how to properly release a fish safely to the water."
        field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: "Obtain and review the regulations affecting gamefishing where you live. Explain why they were adopted and what is accomplished by following them."
    field: { type: text_box, lines: 7 }

  - id: "8"
    prompt: "Explain what good outdoor sportsmanlike behavior is and how it relates to anglers. Tell how the Leave No Trace Seven Principles and the Outdoor Code relate to a fishing sports enthusiast, including the aspects of littering, trespassing, courteous behavior, and obeying fishing regulations."
    field: { type: text_box, lines: 8 }

  - id: "9"
    prompt: "Catch one fish and identify it."
    field: { type: text_box, lines: 4 }

  - id: "10"
    prompt: "If regulations and health concerns permit, clean and cook a fish you have caught. If you are unable to catch a fish for eating, acquire a fish, clean the fish you acquired, and cook the fish you acquired. Note: It is not required that you eat the fish."
    field: { type: text_box, lines: 6 }
