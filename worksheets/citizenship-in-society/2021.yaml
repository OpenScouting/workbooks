badge:
  name: Citizenship in Society
  slug: citizenship-in-society
  requirements_revision: "2021-01-01"
  status: retired
  description: >
    Citizenship in Society explores what it means to lead ethically and to make
    everyone feel welcome and included. Through research, reflection, and
    conversation, you examine identity, fairness, and how to be an upstander in
    your community.

requirements:
  - id: "1"
    prompt: >
      Before beginning work on other requirements for this merit badge, research
      the following terms and explain to your counselor how you feel they relate
      to the Scout Oath and Scout Law: identities, diversity, equality, equity,
      inclusion, discrimination, ethical leadership, and upstander.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - Identities
        - Diversity
        - Equality
        - Equity
        - Inclusion
        - Discrimination
        - Ethical leadership
        - Upstander

  - id: "2"
    intro: >
      Document and discuss with your counselor what leadership means to you.
      Share what it means to make ethical decisions.
    children:
      - id: "2intro"
        prompt: "What leadership means to you, and what it means to make ethical decisions."
        field: { type: text_box, lines: 6 }
      - id: "2a"
        prompt: >
          Research and share with your counselor an individual you feel has
          demonstrated positive leadership while having to make an ethical
          decision. (It could be someone in history, a family member, a teacher,
          a coach, a counselor, a clergy member, a Scoutmaster, etc.)
        field: { type: text_box, lines: 6 }
      - id: "2b"
        prompt: >
          Explain what decision and/or options that leader had, why you believe
          they chose their final course of action, and the outcome of that
          action
        field: { type: text_box, lines: 7 }

  - id: "3"
    intro: "Consider ethical decision-making."
    children:
      - id: "3a"
        prompt: >
          Think about a time you faced an ethical decision. Discuss the
          situation, what you did, and how it made you feel.
        field: { type: text_box, lines: 7 }
      - id: "3b"
        prompt: >
          List three examples of ethical decisions you might have to make in the
          future at school, at home, in the workplace, or in your community, and
          what you would do. Share how your actions represent alignment with the
          Scout Oath and Scout Law.
        field: { type: text_box, lines: 8 }
      - id: "3c"
        prompt: >
          Explain to your counselor how you plan to use what you have learned to
          assist you when that time comes, and what action(s) you can take to
          serve as an upstander and help other people at all times.
        field: { type: text_box, lines: 7 }

  - id: "4"
    intro: >
      Repeat the Scout Oath and Scout Law for your counselor. Choose TWO of the
      following scenarios and discuss what you could do as a Scout to demonstrate
      leadership and your understanding of what it means to help others who may
      seem different from you:
    children:
      - id: "4choose"
        field:
          type: checklist
          items:
            - "(a) Scenario 1: While at camp, a youth accidentally spills food on another camper. The camper who gets spilled on gets angry and says something that is offensive to people with disabilities; their friends laugh. What could/should you do?"
            - "(b) Scenario 2: Your friend confides in you that some students in school are making insulting comments about one of their identities, and that those same students created a fake social media account to impersonate your friend online and post messages. What could/should you do?"
            - "(c) Scenario 3: A new student in your class was born in another country (or has a parent who was born in another country). Your friends make rude comments to the student about their speech or clothes and tell the student to \"go back home where you came from.\" What could/should you do?"
      - id: "4notes"
        prompt: "Discuss what you could do as a Scout in your two chosen scenarios."
        field: { type: text_box, lines: 10 }

  - id: "5"
    intro: "Document and discuss:"
    children:
      - id: "5a"
        prompt: "Ideas on what you personally can do to create a welcoming environment in your Scouting unit."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: >
          An experience you had in which you went out of your way to include
          another Scout(s) and what you did to make them feel included and
          welcomed.
        field: { type: text_box, lines: 6 }
      - id: "5c"
        prompt: >
          Things you can do to help ensure all Scouts in your unit are given an
          opportunity to be heard and included in decision-making and planning.
        field: { type: text_box, lines: 6 }

  - id: "6"
    intro: >
      With your parent or guardian's approval, connect with another Scout or
      youth your own age who has an identity that's different from yours. (This
      means a trait, belief, or characteristic different from you.)
    children:
      - id: "6a"
        prompt: >
          Share with each other what makes the different aspects of your identity
          meaningful/special to you
        field: { type: text_box, lines: 6 }
      - id: "6b"
        prompt: "Share with each other ONE of the following options:"
        field:
          type: checklist
          items:
            - "(1) Option 1 - A time you felt excluded from a group: What was the situation?"
            - "(2) Option 2 - This imaginary situation: You're attending a new school and don't know anyone there yet. You notice they dress very differently than you do. At lunchtime, you decide you'll try to sit with a group to get to know other students. People at two tables tell you there is someone sitting at the currently empty seat at their table, so you end up eating by yourself. Discuss: How would that make you feel?"
      - id: "6c"
        prompt: "Discuss with your counselor what you learned from the discussion with the other Scout or youth."
        field: { type: text_box, lines: 6 }

  - id: "7"
    intro: >
      Identify and interview an individual in your community, school, and/or
      Scouting who has had a significant positive impact in promoting diversity,
      equity, and inclusion. If you feel your community, school, or local
      Scouting group does not have such an individual, then research a historical
      figure who meets these criteria, and discuss that person with your
      counselor.
    children:
      - id: "7a"
        prompt: >
          Discover what inspired the individual, learn about the challenges they
          faced, and share what you feel attributed to their success
        field: { type: text_box, lines: 7 }
      - id: "7b"
        prompt: "Discuss with your counselor what you learned and how you can apply it in your life."
        field: { type: text_box, lines: 6 }

  - id: "8"
    prompt: >
      With the help of your parent or guardian, study an event that had a
      positive outcome on how society viewed a group of people and made them feel
      more welcome. Describe to your counselor the event and what you learned.
    field: { type: text_box, lines: 8 }

  - id: "9"
    intro: >
      Document and discuss with your counselor three or more areas in your life
      outside of Scouting where you feel you can actively provide stronger
      leadership in:
    children:
      - id: "9a"
        prompt: "Making others feel included."
        field: { type: text_box, lines: 3 }
      - id: "9b"
        prompt: "Practicing active listening."
        field: { type: text_box, lines: 3 }
      - id: "9c"
        prompt: "Creating an environment where others feel comfortable to share their ideas and perspectives."
        field: { type: text_box, lines: 3 }
      - id: "9d"
        prompt: "Helping others feel valued for their input and suggestions."
        field: { type: text_box, lines: 3 }
      - id: "9e"
        prompt: "Standing up for others."
        field: { type: text_box, lines: 3 }

  - id: "10"
    prompt: >
      Discuss with your counselor how stereotyping people can be harmful, and how
      stereotypes can lead to prejudice and discrimination. Share ideas you have
      for challenging assumptions and celebrating individuality.
    field: { type: text_box, lines: 8 }

  - id: "11"
    intro: >
      Scouting strives to develop young people to be future leaders in their
      workplaces, schools, and community environments. As you look at your
      current involvement in school, your family, Scouting, your job, and/or
      community, think about how you can have a positive impact in diversity,
      equity, and inclusion.
    children:
      - id: "11a"
        prompt: >
          Describe your ideas on how you can and will support others with
          different identities to feel included and heard at your school,
          workplace, and/or social settings in your community.
        field: { type: text_box, lines: 7 }
      - id: "11b"
        prompt: >
          Explain how including diverse thoughts and opinions from others with
          different identities can: Make your interactions more positive.
        field: { type: text_box, lines: 6 }
      - id: "11c"
        prompt: "Give three examples of how limiting diverse input can be harmful."
        field: { type: text_box, lines: 6 }
      - id: "11d"
        prompt: "Give three examples of how considering diverse opinions can lead to innovation and success."
        field: { type: text_box, lines: 6 }
