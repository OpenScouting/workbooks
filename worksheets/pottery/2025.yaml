badge:
  name: Pottery
  slug: pottery
  requirements_revision: "2025-01-01"
  description: >
    Pottery is one of the oldest crafts, turning clay into both useful vessels
    and works of art. Earning this badge teaches you to work with clay by hand
    and on the wheel, to understand the language of the craft, and to fire and
    finish your own pieces.

requirements:
  - id: "1"
    prompt: >
      Explain to your counselor the precautions that must be followed for the
      safe use and operation of a potter's tools, equipment, and other
      materials.
    field: { type: text_box, lines: 7 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: "Explain the properties and ingredients of a good clay body for the following:"
        children:
          - id: "2a1"
            prompt: "Making sculpture using the hand-building method"
            field: { type: text_box, lines: 4 }
          - id: "2a2"
            prompt: "Throwing on the wheel"
            field: { type: text_box, lines: 4 }
      - id: "2b"
        prompt: "Tell how three different kinds of potter's wheels work."
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Kind of potter's wheel", type: text_field }
            - { label: "How it works", type: text_box, lines: 3 }

  - id: "3"
    prompt: >
      Make two drawings of pottery forms, each on an 8 1/2-by-11-inch sheet of
      paper. One must be a historical pottery style. The other must be of your
      own design.
    field:
      type: checklist
      items:
        - "Drawing of a historical pottery style"
        - "Drawing of your own design"

  - id: "4"
    prompt: >
      Explain the meaning of the following pottery terms: bat, wedging,
      throwing, leather hard, bone dry, greenware, bisque, terra-cotta, grog,
      slip, score, earthenware, stoneware, porcelain, pyrometric cone, and
      glaze.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - Bat
        - Wedging
        - Throwing
        - Leather hard
        - Bone dry
        - Greenware
        - Bisque
        - Terra-cotta
        - Grog
        - Slip
        - Score
        - Earthenware
        - Stoneware
        - Porcelain
        - Pyrometric cone
        - Glaze

  - id: "5"
    intro: "Do the following: Each piece is to be painted, glazed, or otherwise decorated by you."
    children:
      - id: "5a"
        prompt: "Make a slab pot, a coil pot, and a pinch pot."
        field:
          type: checklist
          items:
            - "Slab pot"
            - "Coil pot"
            - "Pinch pot"
      - id: "5b"
        prompt: "Make a human or animal figurine or decorative sculpture."
        field: { type: checkbox, label: "Make a human or animal figurine or decorative sculpture." }
      - id: "5c"
        prompt: "Throw a functional form on a potter's wheel."
        field: { type: checkbox, label: "Throw a functional form on a potter's wheel." }
      - id: "5d"
        prompt: "Help an experienced adult to load and fire a kiln OR describe in detail how to load and fire a kiln."
        field: { type: text_box, lines: 7 }

  - id: "6"
    prompt: >
      Explain the scope of the ceramic industry in the United States. Tell some
      things made other than craft pottery.
    field: { type: text_box, lines: 7 }

  - id: "7"
    prompt: >
      With your parent or guardian's permission and your counselor's approval,
      do ONE of the following:
    field:
      type: checklist
      items:
        - >
          (a) Visit the kiln yard at a local college or other craft school.
          Learn how the different kinds of kilns work, including low fire
          electric, gas or propane high fire, wood or salt/soda, and raku.
        - >
          (b) Visit a museum, art exhibit, art gallery, artists' co-op, or
          artist's studio that features pottery. After your visit, share with
          your counselor what you have learned.
        - >
          (c) Using resources from the library, magazines, the internet (with
          your parent or guardian's permission), and other outlets, learn about
          the historical and cultural importance of pottery. Share what you
          discovered with your counselor.
    children:
      - id: "7notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }

  - id: "8"
    prompt: >
      Find out about career opportunities in pottery. Pick one and find out the
      education, training, and experience required for this profession. Discuss
      this with your counselor, and explain why this profession might interest
      you.
    field: { type: text_box, lines: 8 }
