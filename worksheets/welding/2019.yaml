badge:
  name: Welding
  slug: welding
  requirements_revision: "2019-01-01"
  description: >
    Welding joins metal with heat and is a skill found across construction,
    manufacturing, and repair trades. Earning this badge teaches you to work
    safely with welding equipment, understand the welding process, and lay
    down real weld beads and joints.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the hazards you are most likely to
          encounter while welding, and what you should do to anticipate, help
          prevent, mitigate, or lessen these hazards.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Show that you know first aid for, and the prevention of, injuries or
          illnesses that could occur while welding, including electrical shock,
          eye injuries, burns, fume inhalation, dizziness, skin irritation, and
          exposure to hazardous chemicals, including filler metals and welding
          gases.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Electrical shock
            - Eye injuries
            - Burns
            - Fume inhalation
            - Dizziness
            - Skin irritation
            - Exposure to hazardous chemicals

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          With your counselor, discuss general safety precautions and safety
          data sheets (SDS) related to welding. Explain the importance of the
          SDS.
        field: { type: text_box, lines: 7 }
      - id: "2b"
        prompt: >
          Describe the appropriate safety gear and clothing that must be worn
          when welding. Then, present yourself properly dressed for welding, in
          protective equipment, clothing, and footwear.
        field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: >
          Explain and demonstrate the proper care and storage of welding
          equipment, tools, and protective clothing and footwear.
        field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: >
      Explain the terms welding, electrode, slag, and oxidation. Describe the
      welding process, how heat is generated, what kind of filler metal is
      added (if any), and what protects the molten metal from the atmosphere.
    children:
      - id: "3-terms"
        prompt: "Explain the terms welding, electrode, slag, and oxidation."
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Welding
            - Electrode
            - Slag
            - Oxidation
      - id: "3-process"
        prompt: >
          Describe the welding process, how heat is generated, what kind of
          filler metal is added (if any), and what protects the molten metal
          from the atmosphere.
        field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: >
      Name the different mechanical and thermal cutting methods. Choose one
      method and describe how to use the process. Discuss one advantage and one
      limitation of this process.
    field: { type: text_box, lines: 10 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Select two welding processes, and make a list of the different
          components of the equipment required for each process. Discuss one
          advantage and one limitation for each process.
        field:
          type: repeated_block
          count: 2
          template:
            - { label: "Welding process", type: text_field }
            - { label: "Equipment components", type: text_box, lines: 4 }
            - { label: "One advantage", type: text_box, lines: 2 }
            - { label: "One limitation", type: text_box, lines: 2 }
      - id: "5b"
        prompt: >
          Choose one welding process. Set up the process you have chosen,
          including gas regulators, work clamps, cables, filler materials, and
          equipment settings. Have your counselor inspect and approve the area
          for the welding process you have chosen.
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: >
      After successfully completing requirements 1 through 5, use the equipment
      you prepared for the welding process in 5(b) to do the following:
    field:
      type: checklist
      items:
        - "(a) Using a metal scribe or soapstone, sketch your initial onto a metal plate, and weld a bead on the plate following the pattern of your initial."
        - '(b) Cover a small plate (approximately 3" x 3" x 1/4") with weld beads side by side.'
        - "(c) Tack two plates together in a square groove butt joint."
        - "(d) Weld the two plates together from 6(c) on both sides."
        - "(e) Tack two plates together in a T joint, have your counselor inspect it, then weld a T joint with fillet weld on both sides."
        - "(f) Tack two plates together in a lap joint, have your counselor inspect it, then weld a lap joint with fillet weld on both sides."

  - id: "7"
    intro: "Do the following:"
    children:
      - id: "7a"
        prompt: >
          Find out about three career opportunities in the welding industry.
          Pick one and find out the education, training, and experience required
          for this profession. Discuss this with your counselor, and explain why
          the profession might interest you.
        field: { type: text_box, lines: 8 }
      - id: "7b"
        prompt: >
          Discuss the role of the American Welding Society in the welding
          profession.
        field: { type: text_box, lines: 5 }
