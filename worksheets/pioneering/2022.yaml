badge:
  name: Pioneering
  slug: pioneering
  requirements_revision: "2022-01-01"
  description: >
    Pioneering is the art of building useful structures from rope and spars
    using knots and lashings. Earning this badge teaches you to whip and splice
    rope, tie pioneering knots and lashings, and work as a team to construct
    sturdy camp gadgets and full-size projects.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely hazards you might encounter
          while participating in pioneering activities and what you should do to
          anticipate, help prevent, mitigate, and respond to these hazards.
        field: { type: text_box, lines: 7 }
      - id: "1b"
        prompt: >
          Discuss the prevention of, and first-aid treatment for, injuries and
          conditions that could occur while working on pioneering projects,
          including rope splinters, rope burns, cuts, scratches, insect bites
          and stings, hypothermia, dehydration, heat exhaustion, heatstroke,
          sunburn, and falls.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Rope splinters
            - Rope burns
            - Cuts
            - Scratches
            - Insect bites and stings
            - Hypothermia
            - Dehydration
            - Heat exhaustion
            - Heatstroke
            - Sunburn
            - Falls

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: "Demonstrate the West Country method of whipping a rope."
        field: { type: checkbox, label: "Demonstrate the West Country method of whipping a rope." }
      - id: "2b"
        prompt: >
          Demonstrate how to tie a rope tackle and the following knots: clove
          hitch formed as two half hitches, clove hitch on a bight, butterfly
          knot, roundturn with two half hitches, and rolling hitch.
        field:
          type: checklist
          items:
            - "Rope tackle"
            - "Clove hitch formed as two half hitches"
            - "Clove hitch on a bight"
            - "Butterfly knot"
            - "Roundturn with two half hitches"
            - "Rolling hitch"
      - id: "2c"
        prompt: >
          Demonstrate and explain when to use the following lashings: square,
          diagonal, round, shear, tripod, and floor lashing.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Square lashing
            - Diagonal lashing
            - Round lashing
            - Shear lashing
            - Tripod lashing
            - Floor lashing

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: >
          Using square and tripod lashings from requirement 2(c), build a
          Tripod Wash Station (or with your counselor's permission, another
          camp gadget of your own design).
        field: { type: checkbox, label: "Build a Tripod Wash Station (or another approved camp gadget) using square and tripod lashings." }
      - id: "3b"
        prompt: >
          Using rolling hitches or roundturns with two half hitches, and round
          lashings from requirements 2(b) and 2(c), build a 15-foot Scout Stave
          Flagpole (or with your counselor's permission, another camp gadget of
          your own design).
        field: { type: checkbox, label: "Build a 15-foot Scout Stave Flagpole (or another approved camp gadget)." }
      - id: "3c"
        prompt: >
          Using shear, square, and floor lashings, clove hitches on a bight,
          and rope tackles from requirements 2(b) and 2(c), build a Simple Camp
          Table (or with your counselor's permission, another camp gadget of
          your own design).
        field: { type: checkbox, label: "Build a Simple Camp Table (or another approved camp gadget)." }

  - id: "4"
    prompt: >
      Explain the differences between synthetic ropes and natural-fiber ropes.
      Discuss which types of rope are suitable for pioneering work and why.
      Include the following in your discussion: breaking strength, safe working
      loads, and the care and storage of rope.
    field: { type: text_box, lines: 9 }

  - id: "5"
    prompt: >
      Explain the uses for the back splice, eye splice, and short splice. View
      a demonstration on forming each splice.
    field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: >
      Using a rope-making device or machine, make a rope at least 6 feet long
      consisting of three strands, each having three yarns. Whip the ends.
    field: { type: checkbox, label: "Make a rope at least 6 feet long of three strands, each with three yarns, and whip the ends." }

  - id: "7"
    prompt: >
      Explain the importance of effectively anchoring a pioneering project.
      Describe to your counselor the 3-2-1 anchoring system and the
      log-and-stake anchoring system.
    field: { type: text_box, lines: 8 }

  - id: "8"
    prompt: >
      Describe the lashings that are used when building a trestle, how the
      poles are positioned, and how X braces contribute to the overall
      structural integrity of a pioneering project.
    field: { type: text_box, lines: 8 }

  - id: "9"
    prompt: >
      Working in a group, (or individually with the help of your counselor)
      build a full size pioneering structure, using one of the following
      designs in the Pioneering merit badge pamphlet: Double A-Frame Monkey
      Bridge, Single A-Frame Bridge, Single Trestle Bridge, Single Lock Bridge,
      4x4 Square Climbing Tower, Four Flag Gateway Tower, Double Tripod Chippewa
      Kitchen, or another type of structure approved in advance by your
      counselor. Carefully plan the project, assembling and organizing all the
      materials, referring to the points under Safe Pioneering, and complying
      with the height restrictions in the Guide to Safe Scouting.
    field:
      type: checklist
      items:
        - "Double A-Frame Monkey Bridge"
        - "Single A-Frame Bridge"
        - "Single Trestle Bridge"
        - "Single Lock Bridge"
        - "4x4 Square Climbing Tower"
        - "Four Flag Gateway Tower"
        - "Double Tripod Chippewa Kitchen"
        - "Another type of structure approved in advance by your counselor"
    children:
      - id: "9notes"
        prompt: "Describe the structure you built and how you planned it."
        field: { type: text_box, lines: 8 }
