badge:
  name: American Cultures
  slug: american-cultures
  requirements_revision: "2006-01-01"
  description: >
    The American Cultures merit badge introduces Scouts to the diverse racial,
    ethnic, national, and religious groups that make up the United States.
    Scouts explore one group from their own background and two others through
    experiences, conversations, and shared traditions.

requirements:
  - id: "groups"
    field:
      type: callout
      text: >
        <b>Choose three groups first.</b> Pick three groups that have
        different racial, cultural, national, or ethnic backgrounds, one of
        which comes from your own background. Use these same three groups
        to meet requirements 1, 2, and 3. List them below before starting.
  - id: "groups-list"
    field:
      type: repeated_block
      count: 3
      template:
        - { label: "Group", type: text_field }
        - { label: "Why chosen", type: text_box, lines: 2 }

  - id: "1"
    prompt: "Do TWO of the following, choosing a different group for each:"
    field:
      type: checklist
      items:
        - "(a) Go to a festival, celebration, or other event identified with one of the groups. Report on what you see and learn."
        - "(b) Go to a place of worship, school, or other institution identified with one of the groups. Report on what you see and learn."
        - "(c) Talk with a person from one of the groups about the heritage and traditions of the group. Report on what you learn."
        - "(d) Learn a song, dance, poem, or story that is traditional to one group, and teach it to a group of your friends."
        - "(e) Go to a library or museum to see a program or exhibit featuring one group's traditions. Report on what you see and learn."
    children:
      - id: "1-notes"
        prompt: "Report on your two chosen activities"
        field: { type: text_box, lines: 14 }

  - id: "2"
    prompt: >
      Imagine that one of the groups had always lived alone in a city or
      country to which no other groups ever came. Tell what you think the
      city or country might be like today. Now tell what you think it might
      be like if the three groups you chose lived there at the same time.
    field: { type: text_box, lines: 12 }

  - id: "3"
    prompt: >
      Tell about some differences between the religious and social customs
      of the three groups. Tell about some ideas or ways of doing things
      that are similar in the three groups.
    field: { type: text_box, lines: 12 }

  - id: "4"
    prompt: >
      Tell about a contribution made to our country by three different
      people, each from a different racial, ethnic, or religious background.
    field:
      type: repeated_block
      count: 3
      template:
        - { label: "Person", type: text_field }
        - { label: "Background", type: text_field }
        - { label: "Contribution", type: text_box, lines: 4 }

  - id: "5"
    prompt: >
      Give a talk to your Scout unit or class at school on how people from
      different groups have gotten along together. Lead a discussion on
      what can be done to help various groups understand one another better.
    field: { type: text_box, lines: 10 }
