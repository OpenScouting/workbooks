badge:
  name: Traffic Safety
  slug: traffic-safety
  requirements_revision: "2026-01-01"
  description: >
    Traffic Safety helps Scouts become responsible, alert road users. Scouts
    learn how distraction, impairment, and fatigue cause crashes, how vehicle
    features and maintenance keep people safe, and how to share the road with
    cyclists and pedestrians.

requirements:
  - id: "1"
    intro: "Preventing Impaired Driving. Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain why a distracted driver must not operate a motor vehicle. List
          five common distractions, explain how driver distractions contribute
          to traffic accidents, and tell how drivers can minimize distractions.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Explain why a driver impaired by alcohol, drugs, or other substances
          must not operate a motor vehicle. Describe how alcohol, cold
          medications, and prescription and illegal drugs affect driving
          abilities. For the state where you live, find out what is the legal
          blood alcohol concentration and what are the consequences for driving
          while intoxicated or driving under the influence. Find out what the
          open-container law is in your state.
        field: { type: text_box, lines: 10 }
      - id: "1c"
        prompt: >
          Explain why a fatigued driver must not operate a motor vehicle.
          Describe how drivers must plan to be alert for safely transporting
          families, friends, Scouts, and themselves.
        field: { type: text_box, lines: 7 }
      - id: "1d"
        prompt: >
          Describe mistakes that new drivers make, how those mistakes increase
          their risk of collisions, how drivers can reduce this risk, and how
          driving behavior affects automobile insurance rates.
        field: { type: text_box, lines: 8 }

  - id: "2"
    intro: "Vehicle Safety. Do the following:"
    children:
      - id: "2a"
        prompt: >
          Demonstrate how to wear a lap and shoulder belt properly. Explain why
          it is important for the driver and all passengers, including children
          sitting in age-appropriate seats, to always wear their seat belts.
        field: { type: text_box, lines: 6 }
      - id: "2b"
        prompt: >
          List five safety features found in motor vehicles besides occupant
          restraint systems. Describe each safety feature, how each works, and
          how each contributes to safety.
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Safety feature", type: text_field }
            - { label: "How it works and contributes to safety", type: text_box, lines: 2 }

  - id: "3"
    intro: "Auto Maintenance and Safety Checkups. With adult supervision and using a vehicle that you have access to, do the following:"
    children:
      - id: "3a"
        prompt: >
          Demonstrate that all driving lights and signaling lights are clear and
          operational. Show where the switches are for these lights. Explain how
          drivers use lights to drive safely and courteously and to communicate
          with other drivers.
        field: { type: text_box, lines: 7 }
      - id: "3b"
        prompt: >
          Explain issues that might affect the driver's ability to see through
          the front, rear, and side windows. Demonstrate with a smear-and-clear
          test if the windshield wiper blades will clear the windshield
          completely or need to be replaced. Describe instances in good and bad
          weather when windshield wipers are important to safe driving.
        field: { type: text_box, lines: 8 }
      - id: "3c"
        prompt: >
          Demonstrate how to find the vehicle's recommended tire pressures, how
          to check tire pressures, and how to check for adequate tire tread
          depth. Explain why proper tire pressure and tread depth are important
          to traction, stopping distances, tire wear, and fuel economy.
        field: { type: text_box, lines: 8 }
      - id: "3d"
        prompt: >
          Check the vehicle for tools needed to change a flat tire or to use
          tire sealant to fix a puncture. Demonstrate you know how to change a
          flat tire and how to use tire sealant.
        field: { type: text_box, lines: 6 }
      - id: "3e"
        prompt: >
          In a location away from traffic hazards, mark off the reaction
          distances and braking distances that a car will travel as it makes an
          emergency stop at 25, 55, and 70 miles per hour on level dry and level
          wet pavement. Discuss how these distances change for normal and
          impaired drivers, for day and night driving, and for weather
          conditions. Note: Use the graphics template in the Traffic Safety
          merit badge pamphlet or one approved by your counselor to set up this
          demonstration.
        field: { type: text_box, lines: 8 }

  - id: "4"
    intro: "Traffic Safety and the Law. Do the following:"
    children:
      - id: "4a"
        prompt: >
          Describe at least three examples of traffic laws that apply to drivers
          of motor vehicles and to bicyclists.
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: >
          Explain procedures and etiquette a driver should follow if a law
          enforcement officer stops their vehicle.
        field: { type: text_box, lines: 6 }
      - id: "4c"
        prompt: >
          Explain procedures that drivers should follow if they are involved in
          a car accident.
        field: { type: text_box, lines: 6 }
      - id: "4d"
        prompt: >
          Name the three documents that drivers are required by law to carry
          whenever they operate a motor vehicle.
        field: { type: text_box, lines: 4 }

  - id: "5"
    intro: "Road Designs and Signs. Do the following:"
    children:
      - id: "5a"
        prompt: >
          Explain how road designs for intersections, medians, and road
          shoulders contribute to traffic safety. Discuss safety features of
          interstate highways.
        field: { type: text_box, lines: 7 }
      - id: "5b"
        prompt: >
          Explain how color and shape help drivers recognize and understand the
          information presented on traffic and roadway signs. Explain the purpose
          of different types of signs, signals, and pavement markings.
        field: { type: text_box, lines: 7 }

  - id: "6"
    intro: "Sharing the Road. Do the following:"
    children:
      - id: "6a"
        prompt: >
          Describe the difference in nighttime visibility between a properly lit
          bicycle and rider (or a pedestrian) wearing reflective material and a
          bicycle and rider with no lights (or a pedestrian) dressed in dark
          clothing without reflective material.
        field: { type: text_box, lines: 6 }
      - id: "6b"
        prompt: >
          Name at least four safety measures that pedestrians, including hikers,
          should follow as they walk along or across streets or roadways.
        field: { type: text_box, lines: 6 }
      - id: "6c"
        prompt: >
          Name at least four safety measures that drivers of motor vehicles
          should follow if they approach a school bus making its stops at pick-up
          and drop-off locations.
        field: { type: text_box, lines: 6 }
      - id: "6d"
        prompt: >
          Discuss the risks associated with blind spots on cars and trucks and
          how drivers can prevent lane change crashes.
        field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: "Traffic, Your Community, and You. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Interview a traffic law enforcement officer or a traffic safety professional in your community to identify what three traffic safety problems the officer is most concerned about. Discuss with your counselor possible ways to solve one of those problems."
        - "(b) Write a personal traffic safety pledge, addressing three of your most concerning issues relating to traffic safety. Discuss your pledge with your counselor."
        - "(c) Initiate and organize an activity or event to demonstrate the importance of traffic safety."
    children:
      - id: "7-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "8"
    prompt: >
      Careers. Explore careers related to traffic safety. Research one career to
      learn about the training and education needed, costs, job prospects,
      salary, job duties, and career advancement. Your research methods may
      include, with your parent or guardian's permission, an internet or library
      search, an interview with a professional in the field, or a visit to a
      location where people in this career work. Discuss with your counselor both
      your findings and what about this profession might make it an interesting
      career.
    field: { type: text_box, lines: 10 }
