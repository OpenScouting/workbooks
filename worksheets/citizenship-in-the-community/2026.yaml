badge:
  name: Citizenship in the Community
  slug: citizenship-in-the-community
  requirements_revision: "2026-01-01"
  description: >
    Citizenship in the Community helps you understand how your local government,
    services, and organizations work together. You explore the rights and duties
    of a good citizen and put them into practice through volunteering and civic
    participation.

requirements:
  - id: "1"
    prompt: >
      Discuss with your counselor what citizenship in the community means and
      what it takes to be a good citizen in your community. Discuss the rights,
      duties, and obligations of citizenship, and explain how you can demonstrate
      good citizenship in your community, Scouting unit, place of worship, or
      school.
    field: { type: text_box, lines: 9 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Using an electronic mapping tool or paper map, locate and pinpoint the
          following services and landmarks in your community. Determine and
          record the distances from your home including driving time AND either
          walking or biking time.
        children:
          - id: "2a1"
            prompt: >
              Chief government buildings such as your city hall, county
              courthouse, and public works/services facilities
            field: { type: text_box, lines: 3 }
          - id: "2a2"
            prompt: "Fire station, police station, and hospital nearest your home"
            field: { type: text_box, lines: 3 }
          - id: "2a3"
            prompt: "Parks, playgrounds, recreation areas, and trails"
            field: { type: text_box, lines: 3 }
          - id: "2a4"
            prompt: "Historical or other interesting points of interest"
            field: { type: text_box, lines: 3 }
      - id: "2b"
        prompt: >
          Chart the organization of your local or state government. Show the top
          offices and tell whether they are elected or appointed.
        field: { type: text_box, lines: 10 }

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: >
          Attend an in-person meeting of your city, town, or county council or
          school board, local court session; OR another state or local
          governmental meeting approved in advance by your counselor.
        field: { type: checkbox }
      - id: "3b"
        prompt: >
          Choose one of the issues discussed at the meeting where a difference of
          opinions was expressed, and explain to your counselor why you agree with
          one opinion more than you do another one.
        field: { type: text_box, lines: 7 }

  - id: "4"
    intro: "Choose an issue that is important to the citizens of your community; then do the following:"
    children:
      - id: "4a"
        prompt: "Find out which branch of local government is responsible for this issue."
        field: { type: text_box, lines: 4 }
      - id: "4b"
        prompt: >
          With your counselor's and a parent or guardian's approval, interview one
          person from the branch of government you identified in requirement 4(a).
          Ask what is being done about this issue and how young people can help.
        field: { type: text_box, lines: 7 }
      - id: "4c"
        prompt: "Share what you have learned with your counselor."
        field: { type: text_box, lines: 5 }

  - id: "5"
    prompt: >
      With the approval of your counselor and a parent or guardian, watch a movie
      that shows how the actions of one individual or group of individuals can
      have a positive effect on a community. Discuss with your counselor what you
      learned from the movie about what it means to be a valuable and concerned
      member of the community.
    field: { type: text_box, lines: 8 }

  - id: "6"
    prompt: >
      List some of the services (such as the library, recreation center, public
      transportation, and public safety) your community provides that are funded
      by taxpayers. Tell your counselor why these services are important to your
      community.
    field:
      type: table
      headers: ["Taxpayer-funded service", "Why it is important"]
      rows: 6
      cols: 2

  - id: "7"
    intro: "Do the following:"
    children:
      - id: "7a"
        prompt: >
          Identify three charitable organizations outside of Scouting that
          interest you and bring people in your community together to work for the
          good of your community.
        field: { type: text_box, lines: 5 }
      - id: "7b"
        prompt: >
          Pick ONE of the organizations you chose for requirement 7(a). Using a
          variety of resources (including newspapers, fliers and other literature,
          the internet, volunteers, and employees of the organization), find out
          more about this organization.
        field: { type: text_box, lines: 7 }
      - id: "7c"
        prompt: >
          With your counselor's and your parent or guardian's approval, contact
          the organization you chose for requirement 7(b), and find out what young
          people can do to help. While working on this merit badge, volunteer at
          least eight hours of your time for the organization. After your volunteer
          experience is over, discuss what you have learned with your counselor.
        field: { type: text_box, lines: 8 }

  - id: "8"
    prompt: >
      Develop a public presentation (such as a video, slide show, speech, digital
      presentation, or photo exhibit) about important and unique aspects of your
      community. Include information about the history, cultures, and ethnic groups
      of your community; its best features and popular places where people gather;
      and the challenges it faces. Stage your presentation in front of your
      counselor or a group, such as your patrol or a class at school.
    field: { type: text_box, lines: 10 }
