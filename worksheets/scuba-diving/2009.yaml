badge:
  name: Scuba Diving
  slug: scuba-diving
  requirements_revision: "2009-01-01"
  description: >
    The Scuba Diving merit badge introduces you to the underwater world through
    formal Open Water Diver certification. You will learn the safety code,
    first aid, and dive science that let you explore aquatic ecosystems
    responsibly.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Show that you know first aid for injuries or illnesses that could
          occur while scuba diving, including hypothermia, hyperventilation,
          squeezes, decompression illness, nitrogen narcosis, motion sickness,
          fatigue, overexertion, heat reactions, dehydration, injuries by
          aquatic life, and cuts and scrapes.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Hypothermia
            - Hyperventilation
            - Squeezes
            - Decompression illness
            - Nitrogen narcosis
            - Motion sickness
            - Fatigue
            - Overexertion
            - Heat reactions
            - Dehydration
            - Injuries by aquatic life
            - Cuts and scrapes
      - id: "1b"
        prompt: >
          Identify the conditions that must exist before performing CPR on a
          person, and explain how to recognize such conditions. Demonstrate the
          proper technique for performing CPR using a training device approved by
          your counselor.
        field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: "Before completing requirements 3 through 6, earn the Swimming merit badge."
    field:
      type: checkbox
      label: "I have earned the Swimming merit badge."

  - id: "3"
    prompt: >
      Discuss the Scuba Diver's Code with your counselor, and explain the
      importance of each guideline to a scuba diver's safety.
    field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: >
      Earn an Open Water Diver Certification from a scuba organization
      recognized by the Scouting America scuba policy.
    field:
      type: checkbox
      label: "I have earned an Open Water Diver Certification."

  - id: "5"
    prompt: >
      Explain what an ecosystem is, and describe four aquatic ecosystems a
      diver might experience.
    children:
      - id: "5-def"
        prompt: "Explain what an ecosystem is."
        field: { type: text_box, lines: 5 }
      - id: "5-eco"
        prompt: "Describe four aquatic ecosystems a diver might experience."
        field:
          type: repeated_block
          count: 4
          template:
            - { label: "Aquatic ecosystem", type: text_field }
            - { label: "Description", type: text_box, lines: 3 }

  - id: "6"
    prompt: >
      Find out about three career opportunities in the scuba industry. Pick one
      and find out the education, training, and experience required for this
      profession. Discuss this with your counselor, and explain why this
      profession might interest you.
    field: { type: text_box, lines: 8 }
