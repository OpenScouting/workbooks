badge:
  name: Sports
  slug: sports
  requirements_revision: "2025-01-01"
  description: >
    The Sports merit badge builds athletic skill, fitness, and good
    sportsmanship. Scouts train for and compete in two sports of their choice,
    learning the rules, equipment, and healthy habits that make competition
    rewarding and safe.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely risks you may encounter
          while participating in sports and what you should do to anticipate,
          help prevent, mitigate, and respond to these risks.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Show that you know first aid or understand the treatment for injuries
          that could occur while participating in sports, including sprains;
          strains; muscle cramps; contusions; abrasions; blisters; dehydration;
          heat reactions; fractures; injured teeth; head, neck, and back
          injuries; and concussions.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Sprains
            - Strains
            - Muscle cramps
            - Contusions
            - Abrasions
            - Blisters
            - Dehydration
            - Heat reactions
            - Fractures
            - Injured teeth
            - "Head, neck, and back injuries"
            - Concussions

  - id: "2"
    intro: "Explain the following:"
    children:
      - id: "2a"
        prompt: "The importance of the physical exam"
        field: { type: text_box, lines: 5 }
      - id: "2b"
        prompt: >
          The importance of maintaining good health habits for life (such as
          exercising regularly), and how the use of tobacco products, alcohol,
          and other harmful substances can negatively affect your health and
          your performance in sports activities
        field: { type: text_box, lines: 7 }
      - id: "2c"
        prompt: "The importance of maintaining a healthy diet"
        field: { type: text_box, lines: 5 }

  - id: "3"
    intro: "Discuss the following:"
    children:
      - id: "3a"
        prompt: "The importance of warming up and cooling down"
        field: { type: text_box, lines: 5 }
      - id: "3b"
        prompt: "The importance of weight training"
        field: { type: text_box, lines: 5 }
      - id: "3c"
        prompt: >
          What an amateur athlete is and the differences between an amateur and
          a professional athlete
        field: { type: text_box, lines: 6 }
      - id: "3d"
        prompt: >
          The attributes (qualities) of a good sport, the importance of
          sportsmanship, and the traits of a good team leader and player who
          exhibits Scout spirit on and off the playing field
        field: { type: text_box, lines: 7 }

  - id: "4"
    prompt: >
      Select TWO of the following sports and discuss with your counselor how you
      will complete the requirements in 5(a) through 5(h) for each sport:
      badminton, baseball, basketball, bowling, cross-country, diving, field
      hockey, flag football, flag team, golf, gymnastics, ice hockey, lacrosse,
      soccer, softball, spirit/cheerleading, swimming, tackle football, table
      tennis, tennis, track and field, volleyball, water polo, and/or wrestling.
      Your counselor may approve in advance other recognized sports, but not any
      sport that is prohibited by Scouting America. The sports you choose must
      include regular practice sessions and at least four structured, officiated,
      scored games, meets, or contests against other competitive individuals or
      organized teams during the period of participation.
    field:
      type: table
      headers: ["Sport chosen", "Plan for completing 5(a) through 5(h)"]
      rows: 2
      cols: 2

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          With guidance from your counselor, establish a suitable personal
          training program that you will follow throughout your competition
          season (or for three months).
        field: { type: text_box, lines: 8 }
      - id: "5b"
        prompt: >
          Create a chart or other tracking system, and document your training,
          practice, and development during this time.
        field:
          type: table
          headers: ["Date", "Sport", "Training/practice", "Development notes"]
          rows: 10
          cols: 4
      - id: "5c"
        prompt: >
          Demonstrate proper technique to play each sport effectively and avoid
          injury.
        field: { type: text_box, lines: 6 }
      - id: "5d"
        prompt: >
          List and describe the equipment needed for each sport, including
          protective equipment and any specialized clothing.
        field:
          type: repeated_block
          count: 2
          template:
            - { label: "Sport", type: text_field }
            - { label: "Equipment and clothing", type: text_box, lines: 5 }
      - id: "5e"
        prompt: "List and explain the rules and proper etiquette of each sport."
        field:
          type: repeated_block
          count: 2
          template:
            - { label: "Sport", type: text_field }
            - { label: "Rules and etiquette", type: text_box, lines: 6 }
      - id: "5f"
        prompt: "Draw and explain a diagram of the playing area for each sport."
        field: { type: draw_area, height: 4 }
      - id: "5g"
        prompt: >
          Participate in each sport as a competitive individual or as a member
          of an organized team for one season (or for three months).
        field: { type: checkbox, label: "Participated in each sport for one season (or for three months)." }
      - id: "5h"
        prompt: >
          At the end of the season, share your completed chart with your
          counselor and discuss how your participation in the sports you chose
          has affected you mentally and physically.
        field: { type: text_box, lines: 7 }

  - id: "6"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Identify three career opportunities that would use skills and knowledge related to a sport. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "(b) Identify how you might use skills and knowledge related to a sport to pursue a personal hobby and/or healthy lifestyle. Research the additional training required, expenses, and affiliation with organizations that would help you maximize the enjoyment and benefit you might gain from it. Discuss what you learned with your counselor and share what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "6-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
