badge:
  name: Geology
  slug: geology
  requirements_revision: "2026-01-01"
  description: >
    Geology is the study of the Earth, its rocks and minerals, and the processes
    that shape it over time. This badge lets you explore one of four paths,
    surface processes, energy resources, mineral resources, or Earth history,
    while collecting specimens and learning how geologists read the landscape.

requirements:
  - id: "1"
    prompt: "Define geology. Discuss how geologists learn about rock formations. In geology, explain why the study of the present is important to understanding the past."
    field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: "Pick three resources that can be extracted or mined from Earth for commercial use. Discuss with your counselor how each product is discovered and processed."
    field:
      type: repeated_block
      count: 3
      template:
        - { label: "Resource", type: text_field }
        - { label: "How it is discovered and processed", type: text_box, lines: 3 }

  - id: "3"
    prompt: "Review a geologic map of your area or an area approved by your counselor, and discuss the different rock types and estimated ages of rocks represented. Determine whether the rocks are sedimentary, metamorphic, or igneous. Explain if the geologic map shows horizontal, folded, faulted, or intrusive rocks, and explain how you arrived at your conclusion."
    field: { type: text_box, lines: 9 }

  - id: "4"
    prompt: "Do ONE of the following options:"
    children:
      - id: "4-choice"
        prompt: "Select the option you will complete."
        field:
          type: checklist
          items:
            - "Option A: Surface and Sedimentary Processes"
            - "Option B: Energy Resources"
            - "Option C: Mineral Resources"
            - "Option D: Earth History"

      - id: "4A"
        intro: "Option A: Surface and Sedimentary Processes. Do ALL of the following:"
        children:
          - id: "4A1"
            prompt: "Conduct an experiment approved by your counselor that demonstrates how sediments settle from suspension in water. Explain to your counselor what the exercise shows and why it is important."
            field: { type: text_box, lines: 6 }
          - id: "4A2"
            prompt: "Using topographical maps provided by your counselor, plot the stream gradients (different elevations divided by distance) for four different stream types (straight, meandering, dendritic, trellis). Explain which ones flow fastest and why, and which ones will carry larger grains of sediment and why."
            field: { type: text_box, lines: 7 }
          - id: "4A3"
            prompt: "On a stream diagram, show areas where you will find the following features: cut bank, fill bank, point bar, medial channel bars, lake delta. Describe the relative sediment grain size found in each feature."
            field: { type: draw_area, height: 4 }
          - id: "4A4"
            prompt: "Conduct an experiment approved by your counselor that shows how some sedimentary material carried by water may be too small for you to see without a magnifier."
            field: { type: text_box, lines: 5 }
          - id: "4A5"
            prompt: "Visit a nearby stream. Find clues that show the direction of water flow, even if the water is missing. Record your observations in a notebook, and sketch those clues you observe. Discuss your observations with your counselor."
            field: { type: text_box, lines: 7 }

      - id: "4B"
        intro: "Option B: Energy Resources. Do ALL of the following:"
        children:
          - id: "4B1"
            prompt: "List the top five Earth resources used to generate electricity in the United States."
            field: { type: text_box, lines: 5 }
          - id: "4B2"
            prompt: "Discuss source rock, trap, and reservoir rock, the three components necessary for the occurrence of oil and gas underground."
            field: { type: text_box, lines: 6 }
          - id: "4B3"
            prompt: "Explain how each of the following items is used in subsurface exploration to locate oil or gas: reflection seismic, electric well logs, stratigraphic correlation, offshore platform, geologic map, subsurface structure map, subsurface isopach map, and core samples and cutting samples."
            field:
              type: labeled_rows
              lines_each: 2
              labels:
                - "Reflection seismic"
                - "Electric well logs"
                - "Stratigraphic correlation"
                - "Offshore platform"
                - "Geologic map"
                - "Subsurface structure map"
                - "Subsurface isopach map"
                - "Core samples and cutting samples"
          - id: "4B4"
            prompt: "Using at least 20 data points provided by your counselor, create a subsurface structure map and use it to explain how subsurface geology maps are used to find oil, gas, or coal resources."
            field: { type: text_box, lines: 7 }
          - id: "4B5"
            prompt: "Do ONE of the following:"
            field:
              type: checklist
              items:
                - "(a) Make a display or presentation showing how oil and gas or coal is found, extracted, and processed. You may use maps, books, articles from periodicals, and research found on the internet (with your parent or guardian's permission). Share the display with your counselor or a small group (such as your class at school) in a five-minute presentation."
                - "(b) With your parent or guardian's and counselor's permission and assistance, arrange for a visit to an operating drilling rig. While there, talk with a geologist and ask to see what the geologist does onsite. Ask to see cutting samples taken at the site."
            children:
              - id: "4B5-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 7 }

      - id: "4C"
        intro: "Option C: Mineral Resources. Do ALL of the following:"
        children:
          - id: "4C1"
            prompt: "Define rock. Discuss the three classes of rocks including their origin and characteristics."
            field: { type: text_box, lines: 7 }
          - id: "4C2"
            prompt: "Define mineral. Discuss the origin of minerals and their chemical composition and identification properties, including hardness, specific gravity, color, streak, cleavage, luster, and crystal form."
            field: { type: text_box, lines: 8 }
          - id: "4C3"
            prompt: "Do ONE of the following:"
            field:
              type: checklist
              items:
                - "(a) Collect 10 different rocks or minerals. Record in a notebook where you obtained (found, bought, traded) each one. Label each specimen, identify its class and origin, determine its chemical composition, and list its physical properties. Share your collection with your counselor."
                - "(b) With your counselor's assistance, identify 15 different rocks and minerals. List the name of each specimen, tell whether it is a rock or mineral, and give the name of its class (if it is a rock) or list its identifying physical properties (if it is a mineral)."
            children:
              - id: "4C3-log"
                prompt: "Record your specimens here."
                field: { type: table, headers: ["Specimen", "Source", "Class / origin / properties"], rows: 15, cols: 3 }
          - id: "4C4"
            prompt: "List three of the most common road building materials used in your area. Explain how each material is produced and how each is used in road building."
            field:
              type: repeated_block
              count: 3
              template:
                - { label: "Material", type: text_field }
                - { label: "How it is produced and used in road building", type: text_box, lines: 2 }
          - id: "4C5"
            prompt: "Do ONE of the following:"
            field:
              type: checklist
              items:
                - "(a) With your parent or guardian's and counselor's approval, visit an active mining site, quarry, or sand and gravel pit. Tell your counselor what you learned about the resources extracted from this location and how these resources are used by society."
                - "(b) With your counselor, choose two examples of rocks and two examples of minerals. Discuss the mining of these materials and describe how each is used by society."
                - "(c) With your parent or guardian's and counselor's approval, visit the office of a civil engineer and learn how geology is used in construction. Discuss what you learned with your counselor."
            children:
              - id: "4C5-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 7 }

      - id: "4D"
        intro: "Option D: Earth History. Do ALL of the following:"
        children:
          - id: "4D1"
            prompt: "Create a chart showing suggested geological eras and periods. Determine which period the rocks in your region might have been formed."
            field: { type: text_box, lines: 8 }
          - id: "4D2"
            prompt: "Explain the theory of plate tectonics. Make a chart explaining, or discuss with your counselor, how the processes of plate tectonics work. Discuss how plate tectonics determines the distribution of most of the Earth's volcanoes, earthquakes, and mountain belts."
            field: { type: text_box, lines: 8 }
          - id: "4D3"
            prompt: "Explain to your counselor the processes of burial and fossilization, and discuss the concept of extinction."
            field: { type: text_box, lines: 6 }
          - id: "4D4"
            prompt: "Explain to your counselor how fossils provide information about ancient life, environment, climate, and geography. Discuss the following terms and explain how animals from each habitat obtain food: benthonic, pelagic, littoral, lacustrine, open marine, brackish, fluvial, eolian, and protected reef."
            field:
              type: labeled_rows
              lines_each: 2
              labels:
                - "Benthonic"
                - "Pelagic"
                - "Littoral"
                - "Lacustrine"
                - "Open marine"
                - "Brackish"
                - "Fluvial"
                - "Eolian"
                - "Protected reef"
          - id: "4D5"
            prompt: "Collect 10 different fossil plants or animals OR (with your counselor's assistance) identify 15 different fossil plants or animals. Record in a notebook where you obtained (found, bought, traded) each one. Classify each specimen to the best of your ability, and explain how each one might have survived and obtained food. Tell what else you can learn from these fossils."
            field: { type: table, headers: ["Fossil specimen", "Source", "Classification and notes"], rows: 15, cols: 3 }
          - id: "4D6"
            prompt: "Do ONE of the following:"
            field:
              type: checklist
              items:
                - "(a) Visit a science museum or the geology department of a local university that has fossils on display. With your parent or guardian's and counselor's approval, before you go, make an appointment with a curator or guide who can show you how the fossils are preserved and prepared for display."
                - "(b) Visit a structure in your area that was built using fossiliferous rocks. Determine what kind of rock was used and tell your counselor the kinds of fossil evidence you found there."
                - "(c) Visit a rock outcrop that contains fossils. Determine what kind of rock contains the fossils, and tell your counselor the kinds of fossil evidence you found at the outcrop."
                - "(d) Prepare a display or presentation on your state fossil. Include an image of the fossil, the age of the fossil, and its classification. You may use maps, books, articles from periodicals, and research found on the internet (with your parent or guardian's permission). Share the display with your counselor or a small group (such as your class at school). If your state does not have a state fossil, you may select a state fossil from a neighboring state."
            children:
              - id: "4D6-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 7 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: "Discuss with your counselor the importance of the Leave No Trace Seven Principles and the Outdoor Code as they relate to the study of geology."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Explain how you practiced the Leave No Trace Seven Principles and the Outdoor Code while traveling in natural areas and while collecting rock and fossil specimens for this merit badge."
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Explore careers related to this merit badge. Research one career to learn about the training and education needed, costs, job prospects, salary, job duties, and career advancement. Your research methods may include, with your parent or guardian's permission, an internet or library search, an interview with a professional in the field, or a visit to a location where people in this career work. Discuss with your counselor both your findings and what about this profession might make it an interesting career."
        - "(b) Explore how you could use knowledge and skills from this merit badge to pursue a hobby or healthy lifestyle. Research any training needed, expenses, and organizations that promote or support it. Discuss with your counselor what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "6-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
