badge:
  name: Fly Fishing
  slug: fly-fishing
  requirements_revision: "2026-01-01"
  description: >
    Fly fishing is a distinctive style of angling that uses a weighted line and
    lightweight artificial flies to imitate what fish are feeding on. This badge
    covers balancing your tackle, tying knots and flies, casting, and the
    conservation ethics of the sport.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: "Explain to your counselor the most likely hazards you may encounter while participating in fly-fishing activities and what you should do to anticipate, help prevent, mitigate, and respond to these hazards. Name and explain five safety practices you should always follow while fly-fishing."
        field: { type: text_box, lines: 9 }
      - id: "1b"
        prompt: "Discuss the prevention of and treatment for the following health concerns that could occur while fly-fishing: cuts and scratches, puncture wounds, insect bites, hypothermia, dehydration, heat exhaustion, heatstroke, and sunburn."
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Cuts and scratches"
            - "Puncture wounds"
            - "Insect bites"
            - "Hypothermia"
            - "Dehydration"
            - "Heat exhaustion"
            - "Heatstroke"
            - "Sunburn"
      - id: "1c"
        prompt: "Explain how to remove a hook that has lodged in someone's arm."
        field: { type: text_box, lines: 5 }

  - id: "2"
    prompt: "Demonstrate how to match a fly rod, line, and leader to achieve a balanced system. Discuss several types of fly lines, and explain how and when each would be used. Review with your counselor how to care for this equipment."
    field: { type: text_box, lines: 9 }

  - id: "3"
    prompt: "Demonstrate how to tie proper knots to prepare a fly rod for fishing:"
    field:
      type: checklist
      items:
        - "(a) Tie backing to the arbor of a fly reel spool using an arbor knot."
        - "(b) Tie backing to the fly line using a nail (tube) knot."
        - "(c) Attach a leader to the fly line using a nail (tube) knot or a loop-to-loop connection."
        - "(d) Add a tippet to a leader using a surgeon's knot or a loop-to-loop connection."
        - "(e) Tie a fly onto the terminal end of the leader using an improved clinch knot."

  - id: "4"
    prompt: "Explain how and when each of the following types of flies is used: dry flies, wet flies, nymphs, streamers, bass bugs, poppers, and saltwater flies. Tell what each one imitates. Tie at least two types of the flies mentioned in this requirement."
    children:
      - id: "4-types"
        prompt: "For each fly type, explain how and when it is used and what it imitates."
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Dry flies"
            - "Wet flies"
            - "Nymphs"
            - "Streamers"
            - "Bass bugs"
            - "Poppers"
            - "Saltwater flies"
      - id: "4-tie"
        field: { type: checkbox, label: "Tied at least two types of the flies mentioned in this requirement." }

  - id: "5"
    prompt: "Demonstrate the ability to cast a fly 30 feet consistently and accurately using both overhead and roll cast techniques."
    field:
      type: checklist
      items:
        - "Cast a fly 30 feet consistently and accurately using the overhead cast."
        - "Cast a fly 30 feet consistently and accurately using the roll cast."

  - id: "6"
    prompt: "Go to a suitable fishing location and observe what fish may be eating both above and beneath the water's surface. Explain the importance of matching the hatch."
    field: { type: text_box, lines: 7 }

  - id: "7"
    intro: "Do the following:"
    children:
      - id: "7a"
        prompt: "Explain the importance of practicing Leave No Trace Seven Principles and the Outdoor Code. Discuss the positive effects of the Leave No Trace Seven Principles and the Outdoor Code on fly-fishing resources."
        field: { type: text_box, lines: 7 }
      - id: "7b"
        prompt: "Discuss the meaning and importance of catch and release. Describe how to properly release a fish safely to the water."
        field: { type: text_box, lines: 6 }

  - id: "8"
    prompt: "Obtain and review a copy of the regulations affecting game fishing where you live or where you plan to fish. Explain why they were adopted and what is accomplished by following them."
    field: { type: text_box, lines: 7 }

  - id: "9"
    prompt: "Explain what good outdoor sportsmanlike behavior is and how it relates to anglers. Tell how the Leave No Trace Seven Principles and the Outdoor Code relate to a fishing sports enthusiast, including the aspects of littering, trespassing, courteous behavior, and obeying fishing regulations."
    field: { type: text_box, lines: 8 }

  - id: "10"
    prompt: "Catch one fish on a fly and identify it."
    field: { type: text_box, lines: 4 }

  - id: "11"
    prompt: "If regulations and health concerns permit, clean and cook a fish you have caught. If you are unable to catch a fish for eating, acquire a fish, clean the fish you acquired, and cook the fish you acquired. Note: It is not required that you eat the fish."
    field: { type: text_box, lines: 6 }
