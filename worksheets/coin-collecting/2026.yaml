badge:
  name: Coin Collecting
  slug: coin-collecting
  requirements_revision: "2026-01-01"
  description: >
    Coin collecting, or numismatics, is one of the world's oldest hobbies.
    Earning this badge teaches you how coins and currency are made, how to
    identify and care for them, and how to build and organize a collection of
    your own.

requirements:
  - id: "1"
    prompt: >
      Understand how coins are made and where the active U.S. Mint facilities
      are located.
    field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      Explain the following terms: obverse, reverse, reeding, clad, type set,
      and date set.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - "Obverse"
        - "Reverse"
        - "Reeding"
        - "Clad"
        - "Type set"
        - "Date set"

  - id: "3"
    prompt: >
      Describe three different ways to store a collection, and the benefits,
      drawbacks, and cost of each method.
    field:
      type: repeated_block
      count: 3
      template:
        - { label: "Storage method", type: text_field }
        - { label: "Benefits", type: text_box, lines: 2 }
        - { label: "Drawbacks", type: text_box, lines: 2 }
        - { label: "Cost", type: text_box, lines: 2 }

  - id: "4"
    prompt: >
      Do the following and explain to your counselor the design features,
      designer name, designer initials, and where to find them for each item:
    children:
      - id: "4a"
        prompt: >
          Collect a one-cent coin from the year group: 1959-2008 (that is,
          dated between 1959 and 2008) and a one-cent coin from the year group
          2010-present. Explain how and why the one-cent coins issued in 2009
          were different from either of the other two year groups.
        field: { type: text_box, lines: 6 }
      - id: "4b"
        prompt: >
          Collect two five-cent coins, one from each of these year groups:
          1959-2003 and 2006-present. Explain how and why the five-cent coins
          issued in 2004-2005 were different from either of the other two year
          groups.
        field: { type: text_box, lines: 6 }
      - id: "4c"
        prompt: "Collect a ten-cent coin from 1965-present."
        field: { type: text_box, lines: 3 }
      - id: "4d"
        prompt: >
          Collect a twenty-five-cent coin from 1965-1998, two examples from the
          50-State Quarter / territories Program 1999-2009, two designs from the
          America the Beautiful program 2010-2021 and two designs from the
          American Woman Quarter program (2022-2024). Explain the purpose of
          each of those programs.
        field: { type: text_box, lines: 8 }
      - id: "4e"
        prompt: "Collect a half dollar coin from 1965-present."
        field: { type: text_box, lines: 3 }
      - id: "4f"
        prompt: >
          Collect a dollar coin from the following design groups: Susan B.
          Anthony 1979-1981, 1999, Sacagawea 2000-2008, U.S. Presidents
          2007-2016, 2020.
        field: { type: text_box, lines: 5 }

  - id: "5"
    prompt: >
      Describe and discuss with your counselor the special reverse designs of
      the quarters, half dollar and dollar coin struck in 1975-1976 to honor
      the U.S. Bicentennial.
    field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: >
      Identify for your counselor the people depicted on current currency: $1,
      $2, $5, $10, $20, $50, and $100 notes. Explain where United States
      currency is printed.
    field:
      type: labeled_rows
      lines_each: 1
      labels:
        - "$1 note"
        - "$2 note"
        - "$5 note"
        - "$10 note"
        - "$20 note"
        - "$50 note"
        - "$100 note"
        - "Where U.S. currency is printed"

  - id: "7"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Collect and identify for your counselor 20 different world coins from at least seven different countries. Identify the country, major design elements, and denomination of each."
        - "(b) Collect and identify for your counselor 20 different world paper money from at least 7 different countries. Identify the country, major design elements, and denomination of each."
        - "(c) Collect and identify for your counselor 20 different tokens and/or medals. Identify the issuer and use of each."
        - "(d) Complete one of the following and report to your counselor what you experienced: (1) Attend a coin show. (2) Attend a coin club meeting. (3) Tour a U.S. Mint facility or museum. (4) Tour a virtual exhibit (with your parent or guardian's permission) approved by your counselor."
    children:
      - id: "7-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
