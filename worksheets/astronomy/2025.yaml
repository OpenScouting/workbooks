badge:
  name: Astronomy
  slug: astronomy
  requirements_revision: "2025-01-01"
  description: >
    The Astronomy merit badge invites you to explore the night sky and the
    science behind it. You will learn to observe safely, identify stars,
    constellations, planets, and the Moon, and understand the tools and ideas
    astronomers use to study the universe.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely hazards you may encounter
          while participating in astronomy activities, and what you should do to
          anticipate, help prevent, mitigate, and respond to these hazards.
        field: { type: text_box, lines: 7 }
      - id: "1b"
        prompt: >
          Explain first aid for injuries or illnesses such as heat and cold
          reactions, dehydration, bites and stings, and damage to your eyes that
          could occur during observations.
        field:
          type: labeled_rows
          lines_each: 2
          labels: ["Heat and cold reactions", "Dehydration", "Bites and stings", "Damage to your eyes"]
      - id: "1c"
        prompt: >
          Describe the proper clothing and other precautions for safely making
          observations at night and in cold weather.
        field: { type: text_box, lines: 5 }
      - id: "1d"
        prompt: "Explain how to safely observe the Sun, objects near the Sun and solar eclipses."
        field: { type: text_box, lines: 5 }

  - id: "2"
    prompt: "Explain what light pollution is and how it and air pollution affect astronomy."
    field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: "With the aid of diagrams (or real telescopes if available), do the following:"
    children:
      - id: "3a"
        prompt: >
          Explain why binoculars and telescopes are important astronomical tools.
          Demonstrate or explain how these tools are used.
        field: { type: text_box, lines: 6 }
      - id: "3b"
        prompt: >
          Describe the similarities and differences of several types of
          astronomical telescopes, including at least one that observes light
          beyond the visible part of the spectrum (i.e., radio, X-ray,
          ultraviolet, or infrared).
        field: { type: text_box, lines: 7 }
      - id: "3c"
        prompt: "Explain the purposes of three instruments used with astronomical telescopes."
        field: { type: text_box, lines: 6 }
      - id: "3d"
        prompt: "Describe the proper care and storage of telescopes and binoculars both at home and in the field."
        field: { type: text_box, lines: 5 }

  - id: "4"
    prompt: >
      Do the following (if instruction is done in a planetarium, Scouts must still
      identify the required stars and constellations outside under the natural
      night sky):
    children:
      - id: "4a"
        prompt: "Identify in the sky 10 constellations, at least four of which are in the zodiac."
        field: { type: text_box, lines: 5 }
      - id: "4b"
        prompt: "Identify in the sky eight conspicuous stars, five of which are of magnitude 1 or brighter."
        field: { type: text_box, lines: 5 }
      - id: "4c"
        prompt: >
          Make two sketches of the Big Dipper or Cassiopeia from direct
          observation. In one sketch, show the Big Dipper's or Cassiopeia's
          orientation in the early evening sky. Make another sketch, showing its
          position several hours later. In both sketches, show the North Star and
          the horizon. Record the date and time each sketch was made.
        field: { type: checkbox, label: "Completed two sketches of the Big Dipper or Cassiopeia as described, with dates and times recorded." }
      - id: "4d"
        prompt: "Explain what we see when we look at the Milky Way."
        field: { type: text_box, lines: 5 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          List the names of the five most visible planets. Explain which ones can
          appear in phases similar to lunar phases and which ones cannot, and
          explain why.
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: >
          Using the internet (with your parent or guardian's permission) and other
          resources, find out when each of the five most visible planets that you
          identified in requirement 5(a) will be observable in the evening sky
          during the next 12 months, then compile this information in the form of a
          chart or table.
        field:
          type: table
          headers: ["Planet", "When observable in the evening sky"]
          rows: 5
          cols: 2
      - id: "5c"
        prompt: "Describe the motion of the planets across the sky."
        field: { type: text_box, lines: 5 }
      - id: "5d"
        prompt: "Observe a planet and describe what you saw."
        field: { type: text_box, lines: 5 }

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: "Sketch the face of the Moon and indicate five seas and five craters. Label these landmarks."
        field: { type: checkbox, label: "Completed a labeled sketch of the Moon showing five seas and five craters." }
      - id: "6b"
        prompt: >
          Sketch the phase and position of the Moon, at the same hour and place,
          for four nights (or days) within a one-week period by direct
          observation. Include landmarks on the horizon such as hills, trees, and
          buildings. Explain the changes you observe.
        field: { type: draw_area, height: 4 }
      - id: "6c"
        prompt: "List the factors that keep the Moon in orbit around Earth."
        field: { type: text_box, lines: 5 }
      - id: "6d"
        prompt: >
          With the aid of diagrams, explain the relative positions of the Sun,
          Earth, and the Moon at the times of lunar and solar eclipses, and at the
          times of new, first-quarter, full, and last-quarter phases of the Moon.
        field: { type: text_box, lines: 7 }

  - id: "7"
    intro: "Do the following:"
    children:
      - id: "7a"
        prompt: >
          Describe the composition of the Sun, its relationship to other stars,
          and some effects of its radiation on Earth's weather and communications.
        field: { type: text_box, lines: 6 }
      - id: "7b"
        prompt: "Define sunspots and describe some of the effects they may have on solar radiation."
        field: { type: text_box, lines: 5 }
      - id: "7c"
        prompt: >
          Identify at least one red star, one blue star, and one yellow star
          (other than the Sun). Explain the meaning of these colors.
        field: { type: text_box, lines: 6 }

  - id: "8"
    prompt: "With your counselor's approval and guidance, do ONE of the following:"
    field:
      type: checklist
      items:
        - "Visit a planetarium or astronomical observatory. Submit a written report, a scrapbook, OR a video presentation afterward to your counselor that includes the following information: activities occurring there, exhibits and displays you saw, telescopes and other instruments being used, and celestial objects you observed."
        - "Plan and participate in an observation session that includes using binoculars or a telescope and includes at least 10 celestial objects beyond those observed in requirement 4. These might be lunar features, Messier objects, additional constellations or planets, or artificial satellites including the International Space Station. List the celestial objects you want to observe and find each in a star chart, guidebook or by using an app. Prepare a log or notebook. Discuss with your counselor what you hope to observe prior to your observation session. Review your log or notebook with your counselor afterward."
        - "Plan and host a star party for your Scout troop or other group such as your class at school. Use binoculars or a telescope to show and explain celestial objects to the group."
        - "Help an astronomy club in your community hold a star party that is open to the public."
        - "Personally take a series of photographs or digital images of the movement of the Moon, a planet, an asteroid, meteor, or a comet. In your visual display, label each image and include the date and time it was taken. Show all positions on a star chart or map. Show your display at school or at a troop meeting. Explain the changes you observed."
        - "With your parent or guardian's and counselor's approval, use online observing opportunities such as SkyNet to observe planets, comets, galaxies, and/or the sun. Describe your experience to your counselor."
    children:
      - id: "8-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "9"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "Identify three career opportunities that would use skills and knowledge in astronomy. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "Identify how you might use the skills and knowledge in astronomy to pursue a personal hobby. Research the additional training required, expenses, and affiliation with organizations that would help you maximize the enjoyment and benefit you might gain from it. Discuss what you learned with your counselor and share what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "9-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
