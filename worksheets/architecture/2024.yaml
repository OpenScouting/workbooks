badge:
  name: Architecture
  slug: architecture
  requirements_revision: "2024-01-01"
  description: >
    The Architecture merit badge explores how buildings are designed to serve
    people and fit their surroundings. You will study architectural styles,
    sustainable and green building practices, meet with a working architect, and
    draw a scaled floor plan of your own.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Tour your community and list the different types of buildings you see.
          Try to identify buildings that can be associated with a specific period
          of history or style of architecture. Make a sketch of the building you
          most admire.
        field:
          type: table
          headers: ["Building", "Period or style"]
          rows: 8
          cols: 2
      - id: "1b"
        prompt: >
          Select a historical architectural achievement that has had a major
          impact on society. Using resources such as the internet (with your
          parent or guardian's permission), books, and magazines, find out how
          this achievement has influenced the world today. Tell your counselor
          what you learned.
        field: { type: text_box, lines: 8 }

  - id: "2"
    prompt: >
      In following the Leave No Trace Seven Principles and the Outdoor Code,
      Scouts pledge to "Travel and camp on durable surfaces" and to "Leave what
      you find" and to "Be conservation-minded." Discuss the following with your
      counselor:
    children:
      - id: "2a"
        prompt: "The term sustainable architecture. Identify three features typical of green buildings."
        field: { type: text_box, lines: 6 }
      - id: "2b"
        prompt: >
          The difference between renewable building materials and recycled
          building materials, and how each can be used in construction.
        field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: "The relationship of architecture with its surrounding environment and the community."
        field: { type: text_box, lines: 6 }
      - id: "2d"
        prompt: >
          How entire buildings can be reused rather than torn down when they no
          longer serve their original purpose.
        field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "With your parent or guardian's and counselor's permission and approval, arrange to meet with an architect. Ask to see the scale model of a building and the drawings that a builder would use to construct this building. Discuss why the different building materials were selected. Look at the details in the drawings and the model to see how the materials and components are attached to each other during construction."
        - "With your parent or guardian's and counselor's permission and approval, arrange to meet with an architect at a construction site. Ask the architect to bring drawings that the builder uses to construct the building. While at the site, discuss why the different building materials being used were selected. Discuss how the different building materials and components are attached to each other during construction."
        - "Interview someone who might be your client (such as a prospective homeowner or business owner) if you were an architect. Find out what your client's requirements would be for designing a new home or business building. Write a short program including a list of requirements for the project, the functions of the building and site, how the functions relate to one another, and the goals of the project."
    children:
      - id: "3-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "4"
    prompt: >
      Measure a room such as one where you live or where your troop meets. Make
      an accurately scaled drawing of the room's floor plan showing walls, doors,
      closets, windows, and any built-in furniture or cabinets. Neatly label your
      drawing with the following: your name, the date, what room you drew, and the
      scale of the drawing. (Drawing scale: 1/4 inch = 1 foot)
    field: { type: checkbox, label: "Completed an accurately scaled floor plan drawing as described." }

  - id: "5"
    prompt: >
      Find out about three career opportunities in architecture. Pick one and
      find out the education, training, and experience required for this
      profession. Discuss this with your counselor, and explain why this
      profession might interest you.
    field: { type: text_box, lines: 8 }
