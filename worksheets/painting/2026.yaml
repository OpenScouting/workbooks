badge:
  name: Painting
  slug: painting
  requirements_revision: "2026-01-01"
  description: >
    Painting protects and beautifies the surfaces around us. Earning this
    badge teaches you how coatings work, how to prepare and paint different
    surfaces safely, and how to choose colors and finishes that hold up over
    time.

requirements:
  - id: "1"
    prompt: "Explain the proper safety procedures to follow when preparing surfaces and applying coatings."
    field: { type: text_box, lines: 8 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: "Explain three ways that coatings can improve a surface."
        field: { type: text_box, lines: 5 }
      - id: "2b"
        prompt: >
          Explain the differences between oil-based paints, acrylic-based
          paints, and water-based paints.
        field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: >
          Explain where you would apply enamel paint, flat paint, wood stain,
          and varnish, and explain the importance of sheen.
        field: { type: text_box, lines: 6 }
      - id: "2d"
        prompt: "Tell why each is best for these uses."
        field: { type: text_box, lines: 5 }

  - id: "3"
    prompt: >
      Prepare and paint two different surfaces using patching materials or
      caulking and the proper primers and topcoats. Suggested projects include
      an interior or exterior wall, a door, a piece of furniture, a concrete
      wall or floor, a porch rail, or a fence. Your counselor must preapprove
      the projects.
    field:
      type: repeated_block
      count: 2
      template:
        - { label: "Surface / project", type: text_field }
        - { label: "Preparation, primers, and topcoats used", type: text_box, lines: 4 }

  - id: "4"
    prompt: >
      Prepare and paint an item using harmonizing colors that you have
      selected using the color wheel in the Painting merit badge pamphlet.
    field: { type: text_box, lines: 6 }

  - id: "5"
    prompt: "Show the right way to use, clean, maintain, and store painting equipment."
    field: { type: text_box, lines: 7 }

  - id: "6"
    prompt: >
      Explain the importance of ladder safety, personal hygiene, and the use
      of personal protective equipment when painting.
    field: { type: text_box, lines: 7 }

  - id: "7"
    prompt: >
      Explain some of the environmental and health issues concerning removing
      paint, applying paint, and discarding old paint.
    field: { type: text_box, lines: 7 }

  - id: "8"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - >
          (a) Explore careers related to this merit badge. Research one career
          to learn about the training and education needed, costs, job
          prospects, salary, job duties, and career advancement. Your research
          methods may include, with your parent or guardian's permission, an
          internet or library search, an interview with a professional in the
          field, or a visit to a location where people in this career work.
          Discuss with your counselor both your findings and what about this
          profession might make it an interesting career.
        - >
          (b) Explore how you could use knowledge and skills from this merit
          badge to pursue a hobby or healthy lifestyle. Research any training
          needed, expenses, and organizations that promote or support it.
          Discuss with your counselor what short-term and long-term goals you
          might have if you pursued this.
    children:
      - id: "8notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }
