badge:
  name: Cycling
  slug: cycling
  requirements_revision: "2026-01-01"
  description: >
    Cycling builds fitness and gives you the freedom to explore on two wheels.
    This Eagle-required badge covers bike safety, maintenance, and handling
    skills, then has you complete a series of road or trail rides building up to
    a long-distance trip.

requirements:
  - id: "1"
    prompt: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely hazards you may encounter
          while participating in cycling activities and what you should do to
          anticipate, help prevent, mitigate, and respond to these hazards.
          Explain to your counselor how to ride predictably, be conspicuous,
          think ahead, and ride ready.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Show that you know first aid for injuries or illnesses that could occur
          while cycling, including cuts, scratches, concussions, blisters,
          sunburn, heat exhaustion, heatstroke, hypothermia, frostbite,
          dehydration, insect stings, tick bites, and snakebite. Explain to your
          counselor why you should be able to identify the poisonous plants and
          poisonous animals that are found in your area.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Cuts and scratches"
            - "Concussions"
            - "Blisters"
            - "Sunburn"
            - "Heat exhaustion"
            - "Heatstroke"
            - "Hypothermia"
            - "Frostbite"
            - "Dehydration"
            - "Insect stings"
            - "Tick bites"
            - "Snakebite"
      - id: "1b-plants"
        prompt: >
          Explain to your counselor why you should be able to identify the
          poisonous plants and poisonous animals that are found in your area.
        field: { type: text_box, lines: 5 }

  - id: "2"
    prompt: >
      Describe your state and local laws concerning bicycles. Discuss what is the
      same and what is different from laws applying to motor vehicles. Explain
      where and how you should ride on roads and streets to include lane
      position, changing lanes, making left and right turns, and riding through
      intersections.
    field: { type: text_box, lines: 10 }

  - id: "3"
    prompt: >
      Explain the importance of wearing the right clothing and gear while
      cycling, including a properly sized and fitted helmet. Know the Scouting
      America Bike Safety Guidelines.
    field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: >
      Using a bicycle safety checklist, clean and adjust a bicycle and present it
      to your counselor for inspection. Do the following:
    children:
      - id: "4a"
        prompt: >
          Show points that should be checked regularly to make sure the bicycle
          is safe to ride.
        field: { type: text_box, lines: 5 }
      - id: "4b"
        prompt: "Show how to adjust the saddle and handlebars for a proper fit."
        field: { type: checkbox, label: "Showed how to adjust the saddle and handlebars for a proper fit." }
      - id: "4c"
        prompt: "Show how to adjust brakes and gear shifting (derailleurs)."
        field: { type: checkbox, label: "Showed how to adjust brakes and gear shifting (derailleurs)." }
      - id: "4d"
        prompt: "Show all points that need regular lubrication."
        field: { type: checkbox, label: "Showed all points that need regular lubrication." }
      - id: "4e"
        prompt: >
          Show how to repair a flat by removing the tire, replacing or patching
          the tube, and remounting the tire.
        field: { type: checkbox, label: "Showed how to repair a flat by removing the tire, replacing or patching the tube, and remounting the tire." }
      - id: "4f"
        prompt: "Show that the bicycle meets local laws."
        field: { type: checkbox, label: "Showed that the bicycle meets local laws." }

  - id: "5"
    prompt: >
      Demonstrate basic bicycle handling skills to your counselor, to include how
      to properly mount your bicycle, starting and stopping (to include emergency
      stops), riding in a straight line, turning, shifting gears, scanning, and
      signaling.
    field:
      type: checklist
      items:
        - "Properly mount your bicycle"
        - "Starting and stopping (including emergency stops)"
        - "Riding in a straight line"
        - "Turning"
        - "Shifting gears"
        - "Scanning"
        - "Signaling"

  - id: "6"
    intro: >
      Using the Scouting America buddy system, complete all of the requirements
      for ONE of the following options: Road Biking OR Trail or Mixed Surface
      Biking.
    children:
      - id: "6A"
        intro: "Option A. Road Biking. Do ALL of the following:"
        children:
          - id: "6A1"
            prompt: >
              Take a road safety test with your counselor and demonstrate the
              following:
            field:
              type: checklist
              items:
                - "(a) On an urban street with light traffic, properly execute a left turn from the center of the street; also demonstrate an alternate left-turn technique used during periods of heavy traffic."
                - "(b) Properly execute a right turn."
                - "(c) Demonstrate appropriate actions at a right-turn-only lane when you are continuing straight."
                - "(d) Show proper curbside and road-edge riding. Show how to ride safely along a row of parked cars."
                - "(e) Cross railroad tracks properly."
          - id: "6A2"
            prompt: >
              Avoiding main highways, take two rides of 10 miles each, two rides
              of 15 miles each, and two rides of 25 miles each. You must make a
              report of the rides taken. List dates for the routes traveled, and
              interesting things seen on the ride.
            field:
              type: table
              headers: ["Date", "Route / distance", "Interesting things seen"]
              rows: 6
              cols: 3
          - id: "6A3"
            prompt: >
              After completing requirement (2) for the road biking option, do ONE
              of the following:
            field:
              type: checklist
              items:
                - "(a) Lay out on a road map a 50-mile trip. Stay away from main highways. Using your map, make this ride in eight hours or less."
                - "(b) Participate in an organized bike tour of at least 50 miles. Make this ride in eight hours or less. Afterward, use the tour's cue sheet to make a map of the ride."
            children:
              - id: "6A3-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 6 }
      - id: "6B"
        intro: >
          Option B. Trail or Mixed Surface Biking. Do ALL of the following: Note:
          These requirements may be completed using a mountain bike or other
          properly equipped, manually-powered cycle such as a gravel bike, tandem
          bike, hand-powered bike, recumbent bike, adult tricycle, or adaptive
          cycle. If a tandem bike is used, the Scout must actively power the cycle
          in concert with the other rider.
        children:
          - id: "6B1"
            prompt: >
              Demonstrate the following mountain bike handling skills to your
              counselor:
            field:
              type: checklist
              items:
                - "(a) Neutral position, ready position, bike body separation (side to side, and forward and back), and body positioning for cornering"
                - "(b) Show shifting skills as applicable to climbs and obstacles."
                - "(c) Show proper technique for riding up and down hills, including when you would ride seated, crouched, or standing."
          - id: "6B2"
            prompt: >
              Take a trail safety test with your counselor and demonstrate the
              following:
            field:
              type: checklist
              items:
                - "(a) Show proper trail etiquette to hikers and other cyclists, including when to yield the right-of-way."
                - "(b) Demonstrate how to correctly cross an obstacle by either going over the obstacle on your bike or dismounting your bike and crossing over or around the obstacle"
                - "(c) Cross rocks, gravel, and roots properly"
          - id: "6B3"
            prompt: >
              Describe the rules of trail riding, including how to know when a
              trail is unsuitable for riding.
            field: { type: text_box, lines: 6 }
          - id: "6B4"
            prompt: >
              On mountain biking or multi-use trails approved by your counselor,
              take two rides of 2 miles each, two rides of 5 miles each, and two
              rides of 8 miles each. You must make a report of the rides taken.
              List dates for the routes traveled, and interesting things seen.
            field:
              type: table
              headers: ["Date", "Route / distance", "Interesting things seen"]
              rows: 6
              cols: 3
          - id: "6B5"
            prompt: >
              After fulfilling the previous requirement, lay out on a trail map a
              22-mile trip. You may include multiple trail systems, if needed.
              Stay away from main highways. Using your map, complete this ride in
              one day.
            field: { type: text_box, lines: 6 }
