badge:
  name: Energy
  slug: energy
  requirements_revision: "2025-01-01"
  description: >
    Energy explores where our power comes from, how it is converted and used,
    and how we can use it more wisely. You will audit your own home, study the
    nation's energy resources, and look at the technologies shaping our
    energy future.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          With your parent or guardian's permission, use the internet to find a
          blog, podcast, website, or an article on the use or conservation of
          energy. Discuss with your counselor what details in the article were
          interesting to you, the questions it raises, and what ideas it
          addresses that you do not understand.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          After you have completed requirements 2 through 8, revisit your source
          for requirement 1(a). Explain to your counselor what you have learned
          in completing the requirements that helps you better understand the
          article.
        field: { type: text_box, lines: 7 }

  - id: "2"
    prompt: "Show you understand energy forms and conversions by doing the following:"
    children:
      - id: "2a"
        prompt: "Explain how THREE of the following devices use energy, and explain their energy conversions: toaster, greenhouse, lightbulb, bow drill, cell phone, nuclear reactor, sauna, or electric vehicles."
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Device", type: text_field }
            - { label: "How it uses energy and its energy conversions", type: text_box, lines: 4 }
      - id: "2b"
        prompt: "Construct a system that makes at least two energy conversions and explain this to your counselor."
        field: { type: text_box, lines: 7 }

  - id: "3"
    prompt: >
      Show you understand energy efficiency by explaining to your counselor a
      common example of a situation where energy moves through a system to
      produce a useful result. Do the following:
    children:
      - id: "3a"
        prompt: "Identify the parts of the system that are affected by the energy movement."
        field: { type: text_box, lines: 5 }
      - id: "3b"
        prompt: "Name the system's primary source of energy."
        field: { type: text_box, lines: 3 }
      - id: "3c"
        prompt: "Identify the useful outcomes of the system."
        field: { type: text_box, lines: 4 }
      - id: "3d"
        prompt: "Identify the energy losses of the system."
        field: { type: text_box, lines: 4 }

  - id: "4"
    prompt: >
      Conduct an energy audit of your home. Keep a 14 day log that records what
      you and your family did to reduce energy use. Include the following in
      your report and, after the 14-day period, discuss what you have learned
      with your counselor.
    children:
      - id: "4-log"
        prompt: "14 day log of what you and your family did to reduce energy use"
        field:
          type: table
          headers: ["Day", "Date", "Actions taken to reduce energy use"]
          rows: 14
          cols: 3
      - id: "4a"
        prompt: >
          List the types of energy used in your home such as electricity, wood,
          oil, liquid petroleum, and natural gas, and tell how each is delivered
          and measured, and the current cost; OR record the transportation fuel
          used, miles driven, miles per gallon, and trips using your family car
          or another vehicle.
        field: { type: text_box, lines: 8 }
      - id: "4b"
        prompt: >
          Describe ways you and your family can use energy resources more
          wisely. In preparing your discussion, consider the energy required for
          the things you do and use on a daily basis (cooking, showering, using
          lights, driving, watching TV, using the computer). Explain what is
          meant by sustainable energy sources. Explain how you can change your
          energy use through reuse and recycling.
        field: { type: text_box, lines: 9 }

  - id: "5"
    prompt: >
      In a notebook, identify and describe five examples of energy waste in your
      school or community. Suggest in each case possible ways to reduce this
      waste. Describe the idea of trade-offs in energy use. In your response, do
      the following:
    children:
      - id: "5-examples"
        prompt: "Five examples of energy waste and possible ways to reduce each"
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Example of energy waste", type: text_field }
            - { label: "Possible ways to reduce this waste", type: text_box, lines: 3 }
      - id: "5a"
        prompt: "Explain how the changes you suggest would lower costs, reduce pollution, or otherwise improve your community."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Explain what changes to routines, habits, or convenience are necessary to reduce energy waste. Tell why people might resist the changes you suggest."
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: >
      Prepare pie charts showing the following information, and explain to your
      counselor the important ideas each chart reveals. Tell where you got your
      information. Explain how cost affects the use of a nonrenewable energy
      resource and makes alternatives practical.
    children:
      - id: "6a"
        prompt: "The energy resources that supply the United States with most of its energy"
        field: { type: text_box, lines: 5 }
      - id: "6b"
        prompt: "The share of energy resources used by the United States that comes from other countries"
        field: { type: text_box, lines: 5 }
      - id: "6c"
        prompt: "The proportion of energy resources used by homes, businesses, industry, and transportation"
        field: { type: text_box, lines: 5 }
      - id: "6d"
        prompt: "The fuels used to generate America's electricity"
        field: { type: text_box, lines: 5 }
      - id: "6e"
        prompt: "The world's known and estimated primary energy resource reserves"
        field: { type: text_box, lines: 5 }

  - id: "7"
    prompt: >
      Tell what is being done to make FIVE of the following energy systems
      produce more usable energy. In your explanation, describe the technology,
      cost, environmental impacts, and safety concerns.
    field:
      type: checklist
      items:
        - "Biomass digesters or waste-to-energy plants"
        - "Cogeneration plants"
        - "Fossil fuel power plants"
        - "Fuel cells"
        - "Geothermal power plants"
        - "Nuclear power plants"
        - "Solar power systems"
        - "Tidal energy, wave energy, or ocean thermal energy conversion devices"
        - "Wind turbines"
    children:
      - id: "7-notes"
        prompt: "For each of your five chosen systems, describe the technology, cost, environmental impacts, and safety concerns"
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Energy system", type: text_field }
            - { label: "What is being done, technology, cost, environmental impacts, safety concerns", type: text_box, lines: 4 }

  - id: "8"
    prompt: >
      Identify three career opportunities that would use skills and knowledge in
      energy. Pick one and research the training, education, certification
      requirements, experience, and expenses associated with entering the field.
      Research the prospects for employment, starting salary, advancement
      opportunities, and career goals associated with this career. Discuss what
      you learned with your counselor and whether you might be interested in
      this career.
    field: { type: text_box, lines: 10 }
