badge:
  name: Golf
  slug: golf
  requirements_revision: "2024-01-01"
  description: >
    The Golf merit badge lets you take up either traditional golf or disc golf,
    learning the rules, history, etiquette, and fundamental skills of the game.
    You will practice your swing or throws, play a round, and explore where the
    sport can lead.

requirements:
  - id: "1"
    prompt: "Discuss safety on the golf course. Show that you know first aid for injuries or illnesses that could occur while golfing, including lightning, heat reactions, sunburn, dehydration, blisters, animal or bug bites, poison ivy exposure, sprains, and strains."
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - "Lightning"
        - "Heat reactions"
        - "Sunburn"
        - "Dehydration"
        - "Blisters"
        - "Animal or bug bites"
        - "Poison ivy exposure"
        - "Sprains"
        - "Strains"

  - id: "2"
    prompt: "Complete ONE of the following options:"
    children:
      - id: "2-choice"
        prompt: "Select the option you will complete."
        field:
          type: checklist
          items:
            - "Option A: Traditional Golf"
            - "Option B: Disc Golf"

      - id: "2A"
        intro: "Option A: Traditional Golf. Do ALL of the following:"
        children:
          - id: "2A1"
            prompt: "Study the USGA Rules of Golf now in use."
            children:
              - id: "2A1a"
                prompt: "Tell about the three categories of golf etiquette."
                field: { type: text_box, lines: 6 }
              - id: "2A1b"
                prompt: "Demonstrate that you understand the definitions of golf terms."
                field: { type: text_box, lines: 6 }
              - id: "2A1c"
                prompt: "Show that you understand the Rules of Amateur Status."
                field: { type: text_box, lines: 6 }
          - id: "2A2"
            prompt: "Tell about your understanding of the World Handicap System."
            field: { type: text_box, lines: 6 }
          - id: "2A3"
            intro: "Do the following:"
            children:
              - id: "2A3a"
                prompt: "Tell about the early history of golf."
                field: { type: text_box, lines: 6 }
              - id: "2A3b"
                prompt: "Describe golf's early years in the United States."
                field: { type: text_box, lines: 6 }
              - id: "2A3c"
                prompt: "Tell about the accomplishments of a top golfer of your choice."
                field: { type: text_box, lines: 6 }
          - id: "2A4"
            intro: "Do the following:"
            children:
              - id: "2A4a"
                prompt: "Tell how golf can contribute to a healthy lifestyle, mentally and physically."
                field: { type: text_box, lines: 6 }
              - id: "2A4b"
                prompt: "Tell how a golf exercise plan can help you play better. Show two exercises that would help improve your game."
                field: { type: text_box, lines: 6 }
          - id: "2A5"
            prompt: "Show the following:"
            field:
              type: checklist
              items:
                - "(a) The proper grip, stance, posture, and key fundamentals of a good swing"
                - "(b) Driver played from a tee"
                - "(c) The fairway wood shot"
                - "(d) The long iron shot"
                - "(e) The short iron shot"
                - "(f) The approach, chip-and-run, and pitch shots"
                - "(g) A recovery shot from a bunker or heavy rough"
                - "(h) A sound putting stroke"
          - id: "2A6"
            prompt: "Play a minimum of two nine-hole rounds or one 18-hole round of golf with another golfer about your age and with your counselor, or an adult approved by your counselor. Do the following:"
            field:
              type: checklist
              items:
                - "(a) Follow the Rules of Golf."
                - "(b) Practice good golf etiquette."
                - "(c) Show respect to fellow golfers, committee, sponsor, and gallery."
          - id: "2A7"
            prompt: "Find out about three careers related to traditional golf. Pick one and identify the education, training, and experience required for this profession. Discuss this with your counselor, and explain why this interests you."
            field: { type: text_box, lines: 8 }

      - id: "2B"
        intro: "Option B: Disc Golf. Do ALL of the following:"
        children:
          - id: "2B1"
            prompt: "Study the PDGA Official Rules of Disc Golf now in use."
            children:
              - id: "2B1a"
                prompt: "Tell about the six areas of Courtesy (812)."
                field: { type: text_box, lines: 6 }
              - id: "2B1b"
                prompt: "Describe the seven areas of Scoring (808)."
                field: { type: text_box, lines: 6 }
          - id: "2B2"
            prompt: "Tell about the history of disc golf and why it is an inclusive game."
            field: { type: text_box, lines: 6 }
          - id: "2B3"
            intro: "Do the following:"
            children:
              - id: "2B3a"
                prompt: "Tell about the history of disc golf and why it is an inclusive game."
                field: { type: text_box, lines: 6 }
              - id: "2B3b"
                prompt: "Discuss with your counselor the contributions Ed Headrick made to the sport of disc golf."
                field: { type: text_box, lines: 6 }
              - id: "2B3c"
                prompt: "Describe the evolution of disc design."
                field: { type: text_box, lines: 6 }
              - id: "2B3d"
                prompt: "Tell about the accomplishments of a top disc golfer of your choice."
                field: { type: text_box, lines: 6 }
          - id: "2B4"
            intro: "Do the following:"
            children:
              - id: "2B4a"
                prompt: "Tell how disc golf can contribute to a healthy lifestyle, mentally and physically."
                field: { type: text_box, lines: 6 }
              - id: "2B4b"
                prompt: "Tell how a disc golf exercise plan can help you play better. Show two exercises that would help improve your game."
                field: { type: text_box, lines: 6 }
          - id: "2B5"
            prompt: "Show the following:"
            field:
              type: checklist
              items:
                - "(a) A good throwing grip"
                - "(b) A good runup (X-step) when throwing a disc"
                - "(c) Backhand shot"
                - "(d) Forehand shot"
                - "(e) Overhand shot"
                - "(f) Rolling shot"
                - "(g) A good (in-line) putting stance"
                - "(h) A good straddle putting stance"
                - "(i) A good putting grip"
                - "(j) A good putting motion & follow through"
                - "(k) The proper use of a mini-marking disc"
          - id: "2B6"
            prompt: "Play a minimum of 18-holes of disc golf with another disc golfer about your age and with your counselor, or an adult approved by your counselor. Do the following:"
            field:
              type: checklist
              items:
                - "(a) Follow the PDGA Official Rules of Disc Golf."
                - "(b) Practice good disc golf etiquette."
                - "(c) Show respect to fellow disc golfers and other people in the park along with any wildlife, trees, and plants on the property."
          - id: "2B7"
            prompt: "Find out about three careers related to disc golf. Pick one and identify the education, training, and experience required for this profession. Discuss this with your counselor, and explain why this interests you."
            field: { type: text_box, lines: 8 }
