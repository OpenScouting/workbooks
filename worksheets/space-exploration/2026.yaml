badge:
  name: Space Exploration
  slug: space-exploration
  requirements_revision: "2026-01-01"
  description: >
    The Space Exploration merit badge launches you into the science and history
    of leaving Earth, from the rocketry of space pioneers to today's planetary
    missions. You will build and launch a model rocket, explore how spacecraft
    work, and design a base of your own.

requirements:
  - id: "1"
    prompt: "Tell the purpose of space exploration and include the following:"
    children:
      - id: "1a"
        prompt: "Historical reasons"
        field: { type: text_box, lines: 5 }
      - id: "1b"
        prompt: "Immediate goals in terms of specific knowledge"
        field: { type: text_box, lines: 5 }
      - id: "1c"
        prompt: "Benefits related to Earth resources, technology, and new products"
        field: { type: text_box, lines: 5 }
      - id: "1d"
        prompt: "International relations and cooperation"
        field: { type: text_box, lines: 5 }

  - id: "2"
    prompt: >
      Design a collector's card, with a picture on the front and information on
      the back, about your favorite space pioneer. Share your card and discuss
      four other space pioneers with your counselor.
    field: { type: text_box, lines: 8 }

  - id: "3"
    prompt: >
      Build, launch, and recover a model rocket. Make a second launch to
      accomplish a specific objective. Identify and explain the following rocket
      parts: Safety Note: Rocket must be built to meet the safety code of the
      National Association of Rocketry. See the "Model Rocketry" chapter of the
      Space Exploration merit badge pamphlet. Alternative Requirement: If local
      laws prohibit launching model rockets, do the following activity: Make a
      model of a NASA rocket. Explain the functions of the parts. Give the
      history of the rocket. Identify and explain the following rocket parts:
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - "(a) Body tube"
        - "(b) Engine mount"
        - "(c) Fins"
        - "(d) Igniter"
        - "(e) Launch lug"
        - "(f) Nose cone"
        - "(g) Payload"
        - "(h) Recovery system"
        - "(i) Rocket engine"

  - id: "4"
    prompt: "Discuss and demonstrate each of the following:"
    children:
      - id: "4a"
        prompt: "The law of action-reaction"
        field: { type: text_box, lines: 5 }
      - id: "4b"
        prompt: "How rocket engines work"
        field: { type: text_box, lines: 5 }
      - id: "4c"
        prompt: "How satellites stay in orbit"
        field: { type: text_box, lines: 5 }
      - id: "4d"
        prompt: "How satellite pictures of Earth and pictures of other planets are made and transmitted"
        field: { type: text_box, lines: 5 }

  - id: "5"
    prompt: "Do TWO of the following:"
    children:
      - id: "5-choice"
        prompt: "Check the two options you chose:"
        field:
          type: checklist
          items:
            - "(a) Discuss with your counselor a robotic space exploration mission and a historic crewed mission. Tell about each mission's major discoveries, its importance, and what was learned from it about the planets, moons, or regions of space explored."
            - "(b) Using articles from the internet, photographs and text, create a blog, website, or slide show about a current planetary mission or use magazine photographs, news clippings, and articles from the internet to make a scrapbook about a current planetary mission."
            - "(c) Design a robotic mission to another planet, moon, comet, or asteroid that will return samples of its surface to Earth. Name the planet, moon, comet, or asteroid your spacecraft will visit. Show how your design will cope with the conditions of the environments of the planet, moon, comet, or asteroid."
      - id: "5-notes"
        prompt: "Notes from your chosen options"
        field: { type: text_box, lines: 12 }

  - id: "6"
    prompt: "Describe the purpose, operation, and components of ONE of the following:"
    children:
      - id: "6-choice"
        prompt: "Check the option you chose:"
        field:
          type: checklist
          items:
            - "(a) Space shuttle or any other crewed orbital vehicle, whether government-owned (U.S. or foreign) or commercial"
            - "(b) International Space Station"
      - id: "6-notes"
        prompt: "Describe the purpose, operation, and components of your chosen vehicle or station."
        field: { type: text_box, lines: 10 }

  - id: "7"
    prompt: >
      Design an inhabited base located within our solar system, such as Titan,
      asteroids, or other locations that humans might want to explore in person.
      Make drawings or a model of your base. In your design, consider and plan for
      the following:
    children:
      - id: "7a"
        prompt: "Source of energy"
        field: { type: text_box, lines: 5 }
      - id: "7b"
        prompt: "How it will be constructed"
        field: { type: text_box, lines: 5 }
      - id: "7c"
        prompt: "Life-support system"
        field: { type: text_box, lines: 5 }
      - id: "7d"
        prompt: "Purpose and function"
        field: { type: text_box, lines: 5 }

  - id: "8"
    prompt: >
      Explore careers related to this merit badge. Research one career to learn
      about the training and education needed, costs, job prospects, salary, job
      duties, and career advancement. Your research methods may include, with your
      parent or guardian's permission, an internet or library search, an interview
      with a professional in the field, or a visit to a location where people in
      this career work. Discuss with your counselor both your findings and what
      about this profession might make it an interesting career.
    field: { type: text_box, lines: 10 }
