badge:
  name: American Business
  slug: american-business
  requirements_revision: "2023-01-01"
  description: >
    The American Business merit badge explores how businesses are organized,
    financed, and managed in the United States, the role of labor and ethics,
    and the careers available across accounting, finance, marketing, and
    management.

requirements:
  - id: "1"
    intro: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain four features of the free enterprise system in the United
          States. Describe the difference between freedom and license. Tell
          how the Scout Oath and Scout Law apply to business and free
          enterprise.
        field: { type: text_box, lines: 10 }
      - id: "1b"
        prompt: >
          Describe the Industrial Revolution and tell about the major
          developments that marked the start of the modern industrial era
          in the United States.
        field: { type: text_box, lines: 8 }
      - id: "1b-people"
        prompt: >
          Discuss three people who had a great influence on business or
          industry in the United States and describe what each did.
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Person", type: text_field }
            - { label: "What they did", type: text_box, lines: 4 }
      - id: "1c"
        prompt: "Identify and describe to your counselor the five primary areas of business."
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - "Accounting"
            - "Finance"
            - "Economics"
            - "Marketing"
            - "Management"
      - id: "1d"
        prompt: >
          Explain the history of labor unions in the United States and the
          importance of labor unions and employers working together.
        field: { type: text_box, lines: 8 }
      - id: "1d-unions"
        prompt: "Identify two major labor unions currently in existence."
        field:
          type: repeated_block
          count: 2
          template:
            - { label: "Union", type: text_field }
            - { label: "What they represent", type: text_box, lines: 3 }
      - id: "1e"
        prompt: "Discuss with your counselor how business impacts the local, national, and global economy."
        field: { type: text_box, lines: 8 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Explain the three basic types of financial statements (income
          statement, balance sheet, and statement of cash flows). Discuss
          with your counselor how each statement can help business leaders
          make better decisions.
        field:
          type: labeled_rows
          lines_each: 3
          labels:
            - "Income statement"
            - "Balance sheet"
            - "Statement of cash flows"
      - id: "2b"
        prompt: >
          Explain how changes in interest rates, taxes, and government
          spending affect the flow of money into or out of business and
          industry.
        field: { type: text_box, lines: 8 }
      - id: "2c"
        prompt: >
          Explain how a sole proprietorship, partnership, or limited
          liability company gets its capital. Discuss and explain four ways
          a corporation obtains capital.
        field: { type: text_box, lines: 10 }
      - id: "2d"
        prompt: "Name five kinds of insurance useful to business. Describe their purposes."
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Insurance", type: text_field }
            - { label: "Purpose", type: text_box, lines: 2 }

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: "Explain the place of profit in business."
        field: { type: text_box, lines: 5 }
      - id: "3b"
        prompt: "Describe to your counselor green marketing and sustainable business practices."
        field: { type: text_box, lines: 6 }
      - id: "3c"
        prompt: "Explain how ethics plays a role in business decision making."
        field: { type: text_box, lines: 6 }
      - id: "3d"
        prompt: "Discuss the differences between operating a brick-and-mortar business versus an online business."
        field: { type: text_box, lines: 6 }

  - id: "4"
    prompt: >
      Describe the role of the U.S. Department of Labor. Discuss TWO of the
      following topics with your counselor: Fair Labor Standards Act (FLSA),
      Occupational Safety and Health Act (OSHA), Family and Medical Leave
      Act (FMLA), or Employee Retirement Income Security Act (ERISA).
    field:
      type: checklist
      items:
        - "Fair Labor Standards Act (FLSA)"
        - "Occupational Safety and Health Act (OSHA)"
        - "Family and Medical Leave Act (FMLA)"
        - "Employee Retirement Income Security Act (ERISA)"
    children:
      - id: "4-notes"
        prompt: "Notes on the U.S. Department of Labor and your two chosen topics"
        field: { type: text_box, lines: 10 }

  - id: "5"
    prompt: >
      Choose a business and research how it applies to each of the primary
      areas of business (accounting, finance, economics, marketing, and
      management). Share what you have learned with your counselor.
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "Business chosen"
        - "Accounting"
        - "Finance"
        - "Economics"
        - "Marketing"
        - "Management"

  - id: "6"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Choose one of the primary areas of business and identify three career opportunities. Select one and research the education, training, and experience required for this career. Discuss this with your counselor and explain why this interests you."
        - "(b) Select a business leader and interview this individual to learn more about his or her company and career path. Discuss the role ethics plays in making business decisions. Share what you have learned with your counselor."
    children:
      - id: "6-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 12 }
