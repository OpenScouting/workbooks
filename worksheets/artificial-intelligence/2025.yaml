badge:
  name: Artificial Intelligence
  slug: artificial-intelligence
  requirements_revision: "2025-01-01"
  description: >
    The Artificial Intelligence merit badge explores how AI and automation work,
    where they show up in everyday life, and the ethical questions they raise. You
    will define key concepts, examine real-world examples, and build or teach a
    project of your own.

requirements:
  - id: "1"
    prompt: >
      Key Concepts. Define the following terms and share the meaning of each with
      your counselor: artificial intelligence (AI), artificial intelligence
      agents, automation, basic programming, bots, data, databases, digital
      workers, general AI, machine learning (ML), narrow AI, superintelligent AI,
      tasks, triggers, workflows, and variables.
    field:
      type: labeled_rows
      lines_each: 2
      labels:
        - "Artificial intelligence (AI)"
        - "Artificial intelligence agents"
        - "Automation"
        - "Basic programming"
        - "Bots"
        - "Data"
        - "Databases"
        - "Digital workers"
        - "General AI"
        - "Machine learning (ML)"
        - "Narrow AI"
        - "Superintelligent AI"
        - "Tasks"
        - "Triggers"
        - "Workflows"
        - "Variables"

  - id: "2"
    intro: "Artificial Intelligence (AI) Basics. Do the following and share what you learned with your counselor:"
    children:
      - id: "2a"
        prompt: "Identify ten examples of how AI is currently used in everyday life."
        field: { type: text_box, lines: 8 }
      - id: "2b"
        prompt: "Identify five examples of how AI is currently used in the workplace."
        field: { type: text_box, lines: 6 }
      - id: "2c"
        prompt: "Identify five examples of how AI can be used at school or in support of your education."
        field: { type: text_box, lines: 6 }
      - id: "2d"
        prompt: >
          Meet with your counselor and play ten rounds of the "AI or Not?" game to
          determine if the presented scenario utilizes AI. Discuss your answers.
        field: { type: checkbox, label: 'Played ten rounds of the "AI or Not?" game and discussed answers.' }
      - id: "2e"
        prompt: "Create a timeline with five key milestones in the development of artificial intelligence."
        field: { type: text_box, lines: 6 }

  - id: "3"
    intro: "Automation Basics. Do the following and share what you learned with your counselor:"
    children:
      - id: "3a"
        prompt: "Identify 10 examples of how automation is currently used in everyday life."
        field: { type: text_box, lines: 8 }
      - id: "3b"
        prompt: "Identify five examples of how automation is currently used in the workplace."
        field: { type: text_box, lines: 6 }
      - id: "3c"
        prompt: "Identify five examples of how automation can be used at school or in support of your education."
        field: { type: text_box, lines: 6 }
      - id: "3d"
        prompt: >
          Explain how automation performs repetitive tasks without human
          intervention and how it reduces human error and optimizes resources.
        field: { type: text_box, lines: 6 }
      - id: "3e"
        prompt: "Create a timeline with five significant milestones in automation development."
        field: { type: text_box, lines: 6 }

  - id: "4"
    intro: "Ethics in AI. Do the following and share what you learned with your counselor:"
    children:
      - id: "4a"
        prompt: >
          Research ethical concerns and responsible use in AI, including bias,
          privacy, and AI decision-making.
        field: { type: text_box, lines: 7 }
      - id: "4b"
        prompt: >
          Meet with your counselor, play, and discuss five rounds of the "What
          Would You Do?" ethical decision-making scenarios.
        field: { type: checkbox, label: 'Played and discussed five rounds of the "What Would You Do?" scenarios.' }
      - id: "4c"
        prompt: "Develop your own ethical guidelines for the use of AI."
        field: { type: text_box, lines: 6 }
      - id: "4d"
        prompt: "What is the Turing test?"
        field: { type: text_box, lines: 5 }

  - id: "5"
    intro: "Deepfakes. Do the following and share what you learned with your counselor:"
    children:
      - id: "5a"
        prompt: "Explain what a deepfake is and how it can affect an individual."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Describe what actions to take if you or someone you know is impacted by a deepfake."
        field: { type: text_box, lines: 6 }

  - id: "6"
    intro: "Developing AI Skills. Do the following and share what you learned with your counselor:"
    children:
      - id: "6a"
        prompt: "Discuss the learning process for AI and its limitations."
        field: { type: text_box, lines: 6 }
      - id: "6b"
        prompt: "Identify five methods of how to effectively communicate with AI."
        field: { type: text_box, lines: 6 }
      - id: "6c"
        prompt: "Explain the importance of prompt engineering when using AI to create better output."
        field: { type: text_box, lines: 5 }
      - id: "6d"
        prompt: "Demonstrate three examples of writing clear instructions for a school-related task."
        field: { type: text_box, lines: 6 }

  - id: "7"
    prompt: "Practical Application. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "With your counselor's approval, choose an artificial intelligence project based on your personal interest or a community need. Develop a plan outlining the project's objectives, data requirements, and potential ethical considerations. Implement the project utilizing appropriate artificial intelligence tools, languages, or platforms. Share your project with your counselor. Discuss the steps you followed to create the project and your experience during the process."
        - "With your counselor's approval, design a short lesson plan on AI and teach it to your patrol or a group of Scouts. The lesson should include an AI-generated age-appropriate explanation of AI, examples of how AI is used in both everyday life as well as in the workplace, and an interactive demonstration of how Scouts could utilize AI to assist them with a school assignment, Scouting activity, or rank advancement. Share information on the development process and teaching experience with your counselor."
    children:
      - id: "7-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "8"
    prompt: "Career Exploration. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "Identify three career opportunities that would use skills and knowledge in artificial intelligence or automation. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities, and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "Interview an artificial intelligence or automation professional. Learn about their day-to-day work, the challenges they face, and their vision for the future of artificial intelligence or automation. Inquire about training, education, certification requirements, experience, and expenses associated with entering the field. Share what you learned with your counselor."
    children:
      - id: "8-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
