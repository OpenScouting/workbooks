badge:
  name: Animal Science
  slug: animal-science
  requirements_revision: "2025-01-01"
  description: >
    The Animal Science merit badge introduces the care, breeding, and management
    of livestock and poultry. You will study animal breeds, health, nutrition,
    and digestion, then dive deep into one species of your choice through a
    hands-on option.

requirements:
  - id: "1"
    prompt: >
      Name two breeds of livestock in each of the following classifications:
      horses, dairy cattle, beef cattle, sheep, hogs, poultry, and goats. Tell
      their principal uses and merits. Tell where the breeds originated.
    field:
      type: table
      headers: ["Classification", "Breed", "Principal uses and merits", "Origin"]
      rows: 14
      cols: 4

  - id: "2"
    prompt: >
      List two diseases that afflict the animals in each of the classifications
      in requirement 1. Describe the symptoms of each disease and explain how each
      is contracted and how it could be prevented.
    field:
      type: table
      headers: ["Classification", "Disease", "Symptoms", "How contracted / prevented"]
      rows: 14
      cols: 4

  - id: "3"
    prompt: >
      Draw models of the digestive tracts of ruminants, horses, pigs, and
      poultry. Explain how the differences in structure and function among these
      types of digestive tracts affect the nutritional management of these
      species.
    field: { type: text_box, lines: 10 }

  - id: "4"
    prompt: >
      Select one type of animal: beef cow, dairy cow, horse, sheep, goat, or hog,
      or a poultry flock, and tell how you would properly manage it. Include in
      your discussion nutritional (feeding) concerns, housing, disease
      prevention, waste control/removal, breeding programs, and biosecurity as
      appropriate.
    field: { type: text_box, lines: 12 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Explain how agricultural producers make desired improvements to their
          stock through breeding practices and programs.
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Explain the terms pure breeding and cross breeding."
        field: { type: text_box, lines: 5 }
      - id: "5c"
        prompt: >
          List two modern technologies used in the production of horses, dairy
          cattle, beef cattle, sheep, hogs, poultry, or goats, and tell what the
          advantages are of using the technology.
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: "Complete ONE of the following options:"
    children:
      - id: "6optA"
        intro: "Option A. Beef Cattle. Do ALL of the following:"
        children:
          - id: "6A1"
            prompt: >
              Visit a farm or ranch where beef cattle are produced under any of
              these systems: feeding market cattle for harvest, cow/calf operation
              (producing cattle for sale to commercial feeders), or producing
              purebred cattle for sale as breeding stock to others. Talk with the
              operator to learn how the cattle were handled, fed, weighed, and
              shipped. Describe what you saw and explain what you learned. If you
              cannot visit a cattle ranch or farm, view a video from a breed
              association, or research the internet (with your parent or
              guardian's permission) for information on beef cattle production.
              Tell about your findings.
            field: { type: text_box, lines: 8 }
          - id: "6A2"
            prompt: >
              Sketch a plan of a feedlot to include its forage and grain storage
              facilities, and loading chute for 30 or more fattening steers; or
              sketch a corral plan with cutting and loading chutes for handling 50
              or more beef cows and their calves at one time.
            field: { type: checkbox, label: "Completed the feedlot or corral plan sketch." }
          - id: "6A3"
            prompt: >
              Make a sketch showing the principal wholesale and retail cuts of
              beef. Tell about the U.S. Department of Agriculture (USDA) dual
              grading system of beef. Tell the basis of each grade in each system.
            field: { type: text_box, lines: 8 }
          - id: "6A4"
            prompt: >
              Define the following terms: bull, steer, bullock, cow, heifer,
              freemartin, heiferette, and calf.
            field:
              type: labeled_rows
              lines_each: 1
              labels: [Bull, Steer, Bullock, Cow, Heifer, Freemartin, Heiferette, Calf]
      - id: "6optB"
        intro: "Option B. Dairy. Do ALL of the following:"
        children:
          - id: "6B1"
            prompt: >
              Tell how a cow or a goat converts forage and grain into milk.
              Explain the differences in feeds typically used for dairy cows
              versus those fed to beef cows.
            field: { type: text_box, lines: 7 }
          - id: "6B2"
            prompt: >
              Make a chart showing the components in cow's milk or goat's milk.
              Chart the amount of each component.
            field:
              type: table
              headers: ["Component", "Amount"]
              rows: 8
              cols: 2
          - id: "6B3"
            prompt: >
              Explain the requirements for producing grade A milk. Tell how and
              why milk is pasteurized.
            field: { type: text_box, lines: 7 }
          - id: "6B4"
            prompt: >
              Tell about the kinds of equipment used for milking and the
              sanitation standards that must be met on dairy farms.
            field: { type: text_box, lines: 6 }
          - id: "6B5"
            prompt: >
              Define the following terms: bull, cow, steer, heifer, springer,
              buck, doe, and kid.
            field:
              type: labeled_rows
              lines_each: 1
              labels: [Bull, Cow, Steer, Heifer, Springer, Buck, Doe, Kid]
          - id: "6B6"
            prompt: >
              Visit a dairy farm or a milk processing plant. Describe what you saw
              and explain what you learned. If you cannot visit a dairy farm or
              processing plant, view a video from a breed or dairy association, or
              research the internet (with your parent or guardian's permission) for
              information on dairying. Tell about your findings.
            field: { type: text_box, lines: 8 }
      - id: "6optC"
        intro: "Option C. Horse. Do ALL of the following:"
        children:
          - id: "6C1"
            prompt: "Make a sketch of a useful saddle horse barn and exercise yard."
            field: { type: checkbox, label: "Completed the saddle horse barn and exercise yard sketch." }
          - id: "6C2"
            prompt: >
              Tell about the history of the horse and the benefits it has brought
              to people. Using the four breeds of horses you chose in requirement
              1, discuss the different special uses of each breed.
            field: { type: text_box, lines: 8 }
          - id: "6C3"
            prompt: >
              Define the following terms: mare, stallion, gelding, foal, colt,
              filly; mustang, quarter horse, draft horse, pacer, trotter; pinto,
              calico, palomino, roan, overo, and tobiano.
            field:
              type: labeled_rows
              lines_each: 1
              labels:
                - Mare
                - Stallion
                - Gelding
                - Foal
                - Colt
                - Filly
                - Mustang
                - Quarter horse
                - Draft horse
                - Pacer
                - Trotter
                - Pinto
                - Calico
                - Palomino
                - Roan
                - Overo
                - Tobiano
          - id: "6C4"
            prompt: >
              Visit a horse farm. Describe what you saw and explain what you
              learned. If you cannot visit a horse farm, view a video from a breed
              association, or research the internet (with your parent or guardian's
              permission) for information on horses. Tell about your findings.
            field: { type: text_box, lines: 8 }
          - id: "6C5"
            prompt: >
              Outline the proper feeding of a horse doing light work. Explain why
              the amount and kind of feed will change according to the kind of
              horse and the work it does. Describe what colic is, what can cause
              it, and its symptoms.
            field: { type: text_box, lines: 8 }
      - id: "6optD"
        intro: "Option D. Sheep or Goat. Choose one and do ALL of the following based upon the choice:"
        children:
          - id: "6D1"
            prompt: >
              Make a sketch of a live lamb or goat. Show the location of the
              various wholesale and retail cuts.
            field: { type: checkbox, label: "Completed the lamb or goat cuts sketch." }
          - id: "6D2"
            prompt: "Discuss how wools are sorted and graded."
            field: { type: text_box, lines: 6 }
          - id: "6D3"
            prompt: "List products that can be made from the milk."
            field: { type: text_box, lines: 4 }
          - id: "6D4"
            prompt: "Based on your choice, do ONE of the following:"
            field:
              type: checklist
              items:
                - "Raise a lamb or goat from weaning to market weight. Keep records of feed intake, weight gains, medication, vaccination, and mortality. Present your records to your counselor for review."
                - "Visit a farm or ranch where sheep or goats are raised. Describe what you saw and explain what you learned. If you cannot visit a sheep or goat farm or ranch, view a video from a breed association, or research the internet (with your parent or guardian's permission) for information on sheep or goats. Tell about your findings."
            children:
              - id: "6D4-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 8 }
          - id: "6D5"
            prompt: >
              Define the following terms for a sheep (wether, ewe, ram, and lamb)
              OR a goat (doe, nanny, kid, buck, and billy).
            field: { type: text_box, lines: 6 }
      - id: "6optE"
        intro: "Option E. Hog. Do ALL of the following:"
        children:
          - id: "6E1"
            prompt: >
              Make a sketch showing the principal wholesale and retail cuts of
              pork. Tell about the recommended USDA grades of pork. Tell the basis
              for each grade.
            field: { type: text_box, lines: 8 }
          - id: "6E2"
            prompt: >
              Outline in writing the proper feeding programs used from the
              breeding of a gilt or sow through the weaning of the litter. Discuss
              the feeding programs for the growth and finishing periods.
            field: { type: text_box, lines: 8 }
          - id: "6E3"
            prompt: "Do ONE of the following:"
            field:
              type: checklist
              items:
                - "Raise a feeder pig from weaning to market weight. Keep records of feed intake, weight gains, medication, vaccination, and mortality. Present your records to your counselor for review."
                - "Visit a farm where hogs are produced, or visit a packing plant handling hogs. Describe what you saw and explain what you learned. If you cannot visit a hog production unit or packing plant, view a video from a packer or processor, or research the internet (with your parent or guardian's permission) for information on hogs. Tell about your findings."
            children:
              - id: "6E3-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 8 }
          - id: "6E4"
            prompt: "Define the following terms: gilt, sow, barrow, and boar."
            field:
              type: labeled_rows
              lines_each: 1
              labels: [Gilt, Sow, Barrow, Boar]
      - id: "6optF"
        intro: "Option F. Avian. Do ALL of the following:"
        children:
          - id: "6F1"
            prompt: >
              Make a sketch of a layer house or broiler house showing nests,
              roosts, feeders, waterers, and means of ventilation. Explain how
              insulation, ventilation, temperature controls, automatic lights, and
              other environmental controls are used to protect birds from heat,
              cold, and bad weather. Explain the importance of light for egg
              production.
            field: { type: text_box, lines: 8 }
          - id: "6F2"
            prompt: "Explain why overcrowding is dangerous for poultry flocks."
            field: { type: text_box, lines: 5 }
          - id: "6F3"
            prompt: "Tell about the grading of eggs. Describe the classes of chicken meat."
            field: { type: text_box, lines: 6 }
          - id: "6F4"
            prompt: "Do ONE of the following:"
            field:
              type: checklist
              items:
                - "Manage an egg-producing flock for five months. Keep records of feed purchased, eggs sold, medication, vaccination, and mortality. Present your records to your counselor for review."
                - "Raise five chickens from hatching. Keep records of feed intake, weight gains, medication, vaccination, and mortality. Present your records to your counselor for review."
                - "Visit a commercial avian production facility. Describe what you saw and explain what you learned. If you cannot visit a commercial facility, view a video from a poultry association, or research the internet (with your parent or guardian's permission) for information on poultry production. Tell about your findings."
            children:
              - id: "6F4-notes"
                prompt: "Notes from your chosen option"
                field: { type: text_box, lines: 8 }
          - id: "6F5"
            prompt: "Define the following terms: chick, pullet, hen, cockerel, cock, and capon."
            field:
              type: labeled_rows
              lines_each: 1
              labels: [Chick, Pullet, Hen, Cockerel, Cock, Capon]

  - id: "7"
    prompt: >
      Find out about three career opportunities in animal science. Pick one and
      find out the education, training, and experience required for this
      profession. Discuss this with your counselor, and explain why this
      profession might interest you.
    field: { type: text_box, lines: 8 }
