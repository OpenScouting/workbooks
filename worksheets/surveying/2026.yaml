badge:
  name: Surveying
  slug: surveying
  requirements_revision: "2026-01-01"
  description: >
    Surveying is the science of measuring and mapping the land. Scouts use
    instruments, GPS, and field notes to lay out and map a lot, determine
    elevations, and learn how property boundaries are recorded and how the
    profession is changing.

requirements:
  - id: "1"
    prompt: >
      Show that you know first aid for the types of injuries that could occur
      while surveying, including cuts, scratches, snakebite, insect stings, tick
      bites, heat and cold reactions, dehydration. Explain to your counselor why
      a surveyor should be able to identify the poisonous plants and poisonous
      animals that are found in your area.
    children:
      - id: "1-firstaid"
        prompt: "First aid for injuries that could occur while surveying"
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Cuts
            - Scratches
            - Snakebite
            - Insect stings
            - Tick bites
            - "Heat and cold reactions"
            - Dehydration
      - id: "1-plants"
        prompt: >
          Why a surveyor should be able to identify the poisonous plants and
          poisonous animals found in your area
        field: { type: text_box, lines: 5 }

  - id: "2"
    intro: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Set an instrument over one of the corners of a five-sided lot laid out
          by your counselor and sighting one of the other corners for reference
          and, using radial measurement methods, record the angle turned and the
          distance measured to each of the remaining corners, as directed by
          your counselor. Record the angle and distance to five topographic
          features (trees, shrubs, rocks, etc.) near your work area.
        field:
          type: table
          headers: ["Point", "Angle turned", "Distance measured"]
          rows: 10
          cols: 3
      - id: "2b"
        prompt: >
          Measure to three of the same points with GPS measurement and compare
          the distances between the points measured.
        field: { type: text_box, lines: 6 }

  - id: "3"
    prompt: >
      From the field notes gathered for requirement 2, and using a protractor
      and scale, plot the points you measured and draw to scale a map of your
      survey which includes a north arrow, scale bar, title, date and a diagram
      of the lot you measured. Submit a neatly drawn copy.
    field: { type: checkbox, label: "Plotted the points and submitted a neatly drawn, scaled map of the survey." }

  - id: "4"
    prompt: >
      Use one of the corner markers from requirement 2 as a benchmark with an
      assumed elevation of 100 feet. Using a level and rod, collect and record
      measurements, and determine the elevation of the other four corner markers.
    field:
      type: table
      headers: ["Corner marker", "Reading", "Computed elevation"]
      rows: 5
      cols: 3

  - id: "5"
    prompt: >
      Get a copy of the deed to a piece of property approved by your counselor,
      from the local courthouse or title agency. Discuss with your counselor the
      different parts of the deed and their importance.
    field: { type: text_box, lines: 8 }

  - id: "6"
    prompt: >
      Discuss emerging surveying technology such as drones and laser scanning
      and the strengths and weaknesses of each.
    field: { type: text_box, lines: 7 }

  - id: "7"
    prompt: >
      Tell what GPS is; discuss with your counselor the importance of GPS and
      how it is changing the field of surveying.
    field: { type: text_box, lines: 7 }

  - id: "8"
    prompt: >
      Identify three career opportunities that would use skills and knowledge in
      surveying. Pick one and research the training, education, certification
      requirements, experience, and expenses associated with entering the field.
      Research the prospects for employment, starting salary, advancement
      opportunities and career goals associated with this career. Discuss what
      you learned with your counselor and whether you might be interested in this
      career.
    field: { type: text_box, lines: 10 }
