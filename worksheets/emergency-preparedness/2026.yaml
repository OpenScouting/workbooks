badge:
  name: Emergency Preparedness
  slug: emergency-preparedness
  requirements_revision: "2026-01-01"
  description: >
    Emergency Preparedness teaches you to anticipate, prevent, and respond to
    emergencies at home, in your community, and in the backcountry. You will
    build family plans and kits, learn rescue and signaling skills, and study
    how Scouts and responders organize during a disaster.

requirements:
  - id: "1"
    intro: "Emergency Situations. Do the following:"
    children:
      - id: "1a"
        prompt: >
          Discuss with your counselor the aspects of emergency preparedness and
          include in your discussion the kinds of questions that are important to
          ask yourself as you consider each of these: prevention, protection,
          mitigation, response, and recovery.
        field: { type: text_box, lines: 9 }
      - id: "1b"
        prompt: >
          Using a chart, spreadsheet, or another method approved by your
          counselor, demonstrate your understanding of each aspect of emergency
          preparedness listed in requirement 1(a) (prevention, protection,
          mitigation, response, and recovery) for 10 emergency situations from
          the list below. Discuss your findings with your counselor.
        notes:
          - "Choose 10 from this list: (1) Home stovetop or oven fire; (2) Home flammable liquid fire; (3) Gas leak in or near a home or with outside cooking; (4) Food poisoning; (5) Automobile crash; (6) Vehicle stalled in the desert; (7) Vehicle trapped in a blizzard; (8) Backcountry injury; (9) Boating or water accident; (10) Toxic chemical spills and releases; (11) Nuclear power plant emergency; (12) Fire or explosion in a public place; (13) Violence in a public place; (14) Wildland fire; (15) Avalanche (snowslide or rockslide); (16) Earthquake; (17) Tsunami; (18) Major flooding or a flash flood with water outage; (19) Hurricane with power outage; (20) Tornado; (21) Lightning storm."
        field:
          type: repeated_block
          count: 10
          template:
            - { label: "Emergency situation", type: text_field }
            - { label: "Prevention", type: text_box, lines: 1 }
            - { label: "Protection", type: text_box, lines: 1 }
            - { label: "Mitigation", type: text_box, lines: 1 }
            - { label: "Response", type: text_box, lines: 1 }
            - { label: "Recovery", type: text_box, lines: 1 }

  - id: "2"
    intro: "Planning for Family Emergencies. Do the following:"
    children:
      - id: "2a"
        prompt: >
          At a family meeting, discuss the situations on the chart you created
          for requirement 1(b) and make emergency plans for sheltering-in-place
          and for evacuation of your home. Discuss your family meeting and plans
          with your counselor.
        field: { type: text_box, lines: 9 }
      - id: "2b"
        prompt: >
          Develop and practice a plan of escape for your family in case of fire
          in your home. Draw a floor plan with escape routes and a map with a
          safe meeting place. Discuss your family's home escape plan with your
          counselor.
        field: { type: draw_area, height: 5 }
      - id: "2c"
        prompt: >
          Using a checklist in the Emergency Preparedness merit badge pamphlet or
          one approved by your counselor, prepare or inspect a family disaster
          kit for sheltering-in-place and for evacuation of your home. Review the
          needs and uses of the items in a kit with your counselor.
        field: { type: text_box, lines: 8 }

  - id: "3"
    prompt: "Preventing Accidents and Emergencies. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "Using a home safety checklist included in the Emergency Preparedness merit badge pamphlet or one approved by your counselor, inspect a home (or a similar building near where you live or at a camp) for safety hazards with the help of an adult. Present your completed checklist to and discuss your findings with your counselor."
        - "Develop emergency prevention plans for five family activities outside the home, as approved by your counselor. (Examples are taking a picnic to a park, seeing a movie, attending a worship service, an outing at a beach, traveling to visit a relative, or attending a ball game or concert.) Each plan should include an analysis of possible hazards, proposals to prevent, protect from, mitigate, respond to, and recover from emergencies, and the reasons for the actions that you propose."
    children:
      - id: "3-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }

  - id: "4"
    prompt: "Dangerous Situations. Show how you could save a person from the following dangerous situations without putting yourself in danger:"
    children:
      - id: "4a"
        prompt: "Live household electric wire"
        field: { type: text_box, lines: 4 }
      - id: "4b"
        prompt: "A structure filled with carbon monoxide"
        field: { type: text_box, lines: 4 }
      - id: "4c"
        prompt: "Clothes on fire"
        field: { type: text_box, lines: 4 }
      - id: "4d"
        prompt: "Drowning, using nonswimming rescues (including accidents on ice)"
        field: { type: text_box, lines: 4 }

  - id: "5"
    intro: "Signaling for Help. Do the following:"
    children:
      - id: "5a"
        prompt: "Show three ways of attracting and communicating with rescue aircraft or drones."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Show ways to attract the attention of searchers on the ground if you are lost in the wilderness."
        field: { type: text_box, lines: 6 }
      - id: "5c"
        prompt: "Show ways to attract the attention of searchers on the water if you are stranded with a capsized or disabled motorboat or sailboat."
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: >
      Moving an Injured Person. With another person, show two good ways to
      transport an injured person out of a remote area using improvised
      stretchers to conserve the energy of rescuers while ensuring the
      well-being and protection of the injured person.
    field: { type: text_box, lines: 8 }

  - id: "7"
    intro: "National Incident Management System (NIMS) and Incident Command System (ICS). Do the following:"
    children:
      - id: "7a"
        prompt: "Describe the National Incident Management System (NIMS) and the local Incident Command System (ICS)."
        field: { type: text_box, lines: 7 }
      - id: "7b"
        prompt: "Find out how your community and its leaders work to manage and to train for disasters. Discuss this information with your counselor."
        field: { type: text_box, lines: 7 }
      - id: "7c"
        prompt: "Discuss how a Scout troop can help in an emergency situation using ICS."
        field: { type: text_box, lines: 6 }

  - id: "8"
    intro: "Emergency Service. Do the following:"
    children:
      - id: "8a"
        prompt: "Discuss with your counselor the duties that a Scout troop should be prepared to do, the training they need, and the safety precautions they should take for the following emergency services:"
        children:
          - id: "8a1"
            prompt: "Crowd and traffic control"
            field: { type: text_box, lines: 4 }
          - id: "8a2"
            prompt: "Messenger service during an incident"
            field: { type: text_box, lines: 4 }
          - id: "8a3"
            prompt: "Collection and distribution services"
            field: { type: text_box, lines: 4 }
          - id: "8a4"
            prompt: "Group feeding, shelter, and sanitation"
            field: { type: text_box, lines: 4 }
      - id: "8b"
        prompt: "Prepare a written plan for mobilizing your troop when needed to do emergency service. If your troop already has a mobilization plan, present the plan to your counselor and tell your part in making the plan work."
        field: { type: text_box, lines: 10 }
      - id: "8c"
        prompt: "Using a checklist in the Emergency Preparedness merit badge pamphlet or one approved by your counselor, prepare or inspect a personal emergency service pack for a mobilization call. Explain the needs and uses of the contents to your counselor."
        field: { type: text_box, lines: 8 }
      - id: "8d"
        prompt: "Take part in an emergency service project, either a real one or a practice exercise, with a Scouting troop or a community agency or at Scout camp or at a school. Review what you learned and practiced with your counselor."
        field: { type: text_box, lines: 8 }

  - id: "9"
    prompt: "First Aid Merit Badge. Earn the First Aid merit badge."
    field: { type: checkbox, label: "Earned the First Aid merit badge." }

  - id: "10"
    prompt: "Careers. Do ONE of the following:"
    field:
      type: checklist
      items:
        - "Interview an emergency services coordinator or a civil servant about their work in disaster management. Learn about how they chose this career and about their duties. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "Identify three career opportunities that would use skills and knowledge in emergency services. Pick one and research the training, education, certification requirements, experience, and expenses associated with entering the field. Research the prospects for employment, starting salary, advancement opportunities, and career goals associated with this career. Discuss what you learned with your counselor and whether you might be interested in this career."
        - "Identify how you might use the skills and knowledge in the field of emergency preparedness to pursue a personal hobby and/or healthy lifestyle. Research the additional training required, expenses, and affiliation with organizations that would help you maximize the enjoyment and benefit you might gain from it. Discuss what you learned with your counselor and share what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "10-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
