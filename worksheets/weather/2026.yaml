badge:
  name: Weather
  slug: weather
  requirements_revision: "2026-01-01"
  description: >
    Weather shapes daily life and outdoor adventure alike. Scouts learn how the
    atmosphere works, how to read clouds and pressure systems, how to stay safe
    in dangerous conditions, and how to keep a weather log of their own.

requirements:
  - id: "1"
    prompt: >
      Define meteorology. Explain what weather is and what climate is. Discuss
      how the weather affects farmers, sailors, aviators, and the outdoor
      construction industry. Tell why weather forecasts are important to each of
      these groups.
    field: { type: text_box, lines: 9 }

  - id: "2"
    prompt: >
      Name five dangerous weather-related conditions. Give the safety rules for
      each when outdoors and explain the difference between a severe weather
      watch and a warning. Discuss the safety rules with your family.
    children:
      - id: "2-conditions"
        prompt: "Five dangerous weather-related conditions and the safety rules for each when outdoors"
        field:
          type: repeated_block
          count: 5
          template:
            - { label: "Condition", type: text_field }
            - { label: "Safety rules when outdoors", type: text_box, lines: 2 }
      - id: "2-watch-warning"
        prompt: "The difference between a severe weather watch and a warning"
        field: { type: text_box, lines: 5 }

  - id: "3"
    prompt: >
      Identify at least two sources of weather forecasts that can be used to
      prepare for hikes, overnight camping, and other outdoor activities. Name
      two sources of emergency weather warnings both at home and during outdoor
      Scout functions.
    field: { type: text_box, lines: 6 }

  - id: "4"
    prompt: >
      Explain the difference between high and low pressure systems in the
      atmosphere. Tell which is related to good and to poor weather. Draw cross
      sections of a cold front and a warm front, showing the location and
      movements of the cold and warm air, the frontal slope, the location and
      types of clouds associated with each type of front, and the location of
      precipitation.
    field: { type: text_box, lines: 10 }

  - id: "5"
    prompt: "Tell what causes wind, why it rains, and how lightning and hail are formed."
    field: { type: text_box, lines: 8 }

  - id: "6"
    prompt: >
      Identify and describe clouds in the low, middle, and upper levels of the
      atmosphere. Relate these to specific types of weather.
    field:
      type: labeled_rows
      lines_each: 3
      labels:
        - "Low-level clouds"
        - "Middle-level clouds"
        - "Upper-level clouds"

  - id: "7"
    prompt: >
      Draw a diagram of the water cycle and label its major processes. Explain
      the water cycle to your counselor.
    field: { type: text_box, lines: 8 }

  - id: "8"
    prompt: >
      Identify some human activities that can alter the environment, and
      describe how they affect the climate and people.
    field: { type: text_box, lines: 8 }

  - id: "9"
    prompt: >
      Describe how the tilt of Earth's axis helps determine the climate of a
      region near the equator, near the poles, and across the area in between.
    field: { type: text_box, lines: 7 }

  - id: "10"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Make one of the following instruments: wind vane, anemometer, rain gauge, hygrometer. Keep a daily weather log for one week using information from this instrument as well as from other sources such as local radio and television stations, NOAA Weather Radio All Hazards, and internet sources (with your parent or guardian's permission). Record the following information at the same time every day: wind direction and speed, temperature, precipitation, and types of clouds. Be sure to make a note of any morning dew or frost. In the log, also list the weather forecasts from radio or television at the same time each day and show how the weather really turned out."
        - "(b) Visit a National Weather Service office or talk with a local radio or television weathercaster, private meteorologist, local agricultural extension service officer, or university meteorology instructor. Find out what type of weather is most dangerous or damaging to your community. Determine how severe weather and flood warnings reach the homes in your community."
    children:
      - id: "10-notes"
        prompt: "Notes from your chosen option (use the log below for option (a))"
        field: { type: text_box, lines: 6 }
      - id: "10-log"
        prompt: "Daily weather log (option (a))"
        field:
          type: table
          headers: ["Day", "Wind dir./speed", "Temp.", "Precip.", "Clouds", "Forecast vs. actual"]
          rows: 7
          cols: 6

  - id: "11"
    prompt: >
      Give a talk of at least five minutes to a group (such as your unit or a Cub
      Scout pack) explaining the outdoor safety rules in the event of lightning,
      flash floods, and tornadoes. Before your talk, share your outline with your
      counselor for approval.
    field: { type: text_box, lines: 10 }

  - id: "12"
    prompt: >
      Explore careers related to this merit badge. Research one career to learn
      about the training and education needed, costs, job prospects, salary, job
      duties, and career advancement. Your research methods may include, with
      your parent or guardian's permission, an internet or library search, an
      interview with a professional in the field, or a visit to a location where
      people in this career work. Discuss with your counselor both your findings
      and what about this profession might make it an interesting career.
    field: { type: text_box, lines: 10 }
