badge:
  name: Theater
  slug: theater
  requirements_revision: "2021-01-01"
  description: >
    Theater brings stories to life through acting, writing, design, and
    teamwork. Scouts read and review plays, write a one-act play of their own,
    learn stage safety and terminology, and contribute to a production on stage
    or behind the scenes.

requirements:
  - id: "1"
    prompt: >
      See or read three full-length plays. Write a review of each. Discuss with
      your counselor the plot or story. If you chose to watch the plays, comment
      on the acting and the staging. Note: Watching plays on television, video,
      or as a movie is not permitted.
    field:
      type: repeated_block
      count: 3
      template:
        - { label: "Play title", type: text_field }
        - { label: "Review", type: text_box, lines: 7 }

  - id: "2"
    prompt: >
      Write a one-act play that will take at least 10 minutes to perform. The
      play must have a main character, conflict, and a climax.
    field: { type: checkbox, label: "Wrote a one-act play of at least 10 minutes with a main character, conflict, and climax." }

  - id: "3"
    prompt: >
      Discuss with your counselor the safety precautions that should be
      practiced when working in a theater to protect the cast and crew. Then do
      THREE of the following:
    children:
      - id: "3-safety"
        prompt: "Safety precautions that protect the cast and crew when working in a theater"
        field: { type: text_box, lines: 6 }
      - id: "3-choices"
        prompt: "Then do THREE of the following:"
        field:
          type: checklist
          items:
            - "(a) Act a major part in a full-length play; or act a part in three one-act plays."
            - "(b) Direct a play. Cast, rehearse, and stage it. The play must be at least 10 minutes long."
            - "(c) Design the set for a play or a theatrical production. Make a model of it."
            - "(d) Design the costumes for five characters in a theatrical production set in a historical time."
            - "(e) Show skill in hair and makeup design. Make up yourself or a friend as a historical figure, a clown, an extraterrestrial, or a monster as directed."
            - "(f) With your counselor's approval, help with the building and painting of the scenery for a theatrical production."
            - "(g) With your counselor's approval, design the lighting for a play; or help install, focus, color, program, and operate the lighting for a theatrical production."
            - "(h) With your counselor's approval, help install, focus, equalize, program, and operate the sound for a theatrical production."
            - "(i) Serve as the stage manager for a theatrical production. Document all cues and stage setups in your calling script."
            - "(j) Serve as musical director for a musical theater production."
      - id: "3-notes"
        prompt: "Notes from your three chosen options"
        field: { type: text_box, lines: 12 }

  - id: "4"
    prompt: "Mime or pantomime any ONE of the following, chosen by your counselor."
    field:
      type: checklist
      items:
        - "(a) You have come into a large room. It is full of pictures, furniture, and other things of interest."
        - "(b) As you are getting on a bus, your books fall into a puddle. By the time you pick them up, the bus has driven off."
        - "(c) You have failed a school test. You are talking with your teacher, who does not buy your story."
        - "(d) You are at camp with a new Scout. You try to help them pass a cooking test. The Scout learns very slowly."
        - "(e) You are at a banquet. The meat is good. You don't like the vegetable. The dessert is ice cream."
        - "(f) You are a circus performer such as a juggler, high-wire artist, or lion tamer doing a routine."

  - id: "5"
    prompt: >
      Explain the following: proscenium arch, central or arena staging, center
      stage, stage right, stage left, downstage, upstage, stage crew, flies,
      portal, cyclorama, stage brace, spotlight, floodlight, lighting control
      board, sound mixing desk, thrust staging, ground plans, and sightlines.
    field:
      type: labeled_rows
      lines_each: 1
      labels:
        - "Proscenium arch"
        - "Central or arena staging"
        - "Center stage"
        - "Stage right"
        - "Stage left"
        - Downstage
        - Upstage
        - "Stage crew"
        - Flies
        - Portal
        - Cyclorama
        - "Stage brace"
        - Spotlight
        - Floodlight
        - "Lighting control board"
        - "Sound mixing desk"
        - "Thrust staging"
        - "Ground plans"
        - Sightlines
