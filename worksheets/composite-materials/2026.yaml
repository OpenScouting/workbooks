badge:
  name: Composite Materials
  slug: composite-materials
  requirements_revision: "2026-01-01"
  description: >
    Composite materials combine two or more substances to create something
    stronger or lighter than either alone, and they appear everywhere from
    boats to aircraft. This badge introduces how composites are made, the
    safety involved, and the resins and reinforcements behind them.

requirements:
  - id: "1"
    prompt: "Do the following:"
    children:
      - id: "1a"
        prompt: >
          Explain to your counselor the most likely hazards you may encounter
          while working with composite materials and what you should do to
          anticipate, mitigate, and prevent, and respond to these hazards.
          Describe the appropriate safety gear and clothing that should be used
          when working with composite materials.
        field: { type: text_box, lines: 8 }
      - id: "1b"
        prompt: >
          Explain the precautions that must be taken when handling, storing, and
          disposing of resins, reinforcements, and other materials used in
          composites. Include in your discussion the importance of health,
          safety, and environmental responsibility and awareness.
        field: { type: text_box, lines: 8 }
      - id: "1c"
        prompt: "Describe what a safety data sheet (SDS) is and tell why it is used."
        field: { type: text_box, lines: 5 }

  - id: "2"
    prompt: "Do the following:"
    children:
      - id: "2a"
        prompt: >
          Explain what composite materials are. Include a brief history of
          composites and how they have developed.
        field: { type: text_box, lines: 8 }
      - id: "2b"
        prompt: >
          Compare the similarities and differences between composites and wood,
          aluminum, copper, and steel. Describe the physical, electrical,
          mechanical, corrosive, flammability, cost, and other such properties.
          For each of these raw materials, give one example of how it can be
          shaped and used for a specific application.
        field:
          type: repeated_block
          count: 4
          template:
            - { label: "Material (wood, aluminum, copper, steel)", type: text_field }
            - { label: "Properties compared with composites", type: text_box, lines: 4 }
            - { label: "Example of shaping and use", type: text_box, lines: 2 }

  - id: "3"
    prompt: "Describe how composite materials are made. Then do the following:"
    field: { type: text_box, lines: 6 }
    children:
      - id: "3a"
        prompt: >
          Discuss three different composite reinforcement materials, their
          positive and negative characteristics, and their uses. Obtain the SDS
          for each one and discuss the toxicity, disposal, and safe-handling
          sections for these materials.
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Reinforcement material", type: text_field }
            - { label: "Positive and negative characteristics", type: text_box, lines: 3 }
            - { label: "Uses", type: text_box, lines: 2 }
            - { label: "SDS: toxicity, disposal, safe handling", type: text_box, lines: 3 }
      - id: "3b"
        prompt: >
          Discuss three different resins used in composites, their positive and
          negative characteristics, and their uses. Obtain the SDS for each one
          and discuss the toxicity, disposal, and safe-handling sections for
          these materials. Include thermoset resins and thermoplastic resins in
          your discussion.
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Resin", type: text_field }
            - { label: "Positive and negative characteristics", type: text_box, lines: 3 }
            - { label: "Uses", type: text_box, lines: 2 }
            - { label: "SDS: toxicity, disposal, safe handling", type: text_box, lines: 3 }
      - id: "3c"
        prompt: >
          For each of the three resins you chose for requirement 3(b), think of
          a new application that might be worth developing.
        field:
          type: repeated_block
          count: 3
          template:
            - { label: "Resin", type: text_field }
            - { label: "New application", type: text_box, lines: 3 }

  - id: "4"
    prompt: >
      With your parent or guardian's permission and your counselor's approval,
      do ONE of the following:
    field:
      type: checklist
      items:
        - "(a) Visit a company that manufactures or repairs products made with composites. Discuss what you learned with your counselor."
        - "(b) Find three composites-related websites. Share and discuss what you learned with your counselor."
    children:
      - id: "4-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 8 }

  - id: "5"
    prompt: "Do the following:"
    children:
      - id: "5a"
        prompt: >
          Use composite materials to complete two projects, at least one of
          which must come from the Composite Materials merit badge pamphlet. The
          second project may come from the pamphlet OR may be one you select on
          your own that has been approved by your counselor in advance.
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: >
          With your counselor's assistance, find an appropriate site where the
          projects can be safely completed under your counselor's supervision
          and/or the supervision of an adult approved by your counselor who is
          knowledgeable about composites.
        field: { type: text_box, lines: 4 }
      - id: "5c"
        prompt: >
          With your counselor, determine how the finished projects will be
          evaluated. Using those guidelines, evaluate the completed projects
          with your counselor.
        field: { type: text_box, lines: 6 }

  - id: "6"
    prompt: "Do ONE of the following:"
    field:
      type: checklist
      items:
        - "(a) Explore careers related to the Composite Materials merit badge. Research one career to learn about the training and education needed, costs, job prospects, salary, job duties, and career advancement. Your research methods may include, with your parent or guardian's permission, an internet or library search, an interview with a professional in the field, or a visit to a location where people in this career work. Discuss with your counselor both your findings and what about this profession might make it an interesting career."
        - "(b) Explore how you could use knowledge and skills from the Composite Materials merit badge to pursue a hobby or interest. Research any training needed, expenses, and organizations that promote or support it. Discuss with your counselor what short-term and long-term goals you might have if you pursued this."
    children:
      - id: "6-notes"
        prompt: "Notes from your chosen option"
        field: { type: text_box, lines: 10 }
