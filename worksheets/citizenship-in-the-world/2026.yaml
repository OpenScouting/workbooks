badge:
  name: Citizenship in the World
  slug: citizenship-in-the-world
  requirements_revision: "2026-01-01"
  description: >
    Citizenship in the World broadens your view beyond your own country. You
    explore how nations relate to one another through law, trade, diplomacy, and
    international organizations, and what it means to be a responsible global
    citizen.

requirements:
  - id: "1"
    prompt: >
      Explain what citizenship in the world means to you and what you think it
      takes to be a good world citizen.
    field: { type: text_box, lines: 7 }

  - id: "2"
    prompt: >
      Explain how one becomes a citizen in the United States, and explain the
      rights, duties, and obligations of U.S. citizenship. Discuss the
      similarities and differences between the rights, duties, and obligations of
      U.S. citizens and the citizens of two other countries.
    field: { type: text_box, lines: 10 }

  - id: "3"
    intro: "Do the following:"
    children:
      - id: "3a"
        prompt: >
          Pick a current world event. In relation to this current event, discuss
          with your counselor how a country's national interest and its
          relationship with other countries might affect areas such as its
          security, its economy, its values, and the health of its citizens.
        field: { type: text_box, lines: 8 }
      - id: "3b"
        prompt: >
          Select a foreign country and discuss with your counselor how its
          geography, natural resources, and climate influence its economy and its
          global partnerships with other countries.
        field: { type: text_box, lines: 8 }

  - id: "4"
    prompt: "Do TWO of the following:"
    field:
      type: checklist
      items:
        - "(a) Explain international law and how it differs from national law. Explain the role of international law and how international law can be used as a tool for conflict resolution."
        - "(b) Using resources such as major daily newspapers, the internet (with your parent or guardian's permission), and news magazines, observe a current issue that involves international trade, foreign exchange, balance of payments, tariffs, and free trade. Explain what you have learned. Include in your discussion an explanation of why countries must cooperate in order for world trade and global competition to thrive."
        - "(c) Select TWO of the following organizations and describe their role in the world: United Nations and UNICEF; International Court of Justice (The World Court); Interpol; World Organization of the Scout Movement; World Health Organization (WHO); Amnesty International; International Federation of Red Cross and Red Crescent Societies (IFRC); Cooperative for American Relief Everywhere (CARE); European Union."
    children:
      - id: "4notes"
        prompt: "Notes from your two chosen options"
        field: { type: text_box, lines: 10 }

  - id: "5"
    intro: "Do the following:"
    children:
      - id: "5a"
        prompt: "Discuss the differences between constitutional and nonconstitutional governments."
        field: { type: text_box, lines: 6 }
      - id: "5b"
        prompt: "Name at least five different types of governments currently in power in the world."
        field: { type: text_box, lines: 5 }
      - id: "5c"
        prompt: "Show on a world map countries that use each of these five different forms of government."
        field: { type: text_box, lines: 5 }

  - id: "6"
    intro: "Do the following:"
    children:
      - id: "6a"
        prompt: >
          Explain how a government is represented abroad and how the United States
          government is accredited to international organizations.
        field: { type: text_box, lines: 6 }
      - id: "6b"
        prompt: >
          Describe the roles of the following in the conduct of foreign relations:
          ambassador, consul, Bureau of Global Public Affairs, United States and
          Foreign Commercial Service.
        field:
          type: labeled_rows
          lines_each: 2
          labels:
            - Ambassador
            - Consul
            - Bureau of Global Public Affairs
            - United States and Foreign Commercial Service
      - id: "6c"
        prompt: "Explain the purpose of a passport and visa for international travel."
        field: { type: text_box, lines: 5 }

  - id: "7"
    prompt: >
      Do TWO of the following (with your parent or guardian's permission) and
      share with your counselor what you have learned:
    field:
      type: checklist
      items:
        - "(a) Visit the website of the U.S. State Department. Learn more about an issue you find interesting that is discussed on this website."
        - "(b) Visit the website of an international news organization or foreign government, OR examine a foreign newspaper available at your local library, bookstore, or newsstand. Find a news story about a human right realized in the United States that is not recognized in another country."
        - "(c) Visit with a student or Scout from another country and discuss the typical values, holidays, ethnic foods, and traditions practiced or enjoyed there."
        - "(d) Attend or participate in a World Organization of the Scouting Movement (WOSM) event such as the World Scout Jamboree, World Scout Moot, World Scout Congress, Jamboree Over The Air, or Jamboree Over The Internet. Attendance at a national or regional Jamboree sponsored by a WOSM-National Scout Organization is also allowed."
        - "(e) Participate in or attend an international event in your area, such as an ethnic festival, concert, or play."
    children:
      - id: "7notes"
        prompt: "Share with your counselor what you learned from your two chosen options."
        field: { type: text_box, lines: 10 }
